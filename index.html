function fD(d){return d?new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric"}):"\u2014";}
function fT(d){return d?new Date(d).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}):"\u2014";}
function fM(m){if(!m&&m!==0)return"\u2014";const h=Math.floor(m/60),r=m%60;return h>0?`${h}h ${r}m`:`${r}m`;}
function fTm(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;const p=n=>String(n).padStart(2,"0");return h>0?`${h}:${p(m)}:${p(ss)}`:`${p(m)}:${p(ss)}`;}

function dAgo(d){return Math.floor((Date.now()-new Date(d).getTime())/864e5);}
function uid(){return Date.now()+"-"+Math.random().toString(36).slice(2,6);}
function sortCats(cats){if(!cats)return[];const other=cats.filter(c=>c.name==="Admin/Other");const rest=cats.filter(c=>c.name!=="Admin/Other").sort((a,b)=>a.name.localeCompare(b.name));return[...rest,...other];}
function inRange(d,from,to){if(!d)return false;const t=new Date(d).getTime();if(isNaN(t))return false;return t>=new Date(from).getTime()&&t<=new Date(to).getTime()+864e5;}

async function gGet(token,url){const r=await fetch(url,{headers:{Authorization:`Bearer ${token}`}});if(!r.ok)throw new Error(`GET ${r.status}`);return r.json();}
async function gAll(token,url){let a=[],n=url;while(n){const d=await gGet(token,n);a=a.concat(d.value||[]);n=d["@odata.nextLink"]||null;}return a;}
async function gPost(token,url,fields){const r=await fetch(url,{method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify({fields})});if(!r.ok){let errBody="";try{const ej=await r.json();errBody=JSON.stringify(ej?.error||ej).slice(0,300);}catch{}throw new Error(`POST ${r.status}: ${errBody}`);}return r.json();}
async function gPatch(token,url,fields){const r=await fetch(url,{method:"PATCH",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify(fields)});if(!r.ok){let errBody="";try{const ej=await r.json();errBody=JSON.stringify(ej?.error||ej).slice(0,300);}catch{}throw new Error(`PATCH ${r.status}: ${errBody}`);}return r.json();}
function lUrl(n){return`${SITE}/lists/${n}/items`;}
async function gRawPost(token,url,body){const r=await fetch(url,{method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify(body)});if(!r.ok){const t=await r.text();throw new Error(`POST ${r.status}: ${t}`);}return r.json();}
function iUrl(n,id){return`${SITE}/lists/${n}/items/${id}/fields`;}

async function safeGet(token,name,url){try{console.log(`[VT] Loading ${name}...`);const r=await gAll(token,url);console.log(`[VT] ${name}: ${r.length}`);return r;}catch(e){console.error(`[VT] ${name} FAILED: ${e.message}`,url);return[];}}

// Build SP fields for VA_Activity — omits optional columns that may not exist yet
function actFields(t,extra={}){
  const f={
    Title:t.Title||"Untitled",
    ActivityType:t.ActivityType||"Task",
    VAEmail:t.VAEmail||"",
    VAName:t.VAName||"",
    ActivityDate:t.ActivityDate||new Date().toISOString(),
    PropertyId:t.PropertyId||"",
    PropertyName:t.PropertyName||"General",
    PMName:t.PMName||"",
    Category:t.Category||"Admin/Other",
    Source:t.Source||"Ad-Hoc",
    Status:t.Status||"Queued",
    Priority:t.Priority||"Normal",
    StartTime:t.StartTime||null,
    EndTime:t.EndTime||null,
    DurationMin:t.DurationMin||0,
    PausedMin:t.PausedMin||0,
    Notes:t.Notes||"",
    CoverageForEmail:t.CoverageForEmail||"",
    CoverageForName:t.CoverageForName||"",
    AssignedByEmail:t.AssignedByEmail||"",
    AssignedByName:t.AssignedByName||"",
    ...extra
  };
  // Only include GroupId if the column has been provisioned (non-empty value)
  if(t.GroupId||extra.GroupId){f.GroupId=t.GroupId||extra.GroupId;}
  return f;
}

// Post to SP with auto-retry stripping unrecognized fields
async function gPostActivity(token,fields){
  try{
    return await gPost(token,lUrl("VA_Activity"),fields);
  }catch(e){
    if(e.message.includes("not recognized")||e.message.includes("invalidRequest")){
      // Strip any custom columns SP doesn't know about and retry
      const safe={...fields};
      delete safe.GroupId;
      console.warn("[VT] Retrying without GroupId");
      return await gPost(token,lUrl("VA_Activity"),safe);
    }
    throw e;
  }
}

async function loadAll(token){
  const[eR,nhR,cR,pR,ptR,aR,gR]=await Promise.all([
    safeGet(token,"Employees",`${lUrl("Employees")}?expand=fields&$top=200`),
    (async()=>{for(const n of["NewHires","New%20Hires","New_Hires"]){try{const r=await gAll(token,`${lUrl(n)}?expand=fields&$top=200`);console.log("[VT] New Hires found as:",n,r.length);return r;}catch(e){}}console.warn("[VT] New Hires list not found under any name");return[];})(),
    safeGet(token,"Config",`${lUrl("VA_TrackerConfig")}?expand=fields&$top=10`),
    safeGet(token,"Properties",`${lUrl("VA_Properties")}?expand=fields&$top=200`),
    safeGet(token,"Portfolios",`${lUrl("VA_Portfolios")}?expand=fields&$top=200`),
    safeGet(token,"Activity",`${lUrl("VA_Activity")}?expand=fields&$top=1000`),
    safeGet(token,"Guests",`${lUrl("VA_Guests")}?expand=fields&$top=200`),
  ]);
  // Merge both lists, deduplicate by email
  const allEmpRaw=[...eR,...nhR].map(e=>({id:e.id,...e.fields}));
  const seenEmails=new Set();
  const employees=allEmpRaw.filter(e=>{const em=(e.Email||"").toLowerCase();if(!em||seenEmails.has(em))return false;seenEmails.add(em);return true;});
  const config=cR.length>0?JSON.parse(cR[0].fields.ConfigJSON||"{}"):{}; 
  const properties=pR.map(p=>({id:p.id,...p.fields})).filter(p=>p.IsActive!==false);
  const portfolios=ptR.map(p=>({id:p.id,...p.fields})).filter(p=>p.IsActive!==false);
  const activities=aR.map(a=>({id:a.id,...a.fields}));

  const guests=gR.map(g=>({id:g.id,...g.fields})).filter(g=>g.IsActive!==false);
  const vas=employees.filter(e=>e.JobTitle==="Virtual Assistant");
  const pms=employees.filter(e=>e.JobTitle==="Property Manager"&&e.EmployeeActive!==false);
  console.log("[VT] Loaded:",{emp:employees.length,props:properties.length,port:portfolios.length,act:activities.length,vas:vas.length,pms:pms.length,guests:guests.length});
  return{employees,config,properties,portfolios,activities,vas,pms,guests};
}

// ============================================================
// MSAL
// ============================================================
function useMsal(){
  const[inst,setInst]=useState(null);const[acct,setAcct]=useState(null);const[token,setToken]=useState(null);const[err,setErr]=useState(null);
  useEffect(()=>{
    const s=document.createElement("script");s.src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js";
    s.onload=()=>{const i=new window.msal.PublicClientApplication({auth:{clientId:CONFIG.clientId,authority:`https://login.microsoftonline.com/${CONFIG.tenantId}`,redirectUri:window.location.origin},cache:{cacheLocation:"sessionStorage"}});
      i.initialize().then(()=>{setInst(i);const a=i.getAllAccounts();if(a.length>0){setAcct(a[0]);i.acquireTokenSilent({scopes:SCOPES,account:a[0]}).then(r=>setToken(r.accessToken)).catch(()=>{});}});};
    document.head.appendChild(s);
  },[]);
  const login=useCallback(async()=>{if(!inst)return;try{const r=await inst.loginPopup({scopes:SCOPES});setAcct(r.account);const t=await inst.acquireTokenSilent({scopes:SCOPES,account:r.account});setToken(t.accessToken);setErr(null);}catch(e){if(e.errorCode!=="user_cancelled")setErr(e.message);}},[inst]);
  const refresh=useCallback(async()=>{if(!inst||!acct)return null;try{const r=await inst.acquireTokenSilent({scopes:SCOPES,account:acct});setToken(r.accessToken);return r.accessToken;}catch{const r=await inst.acquireTokenPopup({scopes:SCOPES});setToken(r.accessToken);return r.accessToken;}},[inst,acct]);
  return{acct,token,login,refresh,err};
}

    }catch(e){return null;}
  });
  const[covQ,setCovQ]=useState([]);
  const[queue,setQueue]=useState([]);
  const[tick,setTick]=useState(0);
  // Dashboard date filter
  const[dfFrom,setDfFrom]=useState(()=>{const d=new Date();d.setDate(d.getDate()-7);return d.toISOString().slice(0,10);});
  const[dfTo,setDfTo]=useState(today());

  useEffect(()=>{const id=setInterval(()=>setTick(t=>t+1),1000);return()=>clearInterval(id);},[]);
  // Restore persisted shift when email becomes known
  useEffect(()=>{
    if(!myEmail)return;

      if(saved&&!shift){const s=JSON.parse(saved);setShift(s);console.log("[VT] Restored shift from session",s.ClockIn);}

  },[myEmail]);
  const fl=useCallback(msg=>{setFlash(msg);setTimeout(()=>setFlash(""),2500);},[]);
  async function gT(){return(await refresh())||token;}

  // Load data
  const[myGuest,setMyGuest]=useState(null);

  useEffect(()=>{
    if(!token||!acct)return;
    const email=acct.username.toLowerCase();
    console.log("[VT] MSAL user:",email);
    window._vatEmail=email;
    setMyEmail(email);setLoading(true);
    loadAll(token).then(d=>{
      setData(d);
      // Priority 1: check Employees
      const me=d.employees.find(e=>(e.Email&&e.Email.toLowerCase()===email)||(e.M365UserId&&e.M365UserId.toLowerCase()===email)||(e.Email&&email.split("@")[0]===e.Email.toLowerCase().split("@")[0]));
      if(me){
        const r=detectRole(me);
        if(r){setRole(r);setError(null);setMyEmp(me);}
        else{
          // Priority 2: check guests even if in Employees but no role
          const gRec=d.guests.find(g=>g.GuestEmail&&g.GuestEmail.toLowerCase()===email);
          if(gRec){setRole("guest");setMyGuest(gRec);setError(null);}
          else{setRole(null);setError("access_denied");}
        }
      } else {

        const gRec=d.guests.find(g=>g.GuestEmail&&g.GuestEmail.toLowerCase()===email);
        console.log("[VT] Guest check:",gRec?`${gRec.GuestName} @ ${gRec.Company}`:"NOT FOUND");
        if(gRec){setRole("guest");setMyGuest(gRec);setError(null);}
        else{setRole(null);setError("access_denied");}
      }
      buildQueue(d,email);
      setLoading(false);
    }).catch(e=>{console.error("[VT] Load error:",e);setError("load_error: "+e.message);setLoading(false);});
  },[token,acct]);

  function buildQueue(d,email){
    // 1. Load all persisted Queued tasks from VA_Activity
    const persistedQueued=d.activities.filter(a=>(a.ActivityType==="Task"||a.ActivityType0==="Task")&&(a.Status==="Queued"||a.Status==="In Progress"));
    const q=[],cv=[],tm=[];
    
    persistedQueued.forEach(a=>{
      const t={...a,_localId:a.id,_spId:a.id};
      if(a.Status==="In Progress"){
        // Restore as active timer — use StartTime from SP, default to now if missing
        const timerTask={...t,StartTime:a.StartTime||new Date().toISOString(),_pMs:0,_pS:null};
        tm.push(timerTask);
      } else if(a.Source==="Coverage"||a.CoverageForEmail){cv.push(t);}
      else{q.push(t);}
    });
    if(tm.length>0){setTimers(tm);console.log("[VT] Restored",tm.length,"active timers");}

    // 2. Generate recurring daily/weekly tasks that don't already exist
    if(d.config.recurringTasks){
      const td=today();
      const todayDate=new Date(td);
      const todayDow=todayDate.getDay(); // 0=Sun,1=Mon,...6=Sat
      // Check what's already in SharePoint for today (any status)
      const todayTasks=d.activities.filter(a=>a.ActivityType==="Task"&&actDate(a)&&actDate(a).slice(0,10)===td);
      // Dedup: check ALL activities for today (any status) - prevents duplicates on reload
      const existing=new Set(todayTasks.map(t=>`${t.VAEmail?.toLowerCase()}|${t.Title}|${t.PropertyId||""}`));
      // Also check already-queued/in-progress tasks
      persistedQueued.forEach(a=>{existing.add(`${a.VAEmail?.toLowerCase()}|${a.Title}|${a.PropertyId||""}`);});
      // Also check timers in case they started one
      // Use broader title-only check as secondary safety net
      const existingTitleProps=new Set(todayTasks.map(t=>`${t.Title}|${t.PropertyId||""}`));

      const toSave=[];
      // Group recurring tasks by VA+description — same task across multiple properties = one group
      const recGroupMap={};
      d.config.recurringTasks.forEach(rt=>{
        if(!rt.active)return;
        const freq=rt.frequency||"daily";
        if(freq==="weekly"){
          const targetDow=rt.dayOfWeek!==undefined?rt.dayOfWeek:1;
          if(todayDow!==targetDow)return;
        }
        const key=`${rt.vaEmail?.toLowerCase()}|${rt.description}`;
        if(existing.has(key)||existingTitleProps.has(`${rt.description}|${rt.propertyId||""}`))return;
        const va=d.vas.find(v=>v.Email&&v.Email.toLowerCase()===rt.vaEmail.toLowerCase());
        if(!va)return;
        const prop=rt.propertyId?d.properties.find(p=>p.Title===rt.propertyId):null;
        const cat=d.config.categories?.find(c=>c.id===rt.category);
        const taskSrc=freq==="weekly"?"Weekly":"Daily";
        const task={Title:rt.description,VAEmail:va.Email,VAName:va.Name,PropertyId:rt.propertyId||"",PropertyName:prop?prop.PropertyName:"General",PMName:prop?prop.PMName:"",Category:cat?.name||"Admin/Other",Source:taskSrc,Status:"Queued",Priority:"Normal",ActivityDate:td,ActivityType:"Task",icon:rt.icon||""};
        if(getVAStatus(va)==="Out"){task.Source="Coverage";task.CoverageForEmail=va.Email;task.CoverageForName=va.Name;}
        if(!recGroupMap[key])recGroupMap[key]=[];
        recGroupMap[key].push(task);
      });
      // Assign shared GroupId to groups of 2+ (same task across multiple properties)
      Object.values(recGroupMap).forEach(tasks=>{
        if(tasks.length>1){const gid=uid();tasks.forEach(t=>{t.GroupId=gid;});}
        toSave.push(...tasks);
      });

      // Set base queue state FIRST, then background-save new tasks and append
      setQueue(q);setCovQ(cv);

      if(toSave.length>0){
        (async()=>{
          try{
            const tk=await gT();
            for(const task of toSave){
              const res=await gPostActivity(tk,actFields(task));
              const saved={...task,_localId:res.id,_spId:res.id,id:res.id};
              if(task.Source==="Coverage"){setCovQ(p=>[...p,saved]);}
              else{setQueue(p=>[...p,saved]);}
            }
            console.log(`[VT] Generated ${toSave.length} daily tasks`);
          }catch(e){console.error("[VT] Daily task generation error:",e);}
        })();
      }
    }else{
      setQueue(q);setCovQ(cv);
    }
  }

  // ── Timer actions ──
  async function startTimer(task){
    const now=new Date().toISOString();
    const timer={...task,Status:"In Progress",StartTime:now,_pMs:0,_pS:null};
    const tk=await gT();
    if(task._spId){try{await gPatch(tk,iUrl("VA_Activity",task._spId),{Status:"In Progress",StartTime:now});}catch(e){console.warn("[VT] Timer start patch failed:",e);}}
    // If grouped, remove ALL siblings from queue (they're represented by the single group timer)
    if(task.GroupId){
      setQueue(p=>p.filter(t=>t.GroupId!==task.GroupId));
      // Store sibling IDs in timer so we can restore on cancel
      const siblings=queue.filter(t=>t.GroupId===task.GroupId&&t._localId!==task._localId);
      timer._groupSiblings=siblings;
      timer._groupSize=siblings.length+1;
    }else{
      setQueue(p=>p.filter(t=>t._localId!==task._localId));
    }
    setTimers(p=>[...p,timer]);fl(task.GroupId?`Group timer started — ${(timer._groupSize||1)} properties`:"Timer started!");
  }
  function pauseTimer(id){setTimers(p=>p.map(t=>t._localId===id?{...t,_pS:Date.now()}:t));}
  function resumeTimer(id){setTimers(p=>p.map(t=>{if(t._localId!==id||!t._pS)return t;return{...t,_pMs:(t._pMs||0)+(Date.now()-t._pS),_pS:null};}));}
  async function finishTimer(id,status,notes){
    const t=timers.find(x=>x._localId===id);if(!t)return;
    const now=Date.now();let pMs=t._pMs||0;if(t._pS)pMs+=(now-t._pS);
    const rawMs=now-new Date(t.StartTime).getTime();
    const dur=Math.max(1,Math.round((rawMs-pMs)/6e4));
    const fields={Status:status,EndTime:status==="Completed"?new Date(now).toISOString():null,DurationMin:dur,PausedMin:Math.round(pMs/6e4),Notes:notes||""};
    try{
      const tk=await gT();
      if(t._spId){await gPatch(tk,iUrl("VA_Activity",t._spId),fields);}
      else{await saveTask({...t,...fields});}
      setTimers(p=>p.filter(x=>x._localId!==id));
      // If this was a group timer, also finish all remaining queued sub-tasks
      if(t.GroupId){await finishGroupTimer(t.GroupId,status,notes,rawMs,pMs);}
      else{fl(status==="Completed"?"Task completed!":"Task: "+status);await reload();}
    }catch(e){fl("Error: "+e.message);}
  }
  async function cancelTimer(id){
    const t=timers.find(x=>x._localId===id);if(!t)return;
    const tk=await gT();
    if(t._spId){try{await gPatch(tk,iUrl("VA_Activity",t._spId),{Status:"Queued",StartTime:null});}catch(e){console.warn("[VT] Cancel patch failed:",e);}}
    setTimers(p=>p.filter(x=>x._localId!==id));
    if(t.GroupId){
      // Restore sibling sub-tasks from SP back to local queue
      try{
        let siblings=[];
        try{
          siblings=await gAll(tk,`${lUrl("VA_Activity")}?$filter=fields/GroupId eq '${t.GroupId}' and fields/Status eq 'Queued'&expand=fields&$top=100`);
        }catch(e){
          // GroupId column may not exist yet — fall back to local queue state
          console.warn("[VT] GroupId filter failed, using local state:",e.message);
          siblings=queue.filter(x=>x.GroupId===t.GroupId&&x.Status==="Queued").map(x=>({id:x._spId,fields:x}));
        }
        const restored=siblings.map(s=>({...s.fields,id:s.id,_localId:s.id,_spId:s.id}));
        setQueue(p=>[{...t,Status:"Queued",StartTime:null,_pMs:0,_pS:null},...restored,...p]);
      }catch{setQueue(p=>[{...t,Status:"Queued",StartTime:null,_pMs:0,_pS:null},...p]);}
    }else{setQueue(p=>[{...t,Status:"Queued",StartTime:null,_pMs:0,_pS:null},...p]);}
  }

  // ── Add grouped tasks (multi-property assign) ──
  async function addGroupedTasks(baseTask, propList){
    // propList = array of {PropertyId, PropertyName, PMName} or [] for general
    if(!propList||propList.length<=1){
      // Single task — use regular addTask (no group)
      const single=propList.length===1?{...baseTask,...propList[0]}:baseTask;
      await addTask(single);return;
    }
    const groupId=uid();
    const tk=await gT();
    const targetVa=data?.vas.find(v=>v.Email?.toLowerCase()===baseTask.VAEmail?.toLowerCase());
    const isOut=targetVa&&targetVa.VATrackerStatus==="Out";
    const saved=[];
    for(const p of propList){
      const t={...baseTask,...p,Status:"Queued",ActivityDate:today(),ActivityType:"Task",GroupId:groupId,
        Source:isOut?"Coverage":baseTask.Source,
        CoverageForEmail:isOut?targetVa.Email:"",
        CoverageForName:isOut?targetVa.Name:""};
      const res=await gPostActivity(tk,actFields(t,{GroupId:groupId}));
      saved.push({...t,_localId:res.id,_spId:res.id,id:res.id});
    }
    if(isOut){setCovQ(p=>[...saved,...p]);fl(`${targetVa.Name} is OUT — ${saved.length} tasks to coverage`);}
    else{setQueue(p=>[...saved,...p]);fl(`Group created: ${saved.length} properties`);}
  }

  // ── Complete all tasks in a group (used by group timer finish) ──
  async function finishGroupTimer(groupId, status, notes, durationMs, pauseMs){
    const tk=await gT();
    // Find all tasks in this group across queue and timers
    const groupTasks=queue.filter(t=>t.GroupId===groupId);
    const total=groupTasks.length+1; // +1 for the timer task itself
    const perDur=Math.max(1,Math.round((durationMs-pauseMs)/(total*6e4)));
    const perPause=Math.round(pauseMs/(total*6e4));
    const endTime=status==="Completed"?new Date().toISOString():null;
    // Patch all queued sub-tasks
    for(const t of groupTasks){
      if(t._spId){
        try{await gPatch(tk,iUrl("VA_Activity",t._spId),{Status:status,EndTime:endTime,DurationMin:perDur,PausedMin:perPause,Notes:notes||""});}
        catch(e){console.warn("[VT] Group patch failed:",e);}
      }
    }
    setQueue(p=>p.filter(t=>t.GroupId!==groupId));
    await reload();
  }

    fl(status==="Completed"?"Sub-task done!":"Sub-task: "+status);
  }

  // ── Cleanup Duplicates ──
  async function cleanupDuplicates(){
    if(!window.confirm("This will delete duplicate tasks created today, keeping one of each. Continue?"))return;
    const tk=await gT();
    const td=today();
    const d=await loadAll(tk);
    const todayTasks=d.activities.filter(a=>a.ActivityType==="Task"&&a.ActivityDate&&a.ActivityDate.slice(0,10)===td);
    const seen=new Map();const toDelete=[];
    todayTasks.forEach(t=>{
      const key=`${t.VAEmail?.toLowerCase()}|${t.Title}|${t.PropertyId||""}`;
      if(seen.has(key)){toDelete.push(t);}
      else{seen.set(key,t);}
    });
    if(!toDelete.length){fl("No duplicates found!");return;}
    fl(`Removing ${toDelete.length} duplicates...`);
    let removed=0;
    for(const t of toDelete){
      try{await gPatch(tk,iUrl("VA_Activity",t.id),{Status:"Incomplete",Notes:"Duplicate — auto-removed"});removed++;}catch(e){console.warn("[VT] Cleanup failed:",t.id,e.message);}
    }
    await reload();fl(`Cleaned up ${removed} duplicate tasks`);
  }

  // ── Weekly Report ──
  function generateWeeklyReport(){
    if(!data)return null;
    const now=new Date();const mon=new Date(now);mon.setDate(mon.getDate()-(mon.getDay()+6)%7-7);mon.setHours(0,0,0,0);
    const sun=new Date(mon);sun.setDate(sun.getDate()+6);sun.setHours(23,59,59,999);
    const from=mon.toISOString().slice(0,10),to=sun.toISOString().slice(0,10);
    const tasks=data.activities.filter(a=>a.ActivityType==="Task"&&inRange(actDate(a),from,to));
    const shifts=data.activities.filter(a=>a.ActivityType==="Shift"&&inRange(actDate(a),from,to));
    const done=tasks.filter(t=>t.Status==="Completed");
    const blocked=tasks.filter(t=>t.Status==="Blocked");
    const inc=tasks.filter(t=>t.Status==="Incomplete");

    let report=`VA PRODUCTIVITY TRACKER — WEEKLY REPORT\nNewShire Property Management\nWeek: ${fD(from)} – ${fD(to)}\nGenerated: ${new Date().toLocaleString()}\nPrepared by: Brandy Turner\n${"=".repeat(60)}\n\n`;
    report+=`SUMMARY\n${"-".repeat(40)}\nTotal Tasks: ${tasks.length}\nCompleted: ${done.length} (${tasks.length?Math.round(done.length/tasks.length*100):0}%)\nBlocked: ${blocked.length}\nIncomplete: ${inc.length}\n\n`;

    data.vas.forEach(va=>{
      const vT=tasks.filter(t=>t.VAEmail===va.Email);const vD=vT.filter(t=>t.Status==="Completed");const vB=vT.filter(t=>t.Status==="Blocked");const vI=vT.filter(t=>t.Status==="Incomplete");
      const vS=shifts.filter(s=>s.VAEmail===va.Email);const vSm=vS.reduce((s,a)=>s+(a.WorkMinutes||0),0);const vTm=vD.reduce((s,t)=>s+(t.DurationMin||0),0);
      const vU=vSm>0?Math.round(vTm/vSm*100):0;const vR=vT.length?Math.round(vD.length/vT.length*100):0;
      report+=`\n${"=".repeat(60)}\n${va.Name.toUpperCase()}${getVAStatus(va)==="Out"?" [OUT]":""}\n${"=".repeat(60)}\n`;
      report+=`Tasks: ${vD.length}/${vT.length} completed (${vR}%)\nShift Time: ${fM(vSm)} | Task Time: ${fM(vTm)} | Utilization: ${vU}%\n`;
      if(vB.length)report+=`\nBLOCKED (${vB.length}):\n${vB.map(t=>`  • ${t.Title} — ${t.PropertyName}${t.Notes?" — "+t.Notes:""}`).join("\n")}\n`;
      if(vI.length)report+=`\nINCOMPLETE (${vI.length}):\n${vI.map(t=>`  • ${t.Title} — ${t.PropertyName}${t.Notes?" — "+t.Notes:""}`).join("\n")}\n`;

      // Category breakdown
      const catM={};vD.forEach(t=>{if(!catM[t.Category])catM[t.Category]={c:0,m:0};catM[t.Category].c++;catM[t.Category].m+=(t.DurationMin||0);});
      const catL=Object.entries(catM).sort((a,b)=>b[1].m-a[1].m);
      if(catL.length){report+=`\nTIME BY CATEGORY:\n${catL.map(([cat,d])=>`  ${cat}: ${d.c} tasks, ${fM(d.m)}`).join("\n")}\n`;}

      // Property breakdown
      const propM={};vT.forEach(t=>{const pn=t.PropertyName||"General";if(!propM[pn])propM[pn]={done:0,total:0};propM[pn].total++;if(t.Status==="Completed")propM[pn].done++;});
      report+=`\nPROPERTY BREAKDOWN:\n${Object.entries(propM).map(([pn,d])=>`  ${pn}: ${d.done}/${d.total}`).join("\n")}\n`;
    });

    // Coverage summary
    const covTasks=tasks.filter(t=>t.CoverageForEmail);
    if(covTasks.length)report+=`\n${"=".repeat(60)}\nCOVERAGE TASKS: ${covTasks.length}\n${covTasks.map(t=>`  ${t.VAName} covered for ${t.CoverageForName}: ${t.Title}`).join("\n")}\n`;

    return{report,from,to};
  }

  // ── Config update ──
  async function updateConfig(nc){
    try{const t=await gT();const ci=await gAll(t,`${lUrl("VA_TrackerConfig")}?expand=fields&$top=10`);
      const item=ci.find(c=>c.fields.Title==="VATrackerSettings");if(!item){fl("Config not found");return;}
      await gPatch(t,iUrl("VA_TrackerConfig",item.id),{ConfigJSON:JSON.stringify(nc)});await reload();fl("Config saved!");
    }catch(e){fl("Error: "+e.message);}
  }

  // ── Portfolio ──
  async function assignProp(vaEmail,vaName,propId){
    try{const t=await gT();const prop=data.properties.find(p=>p.Title===propId);if(!prop)return;
      const ex=data.portfolios.find(p=>p.VAEmail?.toLowerCase()===vaEmail.toLowerCase()&&p.PropertyId===propId);
      if(ex)await gPatch(t,iUrl("VA_Portfolios",ex.id),{IsActive:true});
      else await gPost(t,lUrl("VA_Portfolios"),{Title:`${vaName.split(" ")[0]}-${prop.PropertyName.replace(/\s+/g,"")}`.slice(0,50),VAEmail:vaEmail,VAName:vaName,PropertyId:propId,PropertyName:prop.PropertyName,AssignedDate:new Date().toISOString(),IsActive:true});
      await reload();fl(`${prop.PropertyName} → ${vaName}`);
    }catch(e){fl("Error: "+e.message);}
  }
  async function unassignProp(portId,propName,vaName){
    try{const t=await gT();await gPatch(t,iUrl("VA_Portfolios",portId),{IsActive:false});await reload();fl(`${propName} removed from ${vaName}`);}catch(e){fl("Error: "+e.message);}
  }

  // ── Guest management ──
  async function addGuest({name,email,company,vaEmails}){
    try{
      const t=await gT();
      // Send Azure B2B invite
      try{
        await gRawPost(t,"https://graph.microsoft.com/v1.0/invitations",{
          invitedUserEmailAddress:email,
          inviteRedirectUrl:"https://newshirepm.github.io/va-tracker/",
          sendInvitationMessage:true,
          invitedUserDisplayName:name
        });
        console.log("[VT] B2B invite sent to",email);
      }catch(invErr){
        console.warn("[VT] B2B invite failed (may need User.Invite.All permission):",invErr.message);
        // Continue to create the record even if invite fails
      }
      await gPost(t,lUrl("VA_Guests"),{Title:`Guest-${Date.now()}`,GuestName:name,GuestEmail:email.toLowerCase(),Company:company||"",VAEmails:vaEmails.join(","),IsActive:true,InvitedDate:new Date().toISOString(),InvitedBy:acct?.name||myEmail});
      await reload();fl(`${name} invited!`);
    }catch(e){fl("Error inviting guest: "+e.message);}
  }
  async function updateGuest(id,fields){
    try{const t=await gT();await gPatch(t,iUrl("VA_Guests",id),fields);await reload();fl("Guest updated!");}catch(e){fl("Error: "+e.message);}
  }
  async function deactivateGuest(id,name){
    if(!window.confirm(`Revoke access for ${name}?`))return;
    try{const t=await gT();await gPatch(t,iUrl("VA_Guests",id),{IsActive:false});await reload();fl(`${name} access revoked`);}catch(e){fl("Error: "+e.message);}
  }

  // ── Property CRUD ──
  async function addProperty(p){
    try{const t=await gT();await gPost(t,lUrl("VA_Properties"),{Title:`PROP-${String(data.properties.length+1).padStart(3,"0")}`,PropertyName:p.name,PropertyGroup:p.group,Units:p.units,PMEmail:p.pmEmail,PMName:p.pmName,AppFolioId:p.appFolioId||"",IsActive:true});
      await reload();fl(`${p.name} added!`);
    }catch(e){fl("Error: "+e.message);}
  }
  async function editProperty(id,fields){
    try{const t=await gT();await gPatch(t,iUrl("VA_Properties",id),fields);await reload();fl("Property updated!");}catch(e){fl("Error: "+e.message);}
  }
  async function deactivateProperty(id,name){
    if(!window.confirm(`Deactivate ${name}? It will be hidden but not deleted.`))return;
    try{const t=await gT();await gPatch(t,iUrl("VA_Properties",id),{IsActive:false});await reload();fl(`${name} deactivated`);}catch(e){fl("Error: "+e.message);}
  }

  // ── Helpers for manager view ──
  function getVAForProperty(propId){
    const port=data?.portfolios.find(p=>p.PropertyId===propId);
    if(!port)return null;
    return data?.vas.find(v=>v.Email?.toLowerCase()===port.VAEmail?.toLowerCase())||null;
  }
  function myManagedProps(){
    if(!data||!myEmail)return[];
    return data.properties.filter(p=>p.PMEmail?.toLowerCase()===myEmail);
  }

  // ============================================================
  // COMPUTED
  // ============================================================
  const isAdmin=role==="admin";
  const isMgr=role==="admin"||role==="manager";
  const isVA=role==="va";
  const isGuest=role==="guest";
  const myVa=data?.vas.find(v=>v.Email&&v.Email.toLowerCase()===myEmail);
  const myPort=data?data.portfolios.filter(p=>p.VAEmail&&p.VAEmail.toLowerCase()===myEmail):[];
  const myProps=data?myPort.map(p=>data.properties.find(pr=>pr.Title===p.PropertyId)).filter(Boolean):[];
  const mgrProps=myManagedProps();
  const myQ=queue.filter(t=>isVA?(t.VAEmail&&t.VAEmail.toLowerCase()===myEmail):true);
  const myTm=timers.filter(t=>isVA?t.VAEmail.toLowerCase()===myEmail:true);
  const outVAs=data?data.vas.filter(v=>getVAStatus(v)==="Out"):[];
  // Guest computed
  const guestVAEmails=isGuest&&myGuest?.VAEmails?myGuest.VAEmails.split(",").map(e=>e.trim().toLowerCase()).filter(Boolean):[];
  const guestVAs=isGuest?data?.vas.filter(v=>guestVAEmails.includes(v.Email?.toLowerCase()))||[]:null;

  // ============================================================
  // RENDER: Auth screens
  // ============================================================
  if(!acct)return(<div style={S.page}><div style={S.header}><div><div style={S.headerTitle}>{CONFIG.appName}</div><div style={S.headerSub}>NewShire Property Management</div></div></div><div style={{...S.content,textAlign:"center",paddingTop:80}}><div style={S.card}><div style={{fontSize:40,marginBottom:16}}>{"\u23F1"}</div><div style={{fontSize:20,fontWeight:700,color:C.teal700,marginBottom:8}}>VA Productivity Tracker</div><div style={{color:C.gray400,marginBottom:24}}>Sign in with your NewShire account.</div><button style={S.btn(C.headerBg)} onClick={login}>Sign In with Microsoft</button>{authErr&&<div style={{color:C.error,marginTop:12,fontSize:13}}>{authErr}</div>}</div></div></div>);
  if(loading)return(<div style={S.page}><div style={S.header}><div><div style={S.headerTitle}>{CONFIG.appName}</div><div style={S.headerSub}>NewShire Property Management</div></div></div><div style={{...S.content,textAlign:"center",paddingTop:80}}><div style={{fontSize:18,color:C.gray400}}>Loading...</div></div></div>);
  if(error||!role){
    const matchedEmp=data?data.employees.find(e=>(e.Email&&e.Email.toLowerCase()===myEmail)||(e.M365UserId&&e.M365UserId.toLowerCase()===myEmail)):null;
    const allEmails=data?data.employees.map(e=>e.Email||"(blank)").join(", "):"loading...";
    return(<div style={S.page}><div style={S.header}><div><div style={S.headerTitle}>{CONFIG.appName}</div><div style={S.headerSub}>NewShire Property Management</div></div></div><div style={{...S.content,textAlign:"center",paddingTop:80}}><div style={{...S.card,borderLeft:`3px solid ${C.error}`}}><div style={{fontSize:40,marginBottom:16}}>{"\u{1F6AB}"}</div><div style={{fontSize:18,fontWeight:600,color:C.error,marginBottom:8}}>{error==="access_denied"?"Access Denied":"Error"}</div><div style={{color:C.gray400,marginBottom:16}}>{error==="access_denied"?"Your account is not authorized.":error}</div><div style={{background:C.teal50,border:`1px solid ${C.teal100}`,borderRadius:6,padding:12,textAlign:"left",fontSize:12,fontFamily:mono}}><div style={{fontWeight:700,color:C.teal700,marginBottom:8}}>{"\u{1F4CB}"} Please send this info to Brandy:</div><div style={{color:C.gray600,marginBottom:4}}>Signed in as: <strong>{myEmail}</strong></div><div style={{color:C.gray600,marginBottom:4}}>Records loaded: <strong>{data?data.employees.length:"..."}</strong></div><div style={{color:C.gray600,marginBottom:4}}>Match: <strong>{matchedEmp?`FOUND — ${matchedEmp.JobTitle} (role: ${matchedEmp.VATrackerRole||"auto"})`:"NOT FOUND"}</strong></div><div style={{color:C.gray600,wordBreak:"break-all"}}>Emails on file: <strong>{allEmails}</strong></div></div></div></div></div>);
  }

  // ============================================================
  // TABS
  // ============================================================
  const TABS=[];
  if(isGuest){
    TABS.push({n:"Dashboard",k:"gdash"});
    TABS.push({n:`Active${timers.filter(t=>guestVAEmails.includes(t.VAEmail?.toLowerCase())).length?` (${timers.filter(t=>guestVAEmails.includes(t.VAEmail?.toLowerCase())).length})`:""}`,k:"gactive"});
    TABS.push({n:"History",k:"history"});
    TABS.push({n:"Scorecard",k:"score"});
  } else {
    if(isMgr)TABS.push({n:"Dashboard",k:isAdmin?"dash":"mdash"});
    if(isVA||isAdmin)TABS.push({n:`My Tasks${myQ.length?` (${myQ.length})`:""}`,k:"tasks"});
    if(isVA||isAdmin)TABS.push({n:`Active${(isAdmin?timers.length:myTm.length)?` (${isAdmin?timers.length:myTm.length})`:""}`,k:"active"});
    if(role==="manager"||isAdmin)TABS.push({n:`My Properties${mgrProps.length?` (${mgrProps.length})`:isAdmin?" (All)":""}`,k:"mprops"});
    TABS.push({n:"History",k:"history"});
    TABS.push({n:"Scorecard",k:"score"});
    if(isAdmin)TABS.push({n:"Admin",k:"admin"});
  }
  const ck=TABS[tab]?.k||TABS[0]?.k;

  // ============================================================
  // RENDER
  // ============================================================
  return(
    <div style={S.page}>
      <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Code+Pro:wght@500;700&display=swap" rel="stylesheet"/>
      <div style={S.header}>
        <div><div style={S.headerTitle}>{CONFIG.appName}</div><div style={S.headerSub}>NewShire Property Management</div></div>
        <div style={S.headerUser}>
          <div style={{fontWeight:600}}>{isGuest?myGuest?.GuestName:acct.name||myEmail}</div>
          <div style={{fontSize:11,color:isGuest?C.purple:C.gold500,textTransform:"uppercase"}}>{isGuest?`Guest${myGuest?.Company?` · ${myGuest.Company}`:""}${guestVAs?` · ${guestVAs.length} VAs`:""}`:role+( role==="manager"?` · ${mgrProps.length} properties`:"")}</div>
          <div style={{display:"flex",gap:4,justifyContent:"flex-end",marginTop:2}}>
            {isGuest?<Badge type="purple">Read-Only</Badge>:<>{timers.length>0&&<Badge type="success">{timers.length} timing</Badge>}{covQ.length>0&&<Badge type="warning">{covQ.length} coverage</Badge>}{outVAs.length>0&&<Badge type="error">{outVAs.length} out</Badge>}</>}
          </div>
        </div>
      </div>
      <div style={S.tabBar}>{TABS.map((t,i)=><button key={t.k} style={S.tab(tab===i)} onClick={()=>setTab(i)}>{t.n}</button>)}</div>
      {flash&&<div style={{background:C.gold50,borderBottom:`1px solid ${C.gold500}`,padding:"8px 20px",fontSize:13,fontWeight:600,color:C.gold700,textAlign:"center"}}>{flash}</div>}
      <div style={S.content}>
        {ck==="gdash"&&<DashboardView data={data} queue={queue} timers={timers} covQ={covQ} dfFrom={dfFrom} dfTo={dfTo} setDfFrom={setDfFrom} setDfTo={setDfTo} filterProps={null} filterVAs={guestVAs} isGuest={true}/>}
        {ck==="gactive"&&<ActiveView timers={timers.filter(t=>guestVAEmails.includes(t.VAEmail?.toLowerCase()))} tick={tick} isMgr={true} readOnly={true} onPause={pauseTimer} onResume={resumeTimer} onFinish={finishTimer} onCancel={cancelTimer}/>}
        {ck==="dash"&&<DashboardView data={data} queue={queue} timers={timers} covQ={covQ} dfFrom={dfFrom} dfTo={dfTo} setDfFrom={setDfFrom} setDfTo={setDfTo} filterProps={null}/>}
        {ck==="mdash"&&<DashboardView data={data} queue={queue} timers={timers} covQ={covQ} dfFrom={dfFrom} dfTo={dfTo} setDfFrom={setDfFrom} setDfTo={setDfTo} filterProps={mgrProps}/>}
        {ck==="tasks"&&<MyTasksView data={data} role={role} myEmail={myEmail} myVa={myVa} myProps={myProps} queue={queue} covQ={covQ} shift={shift} timers={timers} tick={tick} onClockIn={clockIn} onBreakStart={startBreak} onBreakEnd={endBreak} onClockOut={clockOut} onStartTimer={startTimer} onClaimCov={claimCov} onAddTask={addTask} onDeleteTask={deleteTask} onCompleteSubTask={completeSubTask} config={data?.config}/>}
        {ck==="active"&&<ActiveView timers={isVA?timers.filter(t=>t.VAEmail.toLowerCase()===myEmail):timers} tick={tick} isMgr={isMgr} onPause={pauseTimer} onResume={resumeTimer} onFinish={finishTimer} onCancel={cancelTimer}/>}
        {ck==="mprops"&&<ManagerPropsView data={data} myEmail={myEmail} myEmp={myEmp} mgrProps={isAdmin?data.properties:mgrProps} queue={queue} timers={timers} covQ={covQ} onAddTask={addTask} getVA={getVAForProperty} isAdmin={isAdmin}/>}
        {ck==="history"&&<HistoryView data={data} role={role} myEmail={myEmail} isMgr={isMgr} mgrProps={mgrProps} guestVAEmails={guestVAEmails}/>}
        {ck==="score"&&<ScorecardView data={data} role={role} myEmail={myEmail} isMgr={isMgr} myVa={myVa} myProps={myProps} mgrProps={mgrProps} guestVAs={guestVAs}/>}
        {ck==="admin"&&<AdminView data={data} myEmail={myEmail} acct={acct} config={data?.config} queue={queue} covQ={covQ} onToggleAbsence={toggleAbsence} onRecoverTasks={recoverTasks} onAssignTask={addTask} onAddGroupedTasks={addGroupedTasks} onCloseDay={closeDay} onUpdateConfig={updateConfig} onAssignProp={assignProp} onUnassignProp={unassignProp} onAddProperty={addProperty} onEditProperty={editProperty} onDeactivateProperty={deactivateProperty} onDeleteTask={deleteTask} onCompleteSubTask={completeSubTask} generateReport={generateWeeklyReport} onAddGuest={addGuest} onUpdateGuest={updateGuest} onDeactivateGuest={deactivateGuest} onCleanup={cleanupDuplicates}/>}
      </div>
    </div>
  );
}

// ============================================================
// DASHBOARD — shared by Admin (all) and Manager (filtered)
// ============================================================
function DashboardView({data,queue,timers,covQ,dfFrom,dfTo,setDfFrom,setDfTo,filterProps,filterVAs,isGuest}){
  if(!data)return null;
  // Filter activities by date range and optionally by properties
  const propIds=filterProps?new Set(filterProps.map(p=>p.Title)):null;
  const vaEmailSet=filterVAs?new Set(filterVAs.map(v=>v.Email?.toLowerCase())):null;
  const tasks=data.activities.filter(a=>a.ActivityType==="Task"&&inRange(actDate(a),dfFrom,dfTo)&&(!propIds||propIds.has(a.PropertyId))&&(!vaEmailSet||vaEmailSet.has(a.VAEmail?.toLowerCase())));
  const done=tasks.filter(a=>a.Status==="Completed");
  const blocked=tasks.filter(a=>a.Status==="Blocked");
  const inc=tasks.filter(a=>a.Status==="Incomplete");
  const shifts=data.activities.filter(a=>a.ActivityType==="Shift"&&inRange(actDate(a),dfFrom,dfTo)&&(!vaEmailSet||vaEmailSet.has(a.VAEmail?.toLowerCase())));
  const shiftMin=shifts.reduce((s,a)=>s+(a.WorkMinutes||0),0);
  const taskMin=done.reduce((s,a)=>s+(a.DurationMin||0),0);
  const rate=tasks.length?Math.round(done.length/tasks.length*100):0;
  const util=shiftMin>0?Math.round(taskMin/shiftMin*100):0;
  const filteredVAs=filterVAs||( propIds?data.vas.filter(v=>data.portfolios.some(p=>propIds.has(p.PropertyId)&&p.VAEmail?.toLowerCase()===v.Email.toLowerCase())):data.vas);

  return(
    <div>
      {/* Date filter */}
      <div style={{...S.card,display:"flex",gap:12,alignItems:"flex-end",flexWrap:"wrap",padding:12}}>
        <div><label style={S.label}>From</label><input type="date" style={{...S.input,width:150}} value={dfFrom} onChange={e=>setDfFrom(e.target.value)}/></div>
        <div><label style={S.label}>To</label><input type="date" style={{...S.input,width:150}} value={dfTo} onChange={e=>setDfTo(e.target.value)}/></div>
        <div style={{display:"flex",gap:6}}>
          {[{l:"7d",d:7},{l:"14d",d:14},{l:"30d",d:30},{l:"90d",d:90}].map(p=><button key={p.l} style={{...S.btnO(C.teal600,C.teal100),...S.btnSm}} onClick={()=>{const f=new Date();f.setDate(f.getDate()-p.d);setDfFrom(f.toISOString().slice(0,10));setDfTo(today());}}>{p.l}</button>)}
        </div>
        {filterProps&&<div style={{fontSize:12,color:C.gold700,fontWeight:600,marginLeft:"auto"}}>Showing {filterProps.length} managed properties</div>}
      </div>

      {/* KPIs */}
      {isGuest&&<div style={{background:C.purpleBg,border:`1px solid ${C.purple}`,borderRadius:6,padding:"8px 14px",marginBottom:12,fontSize:12,color:C.purple,display:"flex",alignItems:"center",gap:8}}><span>👁️</span><span>Read-only view — showing data for: <strong>{filteredVAs.map(v=>v.Name).join(", ")}</strong></span></div>}
      <div style={{...S.row,marginBottom:16}}>
        <KPI label="Tasks" value={tasks.length}/>
        <KPI label="Done" value={done.length} color={C.success}/>
        <KPI label="Rate" value={`${rate}%`} color={rate>=85?C.success:rate>=60?C.warning:tasks.length?C.error:C.teal700}/>
        {!filterProps&&!isGuest&&<KPI label="Shift Hrs" value={fM(shiftMin)}/>}
        {!filterProps&&!isGuest&&<KPI label="Utilization" value={`${util}%`} color={util>=75?C.success:util>=50?C.warning:shiftMin>0?C.error:C.teal700}/>}
        <KPI label="Blocked" value={blocked.length} color={blocked.length>0?C.error:C.success}/>
        {!isGuest&&<KPI label="Coverage" value={covQ.length} color={covQ.length>0?C.warning:C.success}/>}
        {!filterProps&&!isGuest&&<KPI label="VAs Out" value={data.vas.filter(v=>getVAStatus(v)==="Out").length} color={data.vas.filter(v=>getVAStatus(v)==="Out").length>0?C.warning:C.teal700}/>}
      </div>

      {/* Needs Attention */}
      {(blocked.length>0||inc.length>0||covQ.length>0)&&(
        <div style={{...S.card,borderLeft:`3px solid ${C.error}`,background:C.errorBg}}>
          <div style={{fontSize:16,fontWeight:600,color:C.error,marginBottom:10}}>{"\u{1F6A8}"} Needs Attention</div>
          {blocked.length>0&&<div style={{marginBottom:8}}><div style={{fontSize:12,fontWeight:600,color:C.error,marginBottom:4}}>Blocked Tasks ({blocked.length})</div>{blocked.slice(0,5).map((t,i)=><div key={i} style={{fontSize:13,color:C.gray600,padding:"3px 0"}}>{t.VAName}: {t.Title} — {t.PropertyName}{t.Notes?` · ${t.Notes}`:""}</div>)}{blocked.length>5&&<div style={{fontSize:11,color:C.gray400}}>+{blocked.length-5} more</div>}</div>}
          {covQ.length>0&&<div style={{marginBottom:8}}><div style={{fontSize:12,fontWeight:600,color:C.warning,marginBottom:4}}>Unclaimed Coverage ({covQ.length})</div>{covQ.slice(0,5).map((t,i)=><div key={i} style={{fontSize:13,color:C.gray600,padding:"3px 0"}}>{t.Title} — covering {t.CoverageForName}</div>)}</div>}
          {inc.length>3&&<div><div style={{fontSize:12,fontWeight:600,color:C.gray400,marginBottom:4}}>High Incomplete Rate</div><div style={{fontSize:13,color:C.gray600}}>{inc.length} tasks marked incomplete in this period</div></div>}
        </div>
      )}

      {/* Kanban */}
      <div style={S.card}>
        <div style={S.cardTitle}>{"\u{1F4CB}"} Task Board</div>
        <div style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:8}}>
          {filteredVAs.map(va=>{
            const isOut=getVAStatus(va)==="Out";
            const vQ=queue.filter(t=>t.VAEmail&&t.VAEmail.toLowerCase()===va.Email.toLowerCase());
            const vT=timers.filter(t=>t.VAEmail.toLowerCase()===va.Email.toLowerCase());
            const port=data.portfolios.filter(p=>p.VAEmail?.toLowerCase()===va.Email.toLowerCase());
            return(
              <div key={va.Email} style={{flex:"1 0 200px",minWidth:200,background:isOut?C.errorBg:C.pageBg,borderRadius:6,padding:10,border:`1px solid ${isOut?"rgba(196,75,59,0.2)":C.gray100}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,paddingBottom:6,borderBottom:`2px solid ${C.teal100}`}}>
                  <div><div style={{fontSize:13,fontWeight:700,color:isOut?C.error:C.teal700}}>{va.Name}{isOut?" \u{1F6D1}":""}</div><div style={{fontSize:10,color:C.gray400}}>{port.length} props</div></div>
                  {isOut?<Badge type="error">OUT</Badge>:vT.length>0?<Badge type="success">Active</Badge>:<span style={{fontSize:10,color:C.gray300}}>Offline</span>}
                </div>

                const vS=shifts.filter(a=>a.VAEmail===va.Email);const vSm=vS.reduce((s,a)=>s+(a.WorkMinutes||0),0);const vTm=vD.reduce((s,a)=>s+(a.DurationMin||0),0);
                const vR=vT.length?Math.round(vD.length/vT.length*100):0;const vU=vSm>0?Math.round(vTm/vSm*100):0;

// ============================================================
// TASK GROUP ROW — collapsible parent for grouped tasks

function TaskGroupRow({tasks,onStartGroup,onDelete,onCompleteSubTask,showVA,sourceColor,sourceLabel}){
  const[expanded,setExpanded]=useState(false);
  const first=tasks[0];

  const done=tasks.filter(t=>t.Status==="Completed").length;
  const blocked=tasks.filter(t=>t.Status==="Blocked").length;
  const pct=total?Math.round(done/total*100):0;
  const allDone=done===total;
  const anyBlocked=blocked>0;
  const pending=tasks.filter(t=>t.Status!=="Completed"&&t.Status!=="Blocked");

  return(<div style={{borderBottom:`1px solid ${C.gray100}`}}>
    {/* Group header */}
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 0",cursor:"pointer"}} onClick={()=>setExpanded(x=>!x)}>
      <span style={{fontSize:16,flexShrink:0}}>{getIcon(first.icon,first.Category)}</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          <span style={{fontSize:13,fontWeight:600,color:allDone?C.success:anyBlocked?C.error:C.teal700}}>{first.Title}</span>
          <span style={{fontSize:10,fontWeight:600,background:C.teal100,color:C.teal700,borderRadius:99,padding:"1px 7px"}}>{total} {total===1?"property":"properties"}</span>
          {first.Priority!=="Normal"&&<Badge type={first.Priority==="Urgent"?"error":"warning"}>{first.Priority}</Badge>}
          {sourceLabel&&<span style={{fontSize:10,fontWeight:700,color:sourceColor||C.gray400,textTransform:"uppercase",letterSpacing:"0.04em"}}>{sourceLabel}</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:3}}>
          <div style={{width:80,height:5,background:C.gray100,borderRadius:3,overflow:"hidden",flexShrink:0}}>
            <div style={{width:`${pct}%`,height:"100%",background:allDone?C.success:anyBlocked?C.error:C.gold500,borderRadius:3,transition:"width 0.3s"}}/>
          </div>
          <span style={{fontSize:11,fontWeight:600,color:allDone?C.success:anyBlocked?C.error:C.teal700}}>{pct}%</span>
          <span style={{fontSize:10,color:C.gray400}}>{done}/{total} done</span>
          {anyBlocked&&<Badge type="error">{blocked} blocked</Badge>}
          {showVA&&<span style={{fontSize:10,color:C.gray400}}>{first.VAName}</span>}
        </div>
      </div>
      <div style={{display:"flex",gap:4,flexShrink:0,alignItems:"center"}}>
        {!allDone&&onStartGroup&&pending.length>0&&<button style={{...S.btn(C.success),...S.btnSm}} onClick={e=>{e.stopPropagation();onStartGroup(first,tasks);}}>{"\u25B6"} Start</button>}
        {allDone&&<span style={{fontSize:11,color:C.success,fontWeight:700}}>{"\u2713"} Complete</span>}
        <span style={{fontSize:14,color:C.gray400,userSelect:"none"}}>{expanded?"\u25B2":"\u25BC"}</span>
      </div>
    </div>
    {/* Sub-tasks */}
    {expanded&&<div style={{marginLeft:24,borderLeft:`2px solid ${C.teal100}`,paddingLeft:10,paddingBottom:4,marginBottom:4}}>
      {tasks.map(t=>(
        <TaskRow key={t._localId} task={t} compact={true}
          onComplete={onCompleteSubTask&&t.Status!=="Completed"?onCompleteSubTask:null}
          onDelete={onDelete?()=>onDelete(t):null}
          showVA={false}/>
      ))}
    </div>}
  </div>);
}

// ============================================================
// HELPER — group tasks by GroupId for rendering
// ============================================================
function groupTasks(tasks,allowFallback=false){
  const groups={};
  tasks.forEach(t=>{
    // Group by GroupId if present, OR by Title+VAEmail+Source if multiple properties (fallback)
    const key=t.GroupId||(allowFallback&&t.PropertyId?`fb|${t.VAEmail}|${t.Title}|${t.Source}`:null);
    if(key){
      if(!groups[key])groups[key]=[];
      groups[key].push(t);
    }
  });
  const result=[];
  const seen=new Set();
  tasks.forEach(t=>{
    const key=t.GroupId||(allowFallback&&t.PropertyId?`fb|${t.VAEmail}|${t.Title}|${t.Source}`:null);
    if(!key||!groups[key]||groups[key].length<2){
      result.push({type:"single",task:t});
    } else if(!seen.has(key)){
      seen.add(key);
      result.push({type:"group",tasks:groups[key]});
    }
  });
  return result;
}

    saveRec([...rTasks,...newTasks]);setRDesc("");setRVa("");setRCat("");setRProps([]);setRFreq("daily");setRDay(1);setRIcon("folder");setShowRec(false);}

  return(<div>
    {/* Absence */}

      {showAddProp&&<div style={{background:C.teal50,borderRadius:6,padding:14,marginBottom:14,border:`1px solid ${C.teal100}`}}>
        <div style={S.row}><div style={{flex:2,minWidth:150}}><label style={S.label}>Name *</label><input style={S.input} value={npName} onChange={e=>setNpName(e.target.value)} placeholder="Property name"/></div><div style={{flex:1,minWidth:100}}><label style={S.label}>Group *</label><select style={S.select} value={npGroup} onChange={e=>setNpGroup(e.target.value)}><option>Multifamily</option><option>Single Family</option><option>Lease-Up</option></select></div><div style={{minWidth:70}}><label style={S.label}>Units *</label><input style={S.input} type="number" value={npUnits} onChange={e=>setNpUnits(e.target.value)} placeholder="#"/></div></div>
        <div style={{marginTop:10}}><label style={S.label}>Property Manager *</label><select style={S.select} value={npPm} onChange={e=>setNpPm(e.target.value)}><option value="">Select PM...</option>{data.pms.map(pm=><option key={pm.Email} value={pm.Email}>{pm.Name}</option>)}</select></div>
        <button style={{...S.btn(C.success),width:"100%",marginTop:10}} onClick={()=>{if(!npName||!npUnits||!npPm)return;const pm=data.pms.find(p=>p.Email===npPm);onAddProperty({name:npName,group:npGroup,units:parseInt(npUnits)||0,pmEmail:npPm,pmName:pm?.Name||npPm});setNpName("");setNpUnits("");setNpPm("");setShowAddProp(false);}}>{"\u2713"} Add Property</button>
      </div>}
      <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["Property","Group","Units","PM","VA","Actions"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead><tbody>
        {data.properties.map(p=>{const port=data.portfolios.find(pt=>pt.PropertyId===p.Title);const va=port?data.vas.find(v=>v.Email?.toLowerCase()===port.VAEmail?.toLowerCase()):null;const isEd=editPropId===p.id;
          return<tr key={p.id}><td style={S.td}>{isEd?<input style={{...S.input,padding:"4px 8px",fontSize:12,width:140}} value={epName} onChange={e=>setEpName(e.target.value)}/>:<span style={{fontWeight:500,color:C.teal700}}>{p.PropertyName}</span>}</td>
            <td style={{...S.td,fontSize:12}}>{p.PropertyGroup}</td>
            <td style={S.td}>{isEd?<input type="number" style={{...S.input,padding:"4px 8px",fontSize:12,width:60}} value={epUnits} onChange={e=>setEpUnits(e.target.value)}/>:p.Units}</td>
            <td style={{...S.td,fontSize:12}}>{p.PMName}</td>
            <td style={{...S.td,fontSize:12}}>{va?va.Name:<span style={{color:C.gray400,fontStyle:"italic"}}>Unassigned</span>}</td>
            <td style={S.td}>{isEd?<div style={{display:"flex",gap:3}}><button style={{...S.btn(C.success),...S.btnSm,padding:"3px 8px"}} onClick={()=>{onEditProperty(p.id,{PropertyName:epName,Units:parseInt(epUnits)||p.Units});setEditPropId(null);}}>{"\u2713"}</button><button style={{...S.btnO(C.gray400,C.gray200),...S.btnSm,padding:"3px 8px"}} onClick={()=>setEditPropId(null)}>{"\u2715"}</button></div>:<div style={{display:"flex",gap:3}}><button style={{...S.btnO(C.teal600,C.teal100),...S.btnSm,padding:"3px 8px",fontSize:10}} onClick={()=>{setEditPropId(p.id);setEpName(p.PropertyName);setEpUnits(String(p.Units||0));}}>Edit</button><button style={{...S.btnO(C.error,C.error),...S.btnSm,padding:"3px 8px",fontSize:10}} onClick={()=>onDeactivateProperty(p.id,p.PropertyName)}>Deactivate</button></div>}</td></tr>;
        })}</tbody></table></div>
    </div>

    {/* Category Management */}
    <div style={S.card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:10,borderBottom:`1px solid ${C.gray100}`,marginBottom:10}}>
        <div style={{fontSize:16,fontWeight:600,color:C.teal700}}>{"\u{1F3F7}\u{FE0F}"} Task Categories</div>
        <button style={{...S.btn(C.headerBg),...S.btnSm}} onClick={()=>setShowAddCat(!showAddCat)}>{showAddCat?"Cancel":"+ Add"}</button>
      </div>
      {showAddCat&&<div style={{background:C.teal50,borderRadius:6,padding:14,marginBottom:14,border:`1px solid ${C.teal100}`}}>
        <div style={S.row}>
          <div style={{flex:2,minWidth:150}}><label style={S.label}>Category Name *</label><input style={S.input} value={ncName} onChange={e=>setNcName(e.target.value)} placeholder="e.g., Leasing"/></div>
          <div style={{flex:"0 0 auto"}}><label style={S.label}>Icon — selected: <span style={{fontSize:18}}>{ICON_MAP[ncIcon]||"\u{1F4C1}"}</span></label>
            <div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:4,maxWidth:320,border:`1px solid ${C.gray200}`,borderRadius:4,padding:6,background:C.white,maxHeight:110,overflowY:"auto"}}>
              {ICON_OPTIONS.map(opt=><button key={opt.v} title={opt.l} style={{fontSize:18,padding:"3px 5px",background:ncIcon===opt.v?C.teal100:"transparent",border:`1px solid ${ncIcon===opt.v?C.teal500:"transparent"}`,borderRadius:4,cursor:"pointer",lineHeight:1}} onClick={()=>setNcIcon(opt.v)}>{ICON_MAP[opt.v]}</button>)}
            </div>
          </div>
        </div>
        <button style={{...S.btn(C.success),width:"100%",marginTop:10}} onClick={()=>{
          if(!ncName)return;
          const newId="c"+Date.now().toString(36);
          const newCats=[...cats,{id:newId,name:ncName,icon:ncIcon}];
          onUpdateConfig({...config,categories:newCats});
          // Also add to VA_Activity Category choice column (note: SharePoint choice columns auto-expand when new values are written)
          setNcName("");setNcIcon("folder");setShowAddCat(false);
        }}>{"\u2713"} Add Category</button>
      </div>}
      {sortCats(cats).map((c,i)=>{const origIdx=cats.findIndex(x=>x.id===c.id);
        const isEd=editCatId===c.id;
        return<div key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:`1px solid ${C.gray100}`}}>
          <span style={{fontSize:20}}>{getIcon(c.icon,c.name)}</span>
          <div style={{flex:1}}>
            {isEd?<div><div style={{display:"flex",gap:4,marginBottom:4}}><input style={{...S.input,padding:"4px 8px",fontSize:12}} value={ecName} onChange={e=>setEcName(e.target.value)} onKeyDown={e=>{if(e.key==="Escape")setEditCatId(null);}} autoFocus placeholder="Category name"/><button style={{...S.btnO(C.teal600,C.teal100),...S.btnSm,padding:"4px 8px",fontSize:12}} onClick={()=>setShowEcIcons(x=>!x)} title="Change icon"><span style={{fontSize:16}}>{ICON_MAP[ecIcon]||"\u{1F4C1}"}</span></button><button style={{...S.btn(C.success),...S.btnSm}} onClick={()=>{const u=[...cats];u[origIdx]={...u[origIdx],name:ecName,icon:ecIcon};onUpdateConfig({...config,categories:u});setEditCatId(null);setShowEcIcons(false);}}>{"\u2713"} Save</button></div>{showEcIcons&&<div style={{display:"flex",flexWrap:"wrap",gap:3,padding:6,background:C.white,border:`1px solid ${C.gray200}`,borderRadius:4,maxHeight:90,overflowY:"auto",marginBottom:4}}>{ICON_OPTIONS.map(opt=><button key={opt.v} title={opt.l} style={{fontSize:16,padding:"2px 4px",background:ecIcon===opt.v?C.teal100:"transparent",border:`1px solid ${ecIcon===opt.v?C.teal500:"transparent"}`,borderRadius:3,cursor:"pointer"}} onClick={()=>setEcIcon(opt.v)}>{ICON_MAP[opt.v]}</button>)}</div>}</div>
            :<div style={{fontSize:13,fontWeight:500,color:C.teal700,cursor:"pointer"}} onClick={()=>{setEditCatId(c.id);setEcName(c.name);setEcIcon(c.icon||"folder");setShowEcIcons(false);}}>{c.name}</div>}
          </div>
          {!isEd&&<div style={{display:"flex",gap:3}}>
            <button style={{...S.btnO(C.teal600,C.teal100),...S.btnSm,padding:"3px 8px",fontSize:10}} onClick={()=>{setEditCatId(c.id);setEcName(c.name);setEcIcon(c.icon||"folder");setShowEcIcons(false);}}>Edit</button>
            <button style={{...S.btnO(C.error,C.error),...S.btnSm,padding:"3px 8px",fontSize:10}} onClick={()=>{
              if(!window.confirm(`Delete "${c.name}" category? Existing tasks with this category won't be affected.`))return;
              onUpdateConfig({...config,categories:cats.filter((_,j)=>j!==origIdx)});
            }}>{"\u2715"}</button>
          </div>}
        </div>;
      })}
    </div>

    {/* Guest Management */}
    <div style={{...S.card,borderLeft:`3px solid ${C.purple}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:10,borderBottom:`1px solid ${C.gray100}`,marginBottom:10}}>
        <div><div style={{fontSize:16,fontWeight:600,color:C.teal700}}>{"\u{1F441}\u{FE0F}"} Guest Access</div><div style={{fontSize:11,color:C.gray400}}>External clients — read-only, filtered to assigned VAs. Requires User.Invite.All permission in Azure Portal.</div></div>
        <button style={{...S.btn(C.purple),...S.btnSm}} onClick={()=>setShowAddGuest(!showAddGuest)}>{showAddGuest?"Cancel":"+ Invite Guest"}</button>
      </div>
      {showAddGuest&&<div style={{background:C.purpleBg,borderRadius:6,padding:14,marginBottom:14,border:`1px solid ${C.purple}`}}>
        <div style={S.row}>
          <div style={{flex:1,minWidth:140}}><label style={S.label}>Full Name *</label><input style={S.input} value={gName} onChange={e=>setGName(e.target.value)} placeholder="Jane Smith"/></div>
          <div style={{flex:1,minWidth:180}}><label style={S.label}>Email *</label><input style={S.input} value={gEmail} onChange={e=>setGEmail(e.target.value)} placeholder="jane@example.com"/></div>
          <div style={{flex:1,minWidth:120}}><label style={S.label}>Company</label><input style={S.input} value={gCompany} onChange={e=>setGCompany(e.target.value)} placeholder="Acme Investments"/></div>
        </div>
        <div style={{marginTop:10}}><label style={S.label}>Assign VAs * {gVAs.length>0&&`(${gVAs.length} selected)`}</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:4}}>
            {data.vas.map(v=>{const sel=gVAs.includes(v.Email);return<label key={v.Email} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",fontSize:12,fontWeight:sel?600:400,color:sel?C.purple:C.teal700,background:sel?C.purpleLight:C.white,border:`1px solid ${sel?C.purple:C.gray200}`,borderRadius:4,cursor:"pointer"}}>
              <input type="checkbox" checked={sel} onChange={()=>toggleGVA(v.Email)} style={{accentColor:C.purple}}/>{v.Name}
            </label>;})}
          </div>
          {gVAs.length===0&&<div style={{fontSize:11,color:C.error,marginTop:4}}>{"\u26A0"} Select at least one VA</div>}
        </div>
        <div style={{marginTop:10,padding:8,background:C.teal50,borderRadius:4,fontSize:11,color:C.teal600}}>{"\u{1F512}"} Azure B2B invite will be emailed automatically. Guest signs in with their own Microsoft account.</div>
        <button style={{...S.btn(C.purple),width:"100%",marginTop:10,opacity:(!gName||!gEmail||!gVAs.length)?0.5:1}} onClick={handleAddGuest}>{"\u{1F4E7}"} Send Invite & Create Access</button>
      </div>}
      {(data.guests||[]).length===0&&!showAddGuest&&<div style={{textAlign:"center",padding:20,color:C.gray400,fontSize:13}}>No guests invited yet.</div>}
      {(data.guests||[]).map(g=>{const gVaList=(g.VAEmails||"").split(",").map(e=>e.trim()).filter(Boolean);const gVaNames=gVaList.map(e=>data.vas.find(v=>v.Email?.toLowerCase()===e.toLowerCase())?.Name||e).join(", ");const isEd=editGuestId===g.id;
        return<div key={g.id} style={{padding:"10px 0",borderBottom:`1px solid ${C.gray100}`}}>
          {isEd?<div style={{background:C.purpleBg,borderRadius:6,padding:12,border:`1px solid ${C.purple}`}}>
            <div style={S.row}>
              <div style={{flex:1}}><label style={S.label}>Name</label><input style={S.input} value={egName} onChange={e=>setEgName(e.target.value)}/></div>
              <div style={{flex:1}}><label style={S.label}>Company</label><input style={S.input} value={egCompany} onChange={e=>setEgCompany(e.target.value)}/></div>
            </div>
            <div style={{marginTop:8}}><label style={S.label}>VAs</label><div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:4}}>{data.vas.map(v=>{const sel=egVAs.includes(v.Email);return<label key={v.Email} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 8px",fontSize:12,fontWeight:sel?600:400,color:sel?C.purple:C.teal700,background:sel?C.purpleLight:C.white,border:`1px solid ${sel?C.purple:C.gray200}`,borderRadius:4,cursor:"pointer"}}><input type="checkbox" checked={sel} onChange={()=>toggleEGVA(v.Email)} style={{accentColor:C.purple}}/>{v.Name}</label>;})}</div></div>
            <div style={{display:"flex",gap:6,marginTop:10}}>
              <button style={{...S.btn(C.success),flex:1}} onClick={()=>saveEditGuest(g.id)}>{"\u2713"} Save</button>
              <button style={{...S.btnO(C.gray400,C.gray200),flex:1}} onClick={()=>setEditGuestId(null)}>Cancel</button>
            </div>
          </div>:<div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:13,fontWeight:600,color:C.teal700}}>{g.GuestName}</span><Badge type="purple">Guest</Badge>{g.Company&&<span style={{fontSize:11,color:C.gray400}}>· {g.Company}</span>}</div>
              <div style={{fontSize:11,color:C.gray400,marginTop:2}}>{g.GuestEmail} · Invited {fD(g.InvitedDate)} by {g.InvitedBy}</div>
              <div style={{fontSize:11,color:C.purple,marginTop:2}}>{"\u{1F441}\u{FE0F}"} {gVaNames||"No VAs assigned"}</div>
            </div>
            <div style={{display:"flex",gap:3}}>
              <button style={{...S.btnO(C.teal600,C.teal100),...S.btnSm,padding:"3px 8px",fontSize:10}} onClick={()=>startEditGuest(g)}>Edit</button>
              <button style={{...S.btnO(C.error,C.error),...S.btnSm,padding:"3px 8px",fontSize:10}} onClick={()=>onDeactivateGuest(g.id,g.GuestName)}>Revoke</button>
            </div>
          </div>}
        </div>;
      })}
    </div>

    {/* Cleanup Duplicates */}
    <div style={{...S.card,borderLeft:`3px solid ${C.info}`}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:15,fontWeight:600,color:C.teal700}}>{"\u{1F9F9}"} Cleanup Duplicates</div><div style={{fontSize:12,color:C.gray400}}>Removes duplicate tasks created today, keeps one of each.</div></div><button style={{...S.btn(C.info),...S.btnSm}} onClick={onCleanup}>Run Cleanup</button></div></div>

    {/* Data Sources */}
    <div style={{...S.card,padding:12,background:C.teal50,border:`1px solid ${C.teal100}`}}><div style={{fontSize:12,color:C.teal600}}><strong>Data:</strong> Employees → VAs/PMs/Roles. VA_Properties → property registry. VA_Portfolios → assignments. VA_TrackerConfig → categories/recurring/settings. VA_Activity → tasks/shifts/absences. VA_Guests → guest access. Auth: MSAL + Azure B2B.</div></div>

    {/* Weekly Report */}
    <div style={S.card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:10,borderBottom:`1px solid ${C.gray100}`,marginBottom:10}}>
        <div><div style={{fontSize:16,fontWeight:600,color:C.teal700}}>{"\u{1F4CA}"} Weekly Report</div><div style={{fontSize:12,color:C.gray400}}>Previous week's performance summary</div></div>
        <button style={S.btn(C.headerBg)} onClick={()=>{
          const r=generateReport();if(!r)return;
          const blob=new Blob([r.report],{type:"text/plain"});
          const url=URL.createObjectURL(blob);const a=document.createElement("a");
          a.href=url;a.download=`VA-Weekly-Report-${r.from}-to-${r.to}.txt`;a.click();URL.revokeObjectURL(url);
        }}>{"\u{1F4E5}"} Download Report</button>
      </div>
      <button style={{...S.btnO(C.teal600,C.teal100),width:"100%"}} onClick={()=>{
        const r=generateReport();if(!r)return;
        const w=window.open("","_blank","width=800,height=600");
        w.document.write(`<pre style="font-family:Consolas,monospace;font-size:13px;padding:20px;white-space:pre-wrap;">${r.report.replace(/</g,"&lt;")}</pre>`);
        w.document.title=`VA Report ${r.from} to ${r.to}`;
      }}>Preview Report</button>
    </div>

    {/* Queued Task Management */}
    {queue.length>0&&<AdminQueuePanel queue={queue} covQ={covQ} data={data} onDeleteTask={onDeleteTask} onCompleteSubTask={onCompleteSubTask}/>}

    {/* Close Day */}
    <div style={{...S.card,borderLeft:`3px solid ${C.warning}`}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:15,fontWeight:600,color:C.teal700}}>{"\u{1F504}"} Close Day</div><div style={{fontSize:12,color:C.gray400}}>Marks unfinished daily tasks Incomplete, clears coverage.</div></div><button style={S.btn(C.warning,C.dark)} onClick={onCloseDay}>Close Day</button></div></div>
  </div>);
}


// ============================================================
// ADMIN QUEUE PANEL — one level: VA collapse, tasks grouped inside
// ============================================================
function AdminQueuePanel({queue,covQ,data,onDeleteTask,onCompleteSubTask}){
  const[openVAs,setOpenVAs]=useState({});
  const allQ=[...queue,...covQ];
  const total=allQ.length;
  function toggleVA(email){setOpenVAs(p=>({...p,[email]:!p[email]}));}
  const srcLabel={Daily:"Daily",Weekly:"Weekly",Assigned:"Assigned","Ad-Hoc":"Ad-Hoc",Coverage:"Coverage"};
  const srcColor={Daily:C.teal600,Weekly:C.info,Assigned:C.gold700,"Ad-Hoc":C.gray400,Coverage:C.warning};

  return(<div style={S.card}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:10,borderBottom:`1px solid ${C.gray100}`,marginBottom:10}}>
      <div style={{...S.cardTitle,margin:0}}>{"\u{1F5D1}\u{FE0F}"} Queued Tasks ({total})</div>
      <div style={{display:"flex",gap:6}}>
        <button style={{...S.btnO(C.teal600,C.teal100),...S.btnSm,fontSize:10}} onClick={()=>{const o={};data.vas.forEach(v=>o[v.Email]=true);setOpenVAs(o);}}>Expand All</button>
        <button style={{...S.btnO(C.gray400,C.gray200),...S.btnSm,fontSize:10}} onClick={()=>setOpenVAs({})}>Collapse All</button>
      </div>
    </div>
    {data.vas.map(va=>{
      const vq=allQ.filter(t=>t.VAEmail?.toLowerCase()===va.Email.toLowerCase());
      if(!vq.length)return null;
      const isOpen=!!openVAs[va.Email];
      const grouped=groupTasks(vq,true);
      const groupCount=grouped.filter(i=>i.type==="group").length;
      const singleCount=grouped.filter(i=>i.type==="single").length;
      return<div key={va.Email} style={{marginBottom:6,border:`1px solid ${C.gray200}`,borderRadius:5,overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 12px",background:C.teal50,cursor:"pointer",userSelect:"none"}} onClick={()=>toggleVA(va.Email)}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontSize:13,fontWeight:700,color:C.teal700}}>{va.Name}</span>
            <span style={{fontSize:11,color:C.gray400}}>{grouped.length} task{grouped.length!==1?"s":""}</span>
            {groupCount>0&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:99,background:C.teal100,color:C.teal700,fontWeight:600}}>{groupCount} grouped</span>}
          </div>
          <span style={{fontSize:12,color:C.gray400}}>{isOpen?"▲":"▼"}</span>
        </div>
        {isOpen&&<div style={{padding:"4px 12px 10px"}}>
          {grouped.map((item,i)=>{
            if(item.type==="single"){
              const t=item.task;
              const sc=srcColor[t.Source]||C.gray400;
              return<div key={t._localId} style={{borderBottom:`1px solid ${C.gray100}`}}>
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0"}}>
                  <span style={{fontSize:15}}>{getIcon(t.icon,t.Category)}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:500,color:C.teal700}}>{t.Title}</div>
                    <div style={{fontSize:11,color:C.gray400,display:"flex",gap:6,marginTop:1,flexWrap:"wrap"}}>
                      <span style={{color:sc,fontWeight:600,textTransform:"uppercase",fontSize:10}}>{t.Source}</span>
                      {t.PropertyName&&t.PropertyName!=="General"&&<span>{t.PropertyName}</span>}
                      {t.Priority!=="Normal"&&<Badge type={t.Priority==="Urgent"?"error":"warning"}>{t.Priority}</Badge>}
                    </div>
                  </div>
                  {onDeleteTask&&<button style={{...S.btnO(C.error,C.error),...S.btnSm,padding:"4px 8px"}} onClick={()=>{if(window.confirm("Remove?"))onDeleteTask(t);}}>✕</button>}
                </div>
              </div>;
            }
            // Grouped
            const g=item.tasks;
            const first=g[0];
            const sc=srcColor[first.Source]||C.gray400;
            return<TaskGroupRow key={first.GroupId||first._localId} tasks={g} onDelete={onDeleteTask} onCompleteSubTask={onCompleteSubTask} showVA={false} sourceColor={sc} sourceLabel={first.Source}/>;
          })}
        </div>}
      </div>;
    })}
  </div>);
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
