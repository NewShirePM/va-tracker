// TASK ROW
// ============================================================
function TaskRow({task,onStart,onDelete,showVA,onComplete,compact,onUnclaim,onRequestHelp,onBlock,onUnblock}){
  return(<div style={{display:"flex",alignItems:"center",gap:8,padding:compact?"5px 0":"9px 0",borderBottom:`1px solid ${C.gray100}`}}>
    <span style={{fontSize:compact?13:16}}>{getIcon(task.icon,task.Category)}</span>
    <div style={{flex:1,minWidth:0}}>
      <div style={{fontSize:compact?12:13,fontWeight:500,color:C.teal700}}>{task.Title}{task.CoverageForName&&<>{" "}<Badge type="warning">Coverage</Badge></>}</div>
      <div style={{fontSize:11,color:C.gray400}}>{showVA?`${task.VAName} · `:""}{task.PropertyName}{task.Priority!=="Normal"&&<>{" · "}<Badge type={task.Priority==="Urgent"?"error":"warning"}>{task.Priority}</Badge></>}{task.Notes&&` · \u{1F4AC} ${task.Notes}`}</div>
    </div>
    <div style={{display:"flex",gap:4,flexShrink:0,alignItems:"center"}}>
      {task.Status==="Completed"&&<span style={{fontSize:11,color:C.success,fontWeight:600}}>{"\u2713"} Done</span>}
      {task.Status==="Blocked"&&<div style={{display:"flex",alignItems:"center",gap:4}}>
        <Badge type="error">Blocked</Badge>
        {task.Notes&&<span style={{fontSize:11,color:C.error,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={task.Notes}>{task.Notes}</span>}
        {onUnblock&&<button style={{...S.btn(C.success),...S.btnSm,fontSize:11}} onClick={()=>{if(window.confirm(`Unblock "${task.Title}"? It will return to your queue.`))onUnblock(task);}}>✓ Unblock</button>}
      </div>}
      {task.Status!=="Completed"&&task.Status!=="Blocked"&&onComplete&&<button style={{...S.btnO(C.success,C.success),...S.btnSm,padding:"3px 8px",fontSize:11}} onClick={()=>onComplete(task,"Completed","")}>{"\u2713"}</button>}
      {task.Status!=="Completed"&&task.Status!=="Blocked"&&onComplete&&<button style={{...S.btnO(C.error,C.error),...S.btnSm,padding:"3px 8px",fontSize:11}} title="Block task" onClick={()=>onBlock?onBlock(task._localId||task.id,task):onComplete&&(()=>{const n=prompt("What is blocking this task?");if(n?.trim())onComplete(task,"Blocked",n);})()}>{"\u26A0"}</button>}
      {onStart&&task.Status!=="Completed"&&task.Status!=="Blocked"&&<button style={{...S.btn(C.success),...S.btnSm}} onClick={onStart}>{"\u25B6"} Start</button>}
      {onRequestHelp&&task.Status!=="Completed"&&task.Status!=="Blocked"&&<button style={{...S.btnO(C.info,C.info),...S.btnSm,padding:"5px 8px",fontSize:11}} title="Ask another VA for help" onClick={()=>{if(window.confirm(`Request help from another VA on "${task.Title}"? It stays in your queue but others can claim a copy.`))onRequestHelp(task);}}>🤝 Help</button>}
      {onUnclaim&&task.Status!=="Completed"&&task.Status!=="Blocked"&&<button style={{...S.btnO(C.warning,C.warning),...S.btnSm,padding:"5px 8px",fontSize:11}} title="Return to coverage pool" onClick={()=>{if(window.confirm("Return this task to the coverage pool?"))onUnclaim(task);}}>↩ Unclaim</button>}
      {onDelete&&<button style={{...S.btnO(C.error,C.error),...S.btnSm,padding:"5px 8px"}} onClick={()=>{if(window.confirm("Remove this task?"))onDelete(task);}} title="Remove task">{"\u2715"}</button>}
    </div>
  </div>);
}

// ============================================================
// TASK GROUP ROW — collapsible parent for grouped tasks
// ============================================================
function TaskGroupRow({tasks,onStartGroup,onDelete,onCompleteSubTask,showVA,sourceColor,sourceLabel}){
  const[expanded,setExpanded]=useState(false);
  const first=tasks[0];
  const total=tasks.length;
  const done=tasks.filter(t=>t.Status==="Completed").length;
  const blocked=tasks.filter(t=>t.Status==="Blocked").length;
  const pct=total?Math.round(done/total*100):0;
  const allDone=done===total;
  const anyBlocked=blocked>0;
  const pending=tasks.filter(t=>t.Status!=="Completed"&&t.Status!=="Blocked");

  return(<div style={{borderBottom:`1px solid ${C.gray100}`}}>
    {/* Group header */}
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 0",cursor:"pointer"}} onClick={()=>setExpanded(x=>!x)}>
      <span style={{fontSize:16,flexShrink:0}}>{getIcon(first.icon,first.Category)}</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          <span style={{fontSize:13,fontWeight:600,color:allDone?C.success:anyBlocked?C.error:C.teal700}}>{first.Title}</span>
          <span style={{fontSize:10,fontWeight:600,background:C.teal100,color:C.teal700,borderRadius:99,padding:"1px 7px"}}>{total} {total===1?"property":"properties"}</span>
          {first.Priority!=="Normal"&&<Badge type={first.Priority==="Urgent"?"error":"warning"}>{first.Priority}</Badge>}
          {sourceLabel&&<span style={{fontSize:10,fontWeight:700,color:sourceColor||C.gray400,textTransform:"uppercase",letterSpacing:"0.04em"}}>{sourceLabel}</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:3}}>
          <div style={{width:80,height:5,background:C.gray100,borderRadius:3,overflow:"hidden",flexShrink:0}}>
            <div style={{width:`${pct}%`,height:"100%",background:allDone?C.success:anyBlocked?C.error:C.gold500,borderRadius:3,transition:"width 0.3s"}}/>
          </div>
          <span style={{fontSize:11,fontWeight:600,color:allDone?C.success:anyBlocked?C.error:C.teal700}}>{pct}%</span>
          <span style={{fontSize:10,color:C.gray400}}>{done}/{total} done</span>
          {anyBlocked&&<Badge type="error">{blocked} blocked</Badge>}
          {showVA&&<span style={{fontSize:10,color:C.gray400}}>{first.VAName}</span>}
        </div>
      </div>
      <div style={{display:"flex",gap:4,flexShrink:0,alignItems:"center"}}>
        {!allDone&&onStartGroup&&pending.length>0&&<button style={{...S.btn(C.success),...S.btnSm}} onClick={e=>{e.stopPropagation();onStartGroup(first,tasks);}}>{"\u25B6"} Start</button>}
        {allDone&&<span style={{fontSize:11,color:C.success,fontWeight:700}}>{"\u2713"} Complete</span>}
        <span style={{fontSize:14,color:C.gray400,userSelect:"none"}}>{expanded?"\u25B2":"\u25BC"}</span>
      </div>
    </div>
    {/* Sub-tasks */}
    {expanded&&<div style={{marginLeft:24,borderLeft:`2px solid ${C.teal100}`,paddingLeft:10,paddingBottom:4,marginBottom:4}}>
      {tasks.map(t=>(
        <TaskRow key={t._localId} task={t} compact={true}
          onComplete={onCompleteSubTask&&t.Status!=="Completed"?onCompleteSubTask:null}
          onDelete={onDelete?()=>onDelete(t):null}
          showVA={false}/>
      ))}
    </div>}
  </div>);
}

// ============================================================
// HELPER — group tasks by GroupId for rendering
// ============================================================
function groupTasks(tasks,allowFallback=false){
  const groups={};
  tasks.forEach(t=>{
    // Group by GroupId if present, OR by Title+VAEmail+Source if multiple properties (fallback)
    const key=t.GroupId||(allowFallback&&t.PropertyId?`fb|${t.VAEmail}|${t.Title}|${t.Source}`:null);
    if(key){
      if(!groups[key])groups[key]=[];
      groups[key].push(t);
    }
  });
  const result=[];
  const seen=new Set();
  tasks.forEach(t=>{
    const key=t.GroupId||(allowFallback&&t.PropertyId?`fb|${t.VAEmail}|${t.Title}|${t.Source}`:null);
    if(!key||!groups[key]||groups[key].length<2){
      result.push({type:"single",task:t});
    } else if(!seen.has(key)){
      seen.add(key);
      result.push({type:"group",tasks:groups[key]});
    }
  });
  return result;
}

// ============================================================
// MY TASKS (VA view)
// ============================================================
function MyTasksView({data,role,myEmail,myVa,myProps,queue,covQ,shift,timers,tick,onClockIn,onBreakStart,onBreakEnd,onClockOut,onStartTimer,onPause,onResume,onFinish,onCancel,onClaimCov,onUnclaimTask,onRequestHelp,onUnblockTask,onAddTask,onDeleteTask,onCompleteSubTask,config}){
  const[showForm,setShowForm]=useState(false);const[fCat,setFCat]=useState("");const[fProp,setFProp]=useState("");const[fPri,setFPri]=useState("Normal");const[fDesc,setFDesc]=useState("");
  const[blockTarget,setBlockTarget]=useState(null); // {id, task}
  const isAdm=role==="admin";
  const myTasks=isAdm?queue:queue.filter(t=>t.VAEmail&&t.VAEmail.toLowerCase()===myEmail);
  const myTimers=isAdm?timers:timers.filter(t=>t.VAEmail&&t.VAEmail.toLowerCase()===myEmail);
  const cats=config?.categories||[];
  const portProps=data?data.portfolios.filter(p=>p.VAEmail?.toLowerCase()===myEmail).map(p=>data.properties.find(pr=>pr.Title===p.PropertyId)).filter(Boolean):[];
  let shE=0;
  if(shift){const now=Date.now();let bMs=shift.Breaks.reduce((s,b)=>s+(new Date(b.e)-new Date(b.s)),0);if(shift._ob&&shift._bs)bMs+=(now-new Date(shift._bs).getTime());shE=Math.floor((now-new Date(shift.ClockIn).getTime()-bMs)/1000);}

  // Group all tasks+active timers+blocked tasks by property
  const myBlocked=data?data.activities.filter(a=>
    a.ActivityType==="Task"&&a.Status==="Blocked"&&
    (isAdm||a.VAEmail?.toLowerCase()===myEmail)
  ):[];
  const allItems=[...myTasks];
  // Add blocked tasks not already in queue
  myBlocked.forEach(b=>{
    if(!allItems.find(q=>q._localId===b.id||q._spId===b.id||q.id===b.id))
      allItems.push({...b,_localId:b.id,_spId:b.id});
  });
  myTimers.forEach(t=>{if(!allItems.find(q=>q._localId===t._localId||q._spId===t._spId))allItems.push(t);});
  const propGroups={};
  allItems.forEach(t=>{const pn=t.PropertyName||"General";if(!propGroups[pn])propGroups[pn]=[];propGroups[pn].push(t);});
  const sortedProps=["General",...Object.keys(propGroups).filter(p=>p!=="General").sort()].filter(p=>propGroups[p]);

  function handleAdd(){if(!fDesc||!fCat)return;const cat=cats.find(c=>c.id===fCat);const prop=fProp?data.properties.find(p=>p.Title===fProp):null;
    onAddTask({Title:fDesc,VAEmail:myEmail,VAName:myVa?.Name||myEmail,PropertyId:fProp||"",PropertyName:prop?prop.PropertyName:"General",PMName:prop?prop.PMName:"",Category:cat?.name||"Admin/Other",Priority:fPri,Source:"Ad-Hoc"});
    setFDesc("");setFCat("");setFProp("");setFPri("Normal");setShowForm(false);}

  return(<div style={{maxWidth:700,margin:"0 auto"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div><div style={{fontSize:18,fontWeight:700,color:C.teal700}}>{myVa?.Name||myEmail}</div><div style={{fontSize:12,color:C.gray400}}>{portProps.length} properties</div></div>
      {myTimers.length>0&&<Badge type="success">{myTimers.length} timing</Badge>}
    </div>
    <div style={{...S.card,borderLeft:`3px solid ${shift?(shift._ob?C.warning:C.success):C.info}`}}>
      {!shift?(<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:15,fontWeight:600,color:C.teal700}}>Shift Clock</div><div style={{fontSize:12,color:C.gray400}}>Not clocked in</div></div><button style={S.btn(C.info)} onClick={onClockIn}>Clock In</button></div>
      ):(<div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div><div style={{fontSize:13,fontWeight:600,color:shift._ob?C.warning:C.success,textTransform:"uppercase"}}>{shift._ob?"On Break":"Clocked In"}</div><div style={{fontSize:11,color:C.gray400}}>Since {fT(shift.ClockIn)}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:22,fontWeight:700,fontFamily:mono,color:shift._ob?C.warning:C.teal700}}>{fTm(shE)}</div></div></div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {shift._ob?<button style={{...S.btn(C.success),flex:1}} onClick={onBreakEnd}>End Break</button>:<button style={{...S.btnO(C.warning,C.warning),flex:1}} onClick={onBreakStart}>Break</button>}
          <button style={{...S.btn(C.error),flex:1}} onClick={onClockOut}>Clock Out</button>
        </div></div>)}
    </div>
    {covQ.length>0&&(<div style={{...S.card,borderLeft:`3px solid ${C.warning}`,background:C.warningBg}}>
      <div style={{fontSize:15,fontWeight:600,color:C.warning,marginBottom:8}}>Coverage Needed ({covQ.length})</div>
      {covQ.map(t=>{const isHelp=t.Notes?.includes("Help requested");
        return(<div key={t._localId} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"1px solid rgba(212,150,10,0.1)"}}>
        <span>{catIcon[t.Category]||"\u{1F4C1}"}</span>
        <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500,color:C.teal700}}>{t.Title}</div>
          <div style={{fontSize:11,color:C.gray400}}>{t.PropertyName} · {isHelp?"Help needed — "+t.CoverageForName+" is requesting assistance":"covering "+t.CoverageForName}</div></div>
        <button style={{...S.btn(isHelp?C.info:C.warning,C.dark),...S.btnSm}} onClick={()=>onClaimCov(t._localId)}>{isHelp?"Help":"Claim"}</button></div>);
      })}
    </div>)}
    {sortedProps.map(pn=>(
      <PropertySection key={pn} propName={pn} tasks={propGroups[pn]} timers={myTimers}
        defaultOpen={false} onStartTimer={onStartTimer} onPause={onPause} onResume={onResume}
        onFinish={onFinish} onCancel={onCancel} onBlock={(id,task)=>setBlockTarget({id,task})}
        onUnblock={onUnblockTask} onDelete={onDeleteTask} onRequestHelp={onRequestHelp}
        onUnclaim={onUnclaimTask} onCompleteSubTask={onCompleteSubTask}
        showVA={isAdm} isMgr={isAdm} tick={tick} isAdm={isAdm}/>
    ))}
    {sortedProps.length===0&&<div style={{...S.card,textAlign:"center",padding:30,color:C.gray400}}>All done! No pending tasks.</div>}
    {blockTarget&&<BlockModal task={blockTarget.task} data={data} myEmail={myEmail} myEmp={null}
      onConfirm={(reason,mgrCat)=>{
        onFinish(blockTarget.id,"Blocked",reason);
        if(mgrCat){
          const prop=data.properties.find(p=>p.Title===blockTarget.task.PropertyId);
          const pm=prop?data.pms.find(p=>p.Email?.toLowerCase()===prop.PMEmail?.toLowerCase()):null||data.pms[0];
          if(pm&&_addMgrReviewRef)_addMgrReviewRef({
            category:mgrCat,propertyId:blockTarget.task.PropertyId||"",
            propertyName:blockTarget.task.PropertyName||"General",
            pmEmail:pm.Email,pmName:pm.Name,
            residentName:"",
            description:"Block clearance needed: "+blockTarget.task.Title+" — "+reason
          });
        }
        setBlockTarget(null);
      }}
      onCancel={()=>setBlockTarget(null)}/>}
    <div style={S.card}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontSize:14,fontWeight:600,color:C.teal700}}>Add Task</div><button style={S.btnO(C.teal700,C.teal100)} onClick={()=>setShowForm(!showForm)}>{showForm?"Cancel":"New"}</button></div>

        <div style={S.row}><div style={{flex:1,minWidth:130}}><label style={S.label}>Category *</label><select style={S.select} value={fCat} onChange={e=>setFCat(e.target.value)}><option value="">...</option>{sortCats(cats).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
          <div style={{flex:1,minWidth:130}}><label style={S.label}>Property</label><select style={S.select} value={fProp} onChange={e=>setFProp(e.target.value)}><option value="">General</option>{portProps.map(p=><option key={p.Title} value={p.Title}>{p.PropertyName}</option>)}</select></div>
          <div style={{minWidth:80}}><label style={S.label}>Priority</label><select style={S.select} value={fPri} onChange={e=>setFPri(e.target.value)}><option>Normal</option><option>High</option><option>Urgent</option></select></div></div>
        <div style={{marginTop:10,marginBottom:10}}><label style={S.label}>Task *</label><input style={S.input} value={fDesc} onChange={e=>setFDesc(e.target.value)} placeholder="Describe..."/></div>
        <button style={{...S.btn(C.headerBg),width:"100%"}} onClick={handleAdd}>+ Queue</button>
      </div>}</div>
  </div>);
}

        <button style={{...S.btnO(C.error,C.error),padding:"9px 12px"}} title="Block task" onClick={()=>onBlock?onBlock(t._localId,t):(()=>{const n=prompt("Block reason (required):");if(n&&n.trim())onFinish(t._localId,"Blocked",n.trim());})()}>{"\u26A0"}</button>
        <button style={{...S.btnO(C.gold600,C.gold100),padding:"9px 12px",fontWeight:600,fontSize:11}} title="Backdate complete" onClick={()=>{const h=prompt("Estimated hours spent on this task (e.g. 0.5, 1, 2.5):");if(!h||isNaN(parseFloat(h))||parseFloat(h)<=0)return;const n=prompt("Notes (optional):");onBackdate(t._localId,h,"Completed",n||"");}}>{"\u{1F4C5}"}</button>
        <button style={{...S.btnO(C.gray400,C.gray200),padding:"9px 12px"}} onClick={()=>onCancel(t._localId)}>{"\u21A9"}</button>
      </div>}</div>);})}</div>);
}

// ============================================================
function HistoryView({data,role,myEmail,isMgr,mgrProps,guestVAEmails,onUpdateDuration}){
  const[view,setView]=useState("tasks");
  const[editDurId,setEditDurId]=useState(null);
  const[editH,setEditH]=useState("");
  const[editM,setEditM]=useState("");
  const[editShiftId,setEditShiftId]=useState(null);
  const[esIn,setEsIn]=useState("");
  const[esOut,setEsOut]=useState("");
  const[esBreak,setEsBreak]=useState("");

  async function saveShiftEdit(shiftId){
    if(!esIn||!esOut||esIn>=esOut)return;
    const ci=new Date(esIn);const co=new Date(esOut);
    const bMin=parseInt(esBreak)||0;
    const wMin=Math.max(0,Math.round((co-ci)/60000-bMin));
    await onUpdateDuration(shiftId,wMin,{
      StartTime:ci.toISOString(),EndTime:co.toISOString(),
      BreakMinutes:bMin,WorkMinutes:wMin,
      ActivityDate:ci.toISOString()
    });
    setEditShiftId(null);
  }

  async function saveDuration(taskId,onSave){
    const h=parseInt(editH)||0;const m=parseInt(editM)||0;
    const total=h*60+m;
    if(isNaN(total)||total<0)return;
    await onSave(taskId,total);
    setEditDurId(null);
  }

  if(!data)return null;
  const isGuest=role==="guest";
  const propFilter=role==="manager"?new Set(mgrProps.map(p=>p.Title)):null;
  const gSet=guestVAEmails?.length>0?new Set(guestVAEmails):null;
  const tasks=data.activities.filter(a=>a.ActivityType==="Task"&&a.Status!=="Queued"&&a.Status!=="In Progress"&&a.Notes!=="Removed by admin"&&(isGuest?(gSet?gSet.has(a.VAEmail?.toLowerCase()):false):(isMgr?(propFilter?propFilter.has(a.PropertyId):true):a.VAEmail?.toLowerCase()===myEmail))).sort((a,b)=>new Date(actDate(b)||0)-new Date(actDate(a)||0)).slice(0,100);
  const shifts=data.activities.filter(a=>a.ActivityType==="Shift"&&(role==="admin"||a.VAEmail?.toLowerCase()===myEmail)).sort((a,b)=>new Date(b.ActivityDate||0)-new Date(a.ActivityDate||0)).slice(0,30);

  return(<div>
    {isGuest&&<div style={{background:C.purpleBg,border:`1px solid ${C.purple}`,borderRadius:6,padding:"8px 14px",marginBottom:12,fontSize:12,color:C.purple}}>👁️ Read-only — task history for your assigned VAs</div>}
    <div style={{display:"flex",gap:8,marginBottom:12}}><button style={view==="tasks"?S.btn(C.headerBg):S.btnO(C.teal700,C.teal100)} onClick={()=>setView("tasks")}>Tasks</button>{role!=="manager"&&!isGuest&&<button style={view==="shifts"?S.btn(C.headerBg):S.btnO(C.teal700,C.teal100)} onClick={()=>setView("shifts")}>Shifts</button>}</div>
    {view==="tasks"&&<div style={{...S.card,overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["Date","VA","Task","Property","Source","Duration","Status",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead><tbody>
      {tasks.map((t,i)=><tr key={i}><td style={{...S.td,whiteSpace:"nowrap"}}>{fD(t.ActivityDate)}</td><td style={{...S.td,fontWeight:500,fontSize:12}}>{t.VAName}</td><td style={{...S.td,maxWidth:200}}>{t.Title}{t.CoverageForName&&<div style={{fontSize:10,color:C.warning}}>{"\u{1F504}"} coverage for {t.CoverageForName}</div>}{t.Notes&&<div style={{fontSize:11,color:C.gray400}}>{"\u{1F4AC}"} {t.Notes}</div>}</td><td style={{...S.td,fontSize:12}}>{t.PropertyName}</td><td style={S.td}><Badge type={srcBadge[t.Source]||"neutral"}>{t.Source}</Badge></td><td style={{...S.td,fontFamily:mono,fontWeight:600,fontSize:12}}>
                {editDurId===t.id?(
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <input type="number" min="0" max="99" style={{...S.input,width:44,padding:"3px 6px",fontSize:12,textAlign:"center"}} value={editH} onChange={e=>setEditH(e.target.value)} placeholder="h" autoFocus/>
                    <span style={{color:C.gray400,fontSize:11}}>h</span>
                    <input type="number" min="0" max="59" style={{...S.input,width:44,padding:"3px 6px",fontSize:12,textAlign:"center"}} value={editM} onChange={e=>setEditM(e.target.value)} placeholder="m"/>
                    <span style={{color:C.gray400,fontSize:11}}>m</span>
                    <button style={{...S.btn(C.success),padding:"3px 8px",fontSize:11,minHeight:28}} onClick={()=>saveDuration(t.id,onUpdateDuration)}>✓</button>
                    <button style={{...S.btnO(C.gray400,C.gray200),padding:"3px 8px",fontSize:11,minHeight:28}} onClick={()=>setEditDurId(null)}>✕</button>
                  </div>
                ):(
                  <span style={{cursor:"pointer",borderBottom:`1px dashed ${C.gray300}`}} title="Click to edit" onClick={()=>{
                    setEditDurId(t.id);
                    setEditH(String(Math.floor((t.DurationMin||0)/60)));
                    setEditM(String((t.DurationMin||0)%60));
                  }}>{t.DurationMin?fM(t.DurationMin):"—"}</span>
                )}
              </td>
              <td style={S.td}><Badge type={stBadge[t.Status]||"neutral"}>{t.Status}</Badge></td>
              <td style={S.td}></td></tr>)}
    </tbody></table>{!tasks.length&&<div style={{textAlign:"center",padding:40,color:C.gray400}}>No history.</div>}</div>}
    {view==="shifts"&&<div style={{...S.card,overflowX:"auto"}}>
      {!isMgr&&<div style={{fontSize:12,color:C.gray400,marginBottom:8}}>Click any row to correct times.</div>}
      <table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["Date","VA","Clock In","Clock Out","Break","Worked",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead><tbody>
      {shifts.map((s,i)=>{
        const isEdit=editShiftId===s.id;
        // Flag suspiciously long shifts (over 14 hours)
        const isSuspect=s.WorkMinutes>840;
        return<tr key={i} style={{background:isSuspect&&!isEdit?"rgba(196,75,59,0.04)":""}}>
          <td style={{...S.td,whiteSpace:"nowrap"}}>{fD(s.ActivityDate)}</td>
          <td style={{...S.td,fontWeight:500}}>{s.VAName}</td>
          {isEdit?(<>
            <td style={S.td} colSpan={3}>
              <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                <div><div style={{fontSize:10,color:C.gray400,marginBottom:2}}>Clock In</div><input type="datetime-local" style={{...S.input,width:170,padding:"3px 6px",fontSize:12}} value={esIn} onChange={e=>setEsIn(e.target.value)}/></div>
                <div><div style={{fontSize:10,color:C.gray400,marginBottom:2}}>Clock Out</div><input type="datetime-local" style={{...S.input,width:170,padding:"3px 6px",fontSize:12}} value={esOut} onChange={e=>setEsOut(e.target.value)}/></div>
                <div><div style={{fontSize:10,color:C.gray400,marginBottom:2}}>Break (min)</div><input type="number" min="0" style={{...S.input,width:70,padding:"3px 6px",fontSize:12}} value={esBreak} onChange={e=>setEsBreak(e.target.value)}/></div>
                {esIn&&esOut&&esIn<esOut&&<div style={{fontSize:11,fontWeight:600,color:C.success,alignSelf:"flex-end",paddingBottom:4}}>
                  = {(()=>{const w=Math.max(0,Math.round((new Date(esOut)-new Date(esIn))/60000-(parseInt(esBreak)||0)));return`${Math.floor(w/60)}h ${w%60}m`;})()}
                </div>}
              </div>
            </td>
            <td style={S.td} colSpan={2}>
              <div style={{display:"flex",gap:4}}>
                <button style={{...S.btn(C.success),padding:"4px 10px",fontSize:12,minHeight:30,opacity:(!esIn||!esOut||esIn>=esOut)?0.5:1}} onClick={()=>saveShiftEdit(s.id)}>✓ Save</button>
                <button style={{...S.btnO(C.gray400,C.gray200),padding:"4px 10px",fontSize:12,minHeight:30}} onClick={()=>setEditShiftId(null)}>✕</button>
              </div>
            </td>
          </>):(<>
            <td style={{...S.td,fontFamily:mono,fontSize:12}}>{fT(s.StartTime)}</td>
            <td style={{...S.td,fontFamily:mono,fontSize:12}}>{s.EndTime?fT(s.EndTime):<span style={{color:C.warning,fontSize:11}}>Open</span>}</td>
            <td style={{...S.td,fontFamily:mono}}>{fM(s.BreakMinutes)}</td>
            <td style={{...S.td,fontFamily:mono,fontWeight:600,color:isSuspect?C.error:C.teal700}}>
              {fM(s.WorkMinutes)}{isSuspect&&<span style={{fontSize:10,color:C.error,marginLeft:4}}>⚠</span>}
            </td>
            <td style={S.td}>{!isGuest&&<button style={{...S.btnO(C.teal600,C.teal100),padding:"3px 8px",fontSize:11,minHeight:28}} onClick={()=>{
              setEditShiftId(s.id);
              // Pre-fill with existing times
              const inDt=s.StartTime?new Date(s.StartTime):new Date();
              const outDt=s.EndTime?new Date(s.EndTime):new Date(inDt.getTime()+8*3600000);
              setEsIn(inDt.toISOString().slice(0,16));
              setEsOut(outDt.toISOString().slice(0,16));
              setEsBreak(String(s.BreakMinutes||0));
            }}>✏ Edit</button>}</td>
          </>)}
        </tr>;
      })}
    </tbody></table>{!shifts.length&&<div style={{textAlign:"center",padding:40,color:C.gray400}}>No shifts.</div>}</div>}
  </div>);
}

function ScorecardView({data,role,myEmail,isMgr,myVa,myProps,mgrProps,guestVAs,shift,tick}){
  const[selVa,setSelVa]=useState(myEmail);
  if(!data)return null;
  const isGuest=role==="guest";
  const viewableVAs=guestVAs||(role==="manager"?data.vas.filter(v=>data.portfolios.some(p=>mgrProps.some(mp=>mp.Title===p.PropertyId)&&p.VAEmail?.toLowerCase()===v.Email.toLowerCase())):data.vas);
  // Auto-select first VA for guests
  React.useEffect(()=>{if(isGuest&&viewableVAs.length>0&&!viewableVAs.find(v=>v.Email?.toLowerCase()===selVa))setSelVa(viewableVAs[0].Email?.toLowerCase()||"");},[isGuest]);
  const va=data.vas.find(v=>v.Email?.toLowerCase()===(isMgr?selVa:myEmail)?.toLowerCase())||myVa;
  const vaEmail=va?.Email?.toLowerCase()||myEmail;
  const per=7;
  const tasks=data.activities.filter(a=>a.ActivityType==="Task"&&a.VAEmail?.toLowerCase()===vaEmail&&dAgo(actDate(a))<=per);
  const done=tasks.filter(t=>t.Status==="Completed");const blocked=tasks.filter(t=>t.Status==="Blocked");const cov=tasks.filter(t=>t.CoverageForEmail);
  const taskMin=done.reduce((s,t)=>s+(t.DurationMin||0),0);const rate=tasks.length?Math.round(done.length/tasks.length*100):0;
  const shifts=data.activities.filter(a=>a.ActivityType==="Shift"&&a.VAEmail?.toLowerCase()===vaEmail&&dAgo(actDate(a))<=per);
  const scoreNow=Date.now();
  const openScoreShift=data.activities.find(a=>a.ActivityType==="Shift"&&a.VAEmail?.toLowerCase()===vaEmail&&a.StartTime&&!a.EndTime);
  const scoreLiveMin=openScoreShift?Math.round((scoreNow-new Date(openScoreShift.StartTime).getTime())/60000):
    (shift&&myEmail===vaEmail?Math.round((scoreNow-new Date(shift.ClockIn).getTime())/60000):0);
  const shiftMin=shifts.reduce((s,a)=>s+(a.WorkMinutes||0),0)+scoreLiveMin;
  const breakMin=shifts.reduce((s,a)=>s+(a.BreakMinutes||0),0);
  const util=shiftMin>0?Math.round(taskMin/shiftMin*100):0;const gap=Math.max(0,shiftMin-taskMin);
  const port=data.portfolios.filter(p=>p.VAEmail?.toLowerCase()===vaEmail);
  const vaPropsL=port.map(p=>data.properties.find(pr=>pr.Title===p.PropertyId)).filter(Boolean);
  const catMap={};tasks.forEach(t=>{if(!catMap[t.Category])catMap[t.Category]={c:0,m:0};catMap[t.Category].c++;catMap[t.Category].m+=(t.DurationMin||0);});
  const catList=Object.entries(catMap).sort((a,b)=>b[1].m-a[1].m);

  return(<div>
    {(isMgr||isGuest)&&<div style={{...S.card,display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>{isGuest&&<span style={{fontSize:12,color:C.purple,display:"flex",alignItems:"center",gap:4}}>👁️ Read-only scorecard</span>}<div style={{flex:1,minWidth:200}}><label style={S.label}>VA</label><select style={S.select} value={selVa} onChange={e=>setSelVa(e.target.value)}>{viewableVAs.map(v=><option key={v.Email} value={v.Email.toLowerCase()}>{v.Name}{getVAStatus(v)==="Out"?" [OUT]":""}</option>)}</select></div></div>}
    {!isMgr&&va&&<div style={{marginBottom:12}}><div style={{fontSize:18,fontWeight:700,color:C.teal700}}>{va.Name}</div><div style={{fontSize:12,color:C.gray400}}>{vaPropsL.length} properties · {vaPropsL.reduce((s,p)=>s+(p.Units||0),0)} units</div></div>}
    <div style={{...S.row,marginBottom:16}}>{[{l:"Tasks",v:tasks.length},{l:"Done",v:done.length,c:C.success},{l:"Rate",v:`${rate}%`,c:rate>=85?C.success:undefined},{l:"Shift",v:fM(shiftMin)},{l:"Util",v:`${util}%`,c:util>=75?C.success:util<50&&shiftMin>0?C.error:undefined},{l:"Gap",v:fM(gap),c:gap>120?C.error:undefined},{l:"Coverage",v:cov.length,c:cov.length>0?C.warning:undefined}].map((k,i)=><KPI key={i} label={k.l} value={k.v} color={k.c}/>)}</div>

function BackdatePanel({data,onBackdate}){
  const[selDate,setSelDate]=useState(()=>{const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);});
  const[selStatus,setSelStatus]=useState("Completed");
  const[selIds,setSelIds]=useState([]);

  if(!data)return null;
  const stale=data.activities.filter(a=>a.ActivityType==="Task"&&a.Status==="In Progress");
  if(!stale.length)return null;

  function toggle(id){setSelIds(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);}
  function selectAll(){setSelIds(stale.map(a=>a.id));}

  return(
    <div style={{...S.card,borderLeft:`3px solid ${C.warning}`}}>
      <div style={{fontSize:15,fontWeight:600,color:C.teal700,marginBottom:4}}>{"\u{1F4C5}"} Backdate Stale Tasks</div>
      <div style={{fontSize:12,color:C.gray400,marginBottom:12}}>{stale.length} task{stale.length!==1?"s":""} stuck as In Progress — select tasks, choose a date, and mark them.</div>
      <div style={{...S.row,marginBottom:10,alignItems:"flex-end"}}>
        <div><label style={S.label}>Completion Date</label><input type="date" style={{...S.input,width:160}} value={selDate} onChange={e=>setSelDate(e.target.value)} max={today()}/></div>
        <div><label style={S.label}>Mark As</label><select style={{...S.select,width:140}} value={selStatus} onChange={e=>setSelStatus(e.target.value)}><option value="Completed">Completed</option><option value="Incomplete">Incomplete</option><option value="Blocked">Blocked</option></select></div>
        <button style={{...S.btnO(C.teal600,C.teal100),...S.btnSm}} onClick={selectAll}>Select All</button>
        <button style={{...S.btn(selIds.length?C.warning:C.gray300,C.dark),...S.btnSm,opacity:selIds.length?1:0.5}} onClick={()=>{if(!selIds.length)return;if(window.confirm(`Mark ${selIds.length} task(s) as ${selStatus} on ${selDate}?`))onBackdate(selIds,selDate,selStatus);setSelIds([]);}}>
          Apply
        </button>
      </div>
      {stale.map(a=>(
        <label key={a.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:`1px solid ${C.gray100}`,cursor:"pointer"}}>
          <input type="checkbox" checked={selIds.includes(a.id)} onChange={()=>toggle(a.id)}/>
          <span style={{fontSize:13,fontWeight:500,color:C.teal700,flex:1}}>{a.Title}</span>
          <span style={{fontSize:11,color:C.gray400}}>{a.VAName}</span>
          <span style={{fontSize:11,color:C.gray400}}>{a.PropertyName||"General"}</span>
          <span style={{fontSize:11,color:C.warning}}>{a.StartTime?new Date(a.StartTime).toLocaleDateString("en-US",{month:"short",day:"numeric"}):"?"}</span>
        </label>
      ))}
    </div>
  );
}

              <div style={{fontSize:11,color:C.gray400,marginTop:2}}>{g.GuestEmail} · Invited {fD(g.InvitedDate)} by {g.InvitedBy}</div>
              <div style={{fontSize:11,color:C.purple,marginTop:2}}>{"\u{1F441}\u{FE0F}"} {gVaNames||"No VAs assigned"}</div>
            </div>
            <div style={{display:"flex",gap:3}}>

    {/* Cleanup Duplicates */}

    {/* Data Sources */}

    {/* Weekly Report */}
    <div style={S.card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:10,borderBottom:`1px solid ${C.gray100}`,marginBottom:10}}>
        <div><div style={{fontSize:16,fontWeight:600,color:C.teal700}}>{"\u{1F4CA}"} Weekly Report</div><div style={{fontSize:12,color:C.gray400}}>Previous week's performance summary</div></div>
        <button style={S.btn(C.headerBg)} onClick={()=>{
          const r=generateReport();if(!r)return;
          const blob=new Blob([r.report],{type:"text/plain"});
          const url=URL.createObjectURL(blob);const a=document.createElement("a");
          a.href=url;a.download=`VA-Weekly-Report-${r.from}-to-${r.to}.txt`;a.click();URL.revokeObjectURL(url);

        w.document.title=`VA Report ${r.from} to ${r.to}`;
      }}>Preview Report</button>
    </div>

    {/* Queued Task Management */}
    {queue.length>0&&<AdminQueuePanel queue={queue} covQ={covQ} data={data} onDeleteTask={onDeleteTask} onCompleteSubTask={onCompleteSubTask}/>}

    {/* Add Backdated Shift */}
    <div style={{...S.card,borderLeft:`3px solid ${C.teal500}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>toggleSection("addshift")}>

        <span style={{color:C.gray400}}>{openSections.addshift?"▲":"▼"}</span>
      </div>
      {openSections.addshift&&<div style={{marginTop:14}}>
        <div style={S.row}>
          <div style={{flex:1,minWidth:140}}><label style={S.label}>VA *</label>
            <select style={S.select} value={bsVa} onChange={e=>setBsVa(e.target.value)}>
              <option value="">Select VA...</option>
              {data.vas.map(v=><option key={v.Email} value={v.Email}>{v.Name}</option>)}
            </select>
          </div>
          <div style={{flex:1,minWidth:160}}><label style={S.label}>Clock In *</label>
            <input type="datetime-local" style={S.input} value={bsIn} onChange={e=>setBsIn(e.target.value)}/>
          </div>
          <div style={{flex:1,minWidth:160}}><label style={S.label}>Clock Out *</label>
            <input type="datetime-local" style={S.input} value={bsOut} onChange={e=>setBsOut(e.target.value)}/>
          </div>
          <div style={{minWidth:100}}><label style={S.label}>Break (min)</label>
            <input type="number" min="0" max="480" style={S.input} value={bsBreak} onChange={e=>setBsBreak(e.target.value)} placeholder="0"/>
          </div>
        </div>
        {bsIn&&bsOut&&bsIn<bsOut&&(()=>{
          const ci=new Date(bsIn);const co=new Date(bsOut);
          const totalMs=co-ci;const bMs=(parseInt(bsBreak)||0)*60000;
          const workMin=Math.max(0,Math.round((totalMs-bMs)/60000));
          const breakMin=parseInt(bsBreak)||0;
          return<div style={{marginTop:10,padding:"8px 12px",background:C.teal50,borderRadius:4,fontSize:12,color:C.teal700}}>
            <strong>Preview:</strong> {new Date(bsIn).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})} · {new Date(bsIn).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})} → {new Date(bsOut).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})} · Break: {breakMin}m · <strong>Worked: {Math.floor(workMin/60)}h {workMin%60}m</strong>
          </div>;
        })()}
        <button style={{...S.btn(C.teal500),width:"100%",marginTop:12,opacity:(!bsVa||!bsIn||!bsOut||bsIn>=bsOut)?0.5:1}}
          onClick={()=>{
            if(!bsVa||!bsIn||!bsOut||bsIn>=bsOut)return;
            const va=data.vas.find(v=>v.Email===bsVa);
            onAddBackdatedShift(bsVa,va?.Name||bsVa,bsIn,bsOut,parseInt(bsBreak)||0);
            setBsVa("");setBsIn("");setBsOut("");setBsBreak("0");
          }}>✓ Save Shift</button>
      </div>}
    </div>

        {/* Retroactive Past Day Close */}
    <div style={{...S.card,borderLeft:`3px solid ${C.warning}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>toggleSection("pastclose")}>
        <div><div style={{fontSize:16,fontWeight:600,color:C.teal700}}>📅 Retroactive Day Close</div><div style={{fontSize:12,color:C.gray400}}>Mark unfinished tasks from previous days as Incomplete</div></div>
        <span style={{color:C.gray400}}>{openSections.pastclose?"▲":"▼"}</span>
      </div>
      {openSections.pastclose&&<div style={{marginTop:14}}>
        {!staleTasks?(<div>
          <div style={{fontSize:13,color:C.gray600,marginBottom:12}}>Scans for any Queued or In Progress tasks dated before today and lets you bulk-mark them Incomplete.</div>
          <button style={{...S.btn(C.warning,C.dark),width:"100%"}} onClick={async()=>{const tasks=await onClosePastDays();setStaleTasks(tasks||[]);}}>🔍 Find Stale Tasks</button>
        </div>):staleTasks.length===0?(<div>
          <div style={{padding:"20px 0",textAlign:"center",color:C.success,fontSize:14,fontWeight:600}}>✓ No stale tasks found — all clear!</div>
          <button style={{...S.btnO(C.gray400,C.gray200),width:"100%",marginTop:8}} onClick={()=>setStaleTasks(null)}>Reset</button>
        </div>):(<div>
          <div style={{fontSize:13,fontWeight:600,color:C.warning,marginBottom:8}}>{staleTasks.length} stale task{staleTasks.length!==1?"s":""} found:</div>
          <div style={{border:`1px solid ${C.gray200}`,borderRadius:4,maxHeight:200,overflowY:"auto",marginBottom:12}}>
            {staleTasks.map((t,i)=><div key={i} style={{display:"flex",gap:8,padding:"7px 10px",borderBottom:`1px solid ${C.gray100}`,fontSize:12}}>
              <span style={{color:C.gray400,whiteSpace:"nowrap"}}>{t.ActivityDate?.slice(0,10)}</span>
              <span style={{fontWeight:600,color:C.teal700,flex:1}}>{t.VAName}</span>
              <span style={{flex:2,color:C.gray600}}>{t.Title}</span>
              <span style={{color:C.gray400}}>{t.PropertyName||"General"}</span>
            </div>)}
          </div>
          <div style={{marginBottom:10}}><label style={S.label}>Notes (applied to all)</label><input style={S.input} value={staleNotes} onChange={e=>setStaleNotes(e.target.value)}/></div>
          <div style={{display:"flex",gap:8}}>
            <button style={{...S.btn(C.error),flex:1}} onClick={async()=>{await onConfirmClosePastDays(staleTasks,staleNotes);setStaleTasks(null);setStaleNotes("Closed retroactively");}}>✓ Mark All Incomplete ({staleTasks.length})</button>
            <button style={{...S.btnO(C.gray400,C.gray200),flex:1}} onClick={()=>setStaleTasks(null)}>Cancel</button>
          </div>
        </div>)}
      </div>}
    </div>

    {/* Blocked Task Review */}
    {(()=>{const blocked=data.activities.filter(a=>a.ActivityType==="Task"&&a.Status==="Blocked");
      const filtered=blockedFilter?blocked.filter(t=>t.VAEmail?.toLowerCase()===blockedFilter):blocked;
      return blocked.length>0&&(
      <div style={{...S.card,borderLeft:`3px solid ${C.error}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>toggleSection("blocked")}>
          <div><div style={{fontSize:16,fontWeight:600,color:C.teal700}}>⚠️ Blocked Task Review <span style={{fontSize:13,fontWeight:400,color:C.error}}>({blocked.length})</span></div><div style={{fontSize:12,color:C.gray400}}>Resolve blocked tasks — mark complete, incomplete, or remove</div></div>
          <span style={{color:C.gray400}}>{openSections.blocked?"▲":"▼"}</span>
        </div>
        {openSections.blocked&&<div style={{marginTop:12}}>
          {data.vas.length>1&&<div style={{marginBottom:10}}><select style={{...S.select,width:"auto",minWidth:160}} value={blockedFilter} onChange={e=>setBlockedFilter(e.target.value)}><option value="">All VAs</option>{data.vas.map(v=><option key={v.Email} value={v.Email.toLowerCase()}>{v.Name}</option>)}</select></div>}
          {filtered.map((t,i)=><div key={i} style={{background:C.errorBg,border:`1px solid rgba(196,75,59,0.15)`,borderRadius:4,padding:10,marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:C.teal700}}>{t.Title}</div>
                <div style={{fontSize:11,color:C.gray400,marginTop:2}}>{t.VAName} · {t.PropertyName||"General"} · {t.ActivityDate?.slice(0,10)||"—"}</div>
                {t.Notes&&<div style={{fontSize:12,color:C.error,marginTop:3}}>🔴 {t.Notes}</div>}
              </div>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              <button style={{...S.btn(C.success),...S.btnSm}} onClick={()=>{const n=prompt("Completion notes (optional):",t.Notes||"");if(n!==null)onResolveBlocked(t.id,"Completed",n);}}>✓ Complete</button>
              <button style={{...S.btnO(C.warning,C.warning),...S.btnSm}} onClick={()=>{const n=prompt("Notes:",t.Notes||"");if(n!==null)onResolveBlocked(t.id,"Incomplete",n);}}>✗ Incomplete</button>
              <button style={{...S.btnO(C.error,C.error),...S.btnSm}} onClick={()=>{if(window.confirm(`Remove "${t.Title}"? This cannot be undone.`))onResolveBlocked(t.id,"Incomplete","Removed by admin");}}>🗑 Remove</button>
            </div>
          </div>)}
        </div>}
      </div>
    );})()}

        {/* Close Day */}
    <div style={{...S.card,borderLeft:`3px solid ${C.warning}`}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:15,fontWeight:600,color:C.teal700}}>{"\u{1F504}"} Close Day</div><div style={{fontSize:12,color:C.gray400}}>Marks unfinished daily tasks Incomplete, clears coverage.</div></div><div style={{display:"flex",gap:8,alignItems:"center"}}><button style={S.btn(C.warning,C.dark)} onClick={onCloseDay}>Close Day</button></div></div></div>
  </div>);
}


// ============================================================
// ADMIN QUEUE PANEL — one level: VA collapse, tasks grouped inside
// ============================================================
function AdminQueuePanel({queue,covQ,data,onDeleteTask,onCompleteSubTask}){
  const[openVAs,setOpenVAs]=useState({});
  const allQ=[...queue,...covQ];
  const total=allQ.length;
  function toggleVA(email){setOpenVAs(p=>({...p,[email]:!p[email]}));}
  const srcLabel={Daily:"Daily",Weekly:"Weekly",Assigned:"Assigned","Ad-Hoc":"Ad-Hoc",Coverage:"Coverage"};
  const srcColor={Daily:C.teal600,Weekly:C.info,Assigned:C.gold700,"Ad-Hoc":C.gray400,Coverage:C.warning};

  return(<div style={S.card}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:10,borderBottom:`1px solid ${C.gray100}`,marginBottom:10}}>
      <div style={{...S.cardTitle,margin:0}}>{"\u{1F5D1}\u{FE0F}"} Queued Tasks ({total})</div>
      <div style={{display:"flex",gap:6}}>
        <button style={{...S.btnO(C.teal600,C.teal100),...S.btnSm,fontSize:10}} onClick={()=>{const o={};data.vas.forEach(v=>o[v.Email]=true);setOpenVAs(o);}}>Expand All</button>
        <button style={{...S.btnO(C.gray400,C.gray200),...S.btnSm,fontSize:10}} onClick={()=>setOpenVAs({})}>Collapse All</button>
      </div>
    </div>
    {data.vas.map(va=>{
      const vq=allQ.filter(t=>t.VAEmail?.toLowerCase()===va.Email.toLowerCase());
      if(!vq.length)return null;
      const isOpen=!!openVAs[va.Email];
      const grouped=groupTasks(vq,true);
      const groupCount=grouped.filter(i=>i.type==="group").length;
      const singleCount=grouped.filter(i=>i.type==="single").length;
      return<div key={va.Email} style={{marginBottom:6,border:`1px solid ${C.gray200}`,borderRadius:5,overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 12px",background:C.teal50,cursor:"pointer",userSelect:"none"}} onClick={()=>toggleVA(va.Email)}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontSize:13,fontWeight:700,color:C.teal700}}>{va.Name}</span>
            <span style={{fontSize:11,color:C.gray400}}>{grouped.length} task{grouped.length!==1?"s":""}</span>
            {groupCount>0&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:99,background:C.teal100,color:C.teal700,fontWeight:600}}>{groupCount} grouped</span>}
          </div>
          <span style={{fontSize:12,color:C.gray400}}>{isOpen?"▲":"▼"}</span>
        </div>
        {isOpen&&<div style={{padding:"4px 12px 10px"}}>
          {grouped.map((item,i)=>{
            if(item.type==="single"){
              const t=item.task;
              const sc=srcColor[t.Source]||C.gray400;
              return<div key={t._localId} style={{borderBottom:`1px solid ${C.gray100}`}}>
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0"}}>
                  <span style={{fontSize:15}}>{getIcon(t.icon,t.Category)}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:500,color:C.teal700}}>{t.Title}</div>
                    <div style={{fontSize:11,color:C.gray400,display:"flex",gap:6,marginTop:1,flexWrap:"wrap"}}>
                      <span style={{color:sc,fontWeight:600,textTransform:"uppercase",fontSize:10}}>{t.Source}</span>
                      {t.PropertyName&&t.PropertyName!=="General"&&<span>{t.PropertyName}</span>}
                      {t.Priority!=="Normal"&&<Badge type={t.Priority==="Urgent"?"error":"warning"}>{t.Priority}</Badge>}
                    </div>
                  </div>
                  {onDeleteTask&&<button style={{...S.btnO(C.error,C.error),...S.btnSm,padding:"4px 8px"}} onClick={()=>{if(window.confirm("Remove?"))onDeleteTask(t);}}>✕</button>}
                </div>
              </div>;
            }
            // Grouped
            const g=item.tasks;
            const first=g[0];
            const sc=srcColor[first.Source]||C.gray400;
            return<TaskGroupRow key={first.GroupId||first._localId} tasks={g} onDelete={onDeleteTask} onCompleteSubTask={onCompleteSubTask} showVA={false} sourceColor={sc} sourceLabel={first.Source}/>;
          })}
        </div>}
      </div>;
    })}
  </div>);
}

// ALL TASKS VIEW (Admin only)
// ============================================================
function AllTasksView({data,queue,covQ,timers,onStartTimer,onDeleteTask,onAddTask,config}){
  const[filterVA,setFilterVA]=useState("");
  const[filterStatus,setFilterStatus]=useState("queued");
  const[filterProp,setFilterProp]=useState("");
  if(!data)return null;

  const allQ=[...queue,...covQ];
  const allActive=timers;
  const cats=config?.categories||[];

  const filtered=(filterStatus==="active"?allActive:allQ).filter(t=>{
    if(filterVA&&t.VAEmail?.toLowerCase()!==filterVA)return false;
    if(filterProp&&t.PropertyId!==filterProp)return false;
    return true;
  });

  return(<div>
    <div style={{...S.card,display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end",padding:12}}>
      <div><label style={S.label}>View</label>
        <select style={{...S.select,width:130}} value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
          <option value="queued">Queued ({allQ.length})</option>
          <option value="active">Active ({allActive.length})</option>
        </select>
      </div>
      <div><label style={S.label}>VA</label>
        <select style={{...S.select,width:160}} value={filterVA} onChange={e=>setFilterVA(e.target.value)}>
          <option value="">All VAs</option>
          {data.vas.map(v=><option key={v.Email} value={v.Email.toLowerCase()}>{v.Name}</option>)}
        </select>
      </div>
      <div><label style={S.label}>Property</label>
        <select style={{...S.select,width:180}} value={filterProp} onChange={e=>setFilterProp(e.target.value)}>
          <option value="">All Properties</option>
          {data.properties.map(p=><option key={p.Title} value={p.Title}>{p.PropertyName}</option>)}
        </select>
      </div>
      <button style={{...S.btnO(C.gray400,C.gray200),...S.btnSm}} onClick={()=>{setFilterVA("");setFilterStatus("queued");setFilterProp("");}}>Clear</button>
      <div style={{marginLeft:"auto",fontSize:12,color:C.gray400,alignSelf:"flex-end"}}>{filtered.length} task{filtered.length!==1?"s":""}</div>
    </div>

    {data.vas.map(va=>{
      const vTasks=filtered.filter(t=>t.VAEmail?.toLowerCase()===va.Email.toLowerCase());
      if(!vTasks.length)return null;
      const isOut=getVAStatus(va)==="Out";
      return(<div key={va.Email} style={{...S.card,borderLeft:`3px solid ${isOut?C.error:C.teal400}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,paddingBottom:8,borderBottom:`1px solid ${C.gray100}`}}>
          <div style={{fontSize:15,fontWeight:700,color:isOut?C.error:C.teal700}}>{va.Name}{isOut?" 🛑":""}</div>
          <div style={{fontSize:12,color:C.gray400}}>{vTasks.length} task{vTasks.length!==1?"s":""}</div>
        </div>
        {vTasks.map(t=><TaskRow key={t._localId||t.id} task={t}
          onStart={filterStatus==="queued"?()=>onStartTimer(t):null}
          onDelete={onDeleteTask} showVA={false}/>)}
      </div>);
    })}
    {!filtered.length&&<div style={{...S.card,textAlign:"center",padding:40,color:C.gray400}}>No tasks match the current filters.</div>}
  </div>);
}

// ============================================================
// MANAGER REVIEW TAB (Managers + Admin)
// ============================================================
function ManagerReviewTab({data,myEmail,isAdmin,onComplete}){
  const[filterStatus,setFilterStatus]=useState("pending");
  const[filterVA,setFilterVA]=useState("");
  if(!data)return null;

  const items=data.activities.filter(a=>{
    if(a.ActivityType!=="ManagerReview")return false;
    if(filterStatus==="pending"&&a.Status!=="Pending")return false;
    if(filterStatus==="recent"&&!(a.Status==="Completed"&&dAgo(actDate(a))<=7))return false;
    if(!isAdmin&&a.PMEmail?.toLowerCase()!==myEmail&&a.PMEmail?.toLowerCase()!==CONFIG.brandyEmail)return false;
    if(filterVA&&a.VAEmail?.toLowerCase()!==filterVA)return false;
    return true;
  }).sort((a,b)=>new Date(b.ActivityDate||0)-new Date(a.ActivityDate||0));

  const pendingCount=data.activities.filter(a=>a.ActivityType==="ManagerReview"&&a.Status==="Pending"&&(isAdmin||a.PMEmail?.toLowerCase()===myEmail||a.PMEmail?.toLowerCase()===CONFIG.brandyEmail)).length;

  return(<div>
    <div style={{...S.card,display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end",padding:12}}>
      <div><label style={S.label}>Status</label>
        <select style={{...S.select,width:160}} value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
          <option value="pending">Pending ({pendingCount})</option>
          <option value="recent">Resolved (last 7d)</option>
          <option value="all">All</option>
        </select>
      </div>
      {isAdmin&&<div><label style={S.label}>VA</label>
        <select style={{...S.select,width:160}} value={filterVA} onChange={e=>setFilterVA(e.target.value)}>
          <option value="">All VAs</option>
          {data.vas.map(v=><option key={v.Email} value={v.Email.toLowerCase()}>{v.Name}</option>)}
        </select>
      </div>}
    </div>

    {!items.length&&<div style={{...S.card,textAlign:"center",padding:40,color:C.gray400}}>
      {filterStatus==="pending"?"No pending review items — you're all caught up! ✓":"No items in this filter."}
    </div>}

    {items.map((t,i)=>(
      <div key={t.id||i} style={{...S.card,borderLeft:`3px solid ${t.Status==="Completed"?C.success:C.gold500}`,opacity:t.Status==="Completed"?0.75:1}}>
        <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:6}}>
              <Badge type={t.Status==="Completed"?"success":"warning"}>{t.Category}</Badge>
              {t.Status==="Completed"&&<Badge type="success">✓ Resolved</Badge>}
              {t.PropertyName&&t.PropertyName!=="General"&&<span style={{fontSize:12,fontWeight:600,color:C.teal600}}>{t.PropertyName}</span>}
              <span style={{fontSize:11,color:C.gray400}}>from {t.VAName} · {fD(t.ActivityDate)}</span>
              {isAdmin&&<span style={{fontSize:11,color:C.gray400}}>· PM: {t.PMName}</span>}
            </div>
            <div style={{fontSize:14,fontWeight:600,color:C.teal700,marginBottom:t.Notes?4:0}}>{t.Title}</div>
            {t.Notes&&<div style={{fontSize:12,color:C.gray500}}>👤 {t.Notes}</div>}
          </div>
          {t.Status!=="Completed"&&<button style={{...S.btn(C.success),padding:"8px 16px",minHeight:36,flexShrink:0}}
            onClick={()=>{const n=prompt("Notes (optional):");if(n!==null)onComplete(t.id,n);}}>
            ✓ Done
          </button>}
        </div>
      </div>
    ))}
  </div>);
}

// ============================================================
// MY REVIEW TAB (VA — their submitted requests)
// ============================================================
function MyReviewTab({data,myEmail,onComplete,onAdd,myProps}){
  const[showForm,setShowForm]=useState(true);
  if(!data)return null;
  const myItems=data.activities.filter(a=>
    a.ActivityType==="ManagerReview"&&a.VAEmail?.toLowerCase()===myEmail&&
    (a.Status==="Pending"||(a.Status==="Completed"&&dAgo(actDate(a))<=7))
  ).sort((a,b)=>new Date(b.ActivityDate||0)-new Date(a.ActivityDate||0));

  return(<div>
    <div style={{...S.card,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <div style={{fontSize:15,fontWeight:600,color:C.teal700}}>📋 My Manager Requests</div>
        <div style={{fontSize:12,color:C.gray400,marginTop:2}}>Items you've sent for manager review</div>
      </div>
      <button style={{...S.btnO(C.gold700,C.gold500),...S.btnSm}} onClick={()=>setShowForm(!showForm)}>{showForm?"Cancel":"+ New Request"}</button>
    </div>
    {showForm&&<ManagerReviewForm data={data} myEmail={myEmail} myVa={null} myProps={myProps}
      onSubmit={(item)=>{onAdd(item);setShowForm(false);}}
      pendingReviews={[]} onComplete={onComplete}/>}
    {!myItems.length&&!showForm&&<div style={{...S.card,textAlign:"center",padding:40,color:C.gray400}}>No pending requests.</div>}
    {myItems.map((t,i)=>(
      <div key={t.id||i} style={{...S.card,borderLeft:`3px solid ${t.Status==="Completed"?C.success:C.gold500}`,opacity:t.Status==="Completed"?0.75:1}}>
        <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:4}}>
              <Badge type={t.Status==="Completed"?"success":"warning"}>{t.Category}</Badge>
              {t.Status==="Completed"&&<Badge type="success">✓ Resolved</Badge>}
              {t.PropertyName&&t.PropertyName!=="General"&&<span style={{fontSize:12,color:C.gray400}}>{t.PropertyName}</span>}
              <span style={{fontSize:11,color:C.gray400}}>→ {t.PMName} · {fD(t.ActivityDate)}</span>
            </div>
            <div style={{fontSize:13,fontWeight:500,color:t.Status==="Completed"?C.gray400:C.teal700,textDecoration:t.Status==="Completed"?"line-through":"none"}}>{t.Title}</div>
            {t.Notes&&<div style={{fontSize:11,color:C.gray400}}>👤 {t.Notes}</div>}
          </div>
          {t.Status!=="Completed"&&<button style={{...S.btnO(C.success,C.success),padding:"6px 12px",fontSize:12,minHeight:32,flexShrink:0}}
            onClick={()=>{const n=prompt("PM addressed this? Notes:");if(n!==null)onComplete(t.id,n);}}>
            ✓ Done
          </button>}
        </div>
      </div>
    ))}
  </div>);
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
