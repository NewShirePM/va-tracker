<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VA Productivity Tracker - NewShire</title>
  <meta name="theme-color" content="#1C3740" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif; background: #EDEEF0; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:16px;color:#555">Loading...</div></div>
  <script>
    (async function() {
      try {
        const r = await fetch('va-tracker-v3.jsx');
        if (!r.ok) throw new Error('Could not load app: HTTP ' + r.status);
        const code = await r.text();
        const out = Babel.transform(code, { presets: ['react'] }).code;
        eval(out);
        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
      } catch(e) {
        document.getElementById('root').innerHTML =
          '<div style="padding:40px;color:#B83B2A;font-family:sans-serif;max-width:600px;margin:auto">'
          + '<h2 style="margin-bottom:12px">App failed to load</h2>'
          + '<pre style="font-size:12px;background:#fff;padding:12px;border-radius:4px;overflow:auto;white-space:pre-wrap">'
          + e.message + '</pre></div>';
      }
    })();
  </script>
</body>
</html>
