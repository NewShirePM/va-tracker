function isWorkday(dateStr){
  const d=new Date(dateStr+"T12:00:00");
  const dow=d.getDay(); // 0=Sun, 6=Sat
  if(dow===0||dow===6)return false;
  const md=String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");

}

function fTm(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;const p=n=>String(n).padStart(2,"0");return h>0?`${h}:${p(m)}:${p(ss)}`:`${p(m)}:${p(ss)}`;}

async function gGet(token,url){const r=await fetch(url,{headers:{Authorization:`Bearer ${token}`}});if(!r.ok)throw new Error(`GET ${r.status} ${url.split("lists/")[1]?.split("/")[0]||""}`);return r.json();}
async function gAll(token,url){let a=[],n=url;while(n){const d=await gGet(token,n);a=a.concat(d.value||[]);n=d["@odata.nextLink"]||null;}return a;}
async function gPost(token,url,fields){const r=await fetch(url,{method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify({fields})});if(!r.ok){let errBody="";try{const ej=await r.json();errBody=JSON.stringify(ej?.error||ej).slice(0,300);}catch{}throw new Error(`POST ${r.status}: ${errBody}`);}return r.json();}
async function gPatch(token,url,fields){const r=await fetch(url,{method:"PATCH",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify(fields)});if(!r.ok){let errBody="";try{const ej=await r.json();errBody=JSON.stringify(ej?.error||ej).slice(0,300);}catch{}throw new Error(`PATCH ${r.status}: ${errBody}`);}return r.json();}
function lUrl(n){return`${SITE}/lists/${n}/items`;}
async function gRawPost(token,url,body){const r=await fetch(url,{method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify(body)});if(!r.ok){const t=await r.text();throw new Error(`POST ${r.status}: ${t}`);}return r.json();}

function actFields(t,extra={}){
  const f={

    VAEmail:t.VAEmail||"",
    VAName:t.VAName||"",
    ActivityDate:t.ActivityDate||new Date().toISOString(),

    PMName:t.PMName||"",
    Category:t.Category||"Admin/Other",
    Source:t.Source||"Ad-Hoc",
    Status:t.Status||"Queued",
    Priority:t.Priority||"Normal",
    StartTime:t.StartTime||null,
    EndTime:t.EndTime||null,
    DurationMin:t.DurationMin||0,
    PausedMin:t.PausedMin||0,
    Notes:t.Notes||"",

    CoverageForName:t.CoverageForName||"",
    AssignedByEmail:t.AssignedByEmail||"",
    AssignedByName:t.AssignedByName||"",
    ...extra
  };
  // Only include GroupId if the column has been provisioned (non-empty value)
  if(t.GroupId||extra.GroupId){f.GroupId=t.GroupId||extra.GroupId;}
  return f;
}

// Post to SP with auto-retry stripping unrecognized fields
async function gPostActivity(token,fields){
  try{
    return await gPost(token,lUrl("VA_Activity"),fields);
  }catch(e){
    if(e.message.includes("not recognized")||e.message.includes("invalidRequest")){
      // Strip any custom columns SP doesn't know about and retry
      const safe={...fields};
      delete safe.GroupId;
      console.warn("[VT] Retrying without GroupId");
      return await gPost(token,lUrl("VA_Activity"),safe);
    }
    throw e;
  }
}

// Write lock — prevents duplicate task generation on concurrent buildQueue calls
let _taskGenLock=false;

// Cache failed list names so we don't retry on every poll
const _listCache={newHiresName:null,newHiresFailed:false,guestsFailed:false};

async function loadAll(token){
  const[eR,nhR,cR,pR,ptR,aR,gR]=await Promise.all([
    safeGet(token,"Employees",`${lUrl("Employees")}?expand=fields&$top=200`),
    (async()=>{
      if(_listCache.newHiresFailed)return[];
      if(_listCache.newHiresName){
        try{return await gAll(token,`${lUrl(_listCache.newHiresName)}?expand=fields&$top=200`);}catch(e){return[];}
      }
      for(const n of["NewHires","New%20Hires","New_Hires","VA_NewHires"]){
        try{const r=await gAll(token,`${lUrl(n)}?expand=fields&$top=200`);_listCache.newHiresName=n;console.log("[VT] New Hires found as:",n);return r;}catch(e){}
      }
      _listCache.newHiresFailed=true;
      return[];
    })(),
    safeGet(token,"Config",`${lUrl("VA_TrackerConfig")}?expand=fields&$top=10`),
    safeGet(token,"Properties",`${lUrl("VA_Properties")}?expand=fields&$top=200`),
    safeGet(token,"Portfolios",`${lUrl("VA_Portfolios")}?expand=fields&$top=200`),
    safeGet(token,"Activity",`${lUrl("VA_Activity")}?expand=fields&$top=1000`),
    (async()=>{
      if(_listCache.guestsFailed)return[];
      try{return await gAll(token,`${lUrl("VA_Guests")}?expand=fields&$top=200`);}
      catch(e){_listCache.guestsFailed=true;return[];}
    })(),
  ]);
  // Merge both lists, deduplicate by email
  const allEmpRaw=[...eR,...nhR].map(e=>({id:e.id,...e.fields}));
  const seenEmails=new Set();
  const employees=allEmpRaw.filter(e=>{const em=(e.Email||"").toLowerCase();if(!em||seenEmails.has(em))return false;seenEmails.add(em);return true;});
  const config=cR.length>0?JSON.parse(cR[0].fields.ConfigJSON||"{}"):{}; 
  const properties=pR.map(p=>({id:p.id,...p.fields})).filter(p=>p.IsActive!==false);
  const portfolios=ptR.map(p=>({id:p.id,...p.fields})).filter(p=>p.IsActive!==false);
  const activities=aR.map(a=>({id:a.id,...a.fields}));

  const guests=gR.map(g=>({id:g.id,...g.fields})).filter(g=>g.IsActive!==false);
  const vas=employees.filter(e=>e.JobTitle==="Virtual Assistant");
  const pms=employees.filter(e=>e.JobTitle==="Property Manager"&&e.EmployeeActive!==false);
  console.log("[VT] Loaded:",{emp:employees.length,props:properties.length,port:portfolios.length,act:activities.length,vas:vas.length,pms:pms.length,guests:guests.length});
  return{employees,config,properties,portfolios,activities,vas,pms,guests};
}

function useMsal(){
  const[inst,setInst]=useState(null);const[acct,setAcct]=useState(null);const[token,setToken]=useState(null);const[err,setErr]=useState(null);
  useEffect(()=>{
    const s=document.createElement("script");s.src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js";
    s.onload=()=>{const i=new window.msal.PublicClientApplication({auth:{clientId:CONFIG.clientId,authority:`https://login.microsoftonline.com/${CONFIG.tenantId}`,redirectUri:window.location.origin},cache:{cacheLocation:"sessionStorage"}});
      i.initialize().then(()=>{setInst(i);const a=i.getAllAccounts();if(a.length>0){setAcct(a[0]);i.acquireTokenSilent({scopes:SCOPES,account:a[0]}).then(r=>setToken(r.accessToken)).catch(()=>{});}});};
    document.head.appendChild(s);
  },[]);
  const login=useCallback(async()=>{if(!inst)return;try{const r=await inst.loginPopup({scopes:SCOPES});setAcct(r.account);const t=await inst.acquireTokenSilent({scopes:SCOPES,account:r.account});setToken(t.accessToken);setErr(null);}catch(e){if(e.errorCode!=="user_cancelled")setErr(e.message);}},[inst]);
  const refresh=useCallback(async()=>{if(!inst||!acct)return null;try{const r=await inst.acquireTokenSilent({scopes:SCOPES,account:acct});setToken(r.accessToken);return r.accessToken;}catch{const r=await inst.acquireTokenPopup({scopes:SCOPES});setToken(r.accessToken);return r.accessToken;}},[inst,acct]);
  return{acct,token,login,refresh,err};
}

  const[flash,setFlash]=useState("");const[lastSync,setLastSync]=useState(null);const[syncing,setSyncing]=useState(false);
  const[timers,setTimers]=useState([]);
  const timersRef=useRef([]);
  useEffect(()=>{timersRef.current=timers;},[timers]);
  const[shift,setShift]=useState(()=>{
    try{
      const saved=localStorage.getItem("va_shift_"+(window._vatEmail||""));
      return saved?JSON.parse(saved):null;
    }catch(e){return null;}
  });
  const[covQ,setCovQ]=useState([]);
  const[queue,setQueue]=useState([]);
  const[tick,setTick]=useState(0);
  // Dashboard date filter
  const[dfFrom,setDfFrom]=useState(()=>{const d=new Date();d.setDate(d.getDate()-7);return d.toISOString().slice(0,10);});
  const[dfTo,setDfTo]=useState(today());

  useEffect(()=>{const id=setInterval(()=>setTick(t=>t+1),1000);return()=>clearInterval(id);},[]);

  // ── Auto-refresh polling ──
  const pollRef=useRef(null);
  useEffect(()=>{
    if(!token||!acct||!data)return;
    function getInterval(){
      // 15s when timers are running, 30s otherwise
      return timers.length>0?15000:30000;
    }
    async function poll(){
      if(document.hidden)return; // skip when tab not visible
      try{
        setSyncing(true);
        const tk=await refresh();
        if(!tk)return;
        const d=await loadAll(tk);
        setData(d);
        buildQueue(d,myEmail);
        setLastSync(Date.now());
      }catch(e){console.warn("[VT] Poll error:",e);}
      finally{setSyncing(false);}

  function buildQueue(d,email){
    // 1. Load all persisted Queued tasks from VA_Activity
    const persistedQueued=d.activities.filter(a=>(a.ActivityType==="Task"||a.ActivityType0==="Task")&&(a.Status==="Queued"||a.Status==="In Progress"));
    const q=[],cv=[],tm=[];
    
    persistedQueued.forEach(a=>{
      const t={...a,_localId:a.id,_spId:a.id};
      if(a.Status==="In Progress"){
        // If this timer is already live in state, preserve it exactly — never reset pause state mid-session
        const liveTimer=timersRef.current.find(x=>x._spId===a.id||x._localId===a.id);
        if(liveTimer){
          tm.push(liveTimer); // keep accumulated _pMs and _pS intact
        }else{
          // New restore (page load or first seen) — check sessionStorage for paused state
          const pausedStore=JSON.parse(localStorage.getItem("va_paused_timers")||"{}");
          const pausedData=pausedStore[a.id]||pausedStore[t._localId];
          const timerTask={
            ...t,
            StartTime:a.StartTime||new Date().toISOString(),
            _pMs:pausedData?pausedData.pMs||0:0,
            _pS:pausedData?pausedData.pausedAt:null
          };
          tm.push(timerTask);
        }
      } else if(a.Source==="Coverage"&&a.CoverageForEmail){cv.push(t);}
      else{q.push(t);}
    });
    if(tm.length>0){setTimers(tm);console.log("[VT] Restored",tm.length,"active timers");}

    // 2. Generate recurring daily/weekly tasks that don't already exist
    if(d.config.recurringTasks){
      const td=today();
      // Skip task generation on weekends and holidays
      if(!isWorkday(td)){
        setQueue(q);setCovQ(cv);
        console.log("[VT] Skipping task generation — weekend or holiday:",td);
        return;
      }
      const todayDate=new Date(td);
      const todayDow=todayDate.getDay(); // 0=Sun,1=Mon,...6=Sat
      // Check what's already in SharePoint for today (any status)
      const todayTasks=d.activities.filter(a=>a.ActivityType==="Task"&&actDate(a)&&actDate(a).slice(0,10)===td);
      // Dedup: check ALL activities for today (any status) - prevents duplicates on reload
      const existing=new Set(todayTasks.map(t=>`${t.VAEmail?.toLowerCase()}|${t.Title}|${t.PropertyId||""}`));
      // Also check already-queued/in-progress tasks
      persistedQueued.forEach(a=>{existing.add(`${a.VAEmail?.toLowerCase()}|${a.Title}|${a.PropertyId||""}`);});
      // Also check timers in case they started one
      // Use broader title-only check as secondary safety net
      const existingTitleProps=new Set(todayTasks.map(t=>`${t.Title}|${t.PropertyId||""}`));

      const toSave=[];
      // Group recurring tasks by VA+description — same task across multiple properties = one group
      const recGroupMap={};
      d.config.recurringTasks.forEach(rt=>{
        if(!rt.active)return;
        const freq=rt.frequency||"daily";
        if(freq==="weekly"){
          const targetDow=rt.dayOfWeek!==undefined?rt.dayOfWeek:1;
          if(todayDow!==targetDow)return;
        }
        const key=`${rt.vaEmail?.toLowerCase()}|${rt.description}`;
        if(existing.has(key)||existingTitleProps.has(`${rt.description}|${rt.propertyId||""}`))return;
        const va=d.vas.find(v=>v.Email&&v.Email.toLowerCase()===rt.vaEmail.toLowerCase());
        if(!va)return;
        const prop=rt.propertyId?d.properties.find(p=>p.Title===rt.propertyId):null;
        const cat=d.config.categories?.find(c=>c.id===rt.category);
        const taskSrc=freq==="weekly"?"Weekly":"Daily";
        const task={Title:rt.description,VAEmail:va.Email,VAName:va.Name,PropertyId:rt.propertyId||"",PropertyName:prop?prop.PropertyName:"General",PMName:prop?prop.PMName:"",Category:cat?.name||"Admin/Other",Source:taskSrc,Status:"Queued",Priority:"Normal",ActivityDate:td,ActivityType:"Task",icon:rt.icon||""};
        if(getVAStatus(va)==="Out"){task.Source="Coverage";task.CoverageForEmail=va.Email;task.CoverageForName=va.Name;}
        if(!recGroupMap[key])recGroupMap[key]=[];
        recGroupMap[key].push(task);
      });
      // Assign shared GroupId to groups of 2+ (same task across multiple properties)
      Object.values(recGroupMap).forEach(tasks=>{
        if(tasks.length>1){const gid=uid();tasks.forEach(t=>{t.GroupId=gid;});}
        toSave.push(...tasks);
      });

      // Set base queue state FIRST, then background-save new tasks and append
      setQueue(q);setCovQ(cv);

      // Auto-close yesterday's unfinished recurring tasks before creating today's
      if(toSave.length>0){
        (async()=>{
          try{
            const tk=await gT();
            const yd=new Date();yd.setDate(yd.getDate()-1);const yds=yd.toISOString().slice(0,10);
            const stale=d.activities.filter(a=>
              a.ActivityType==="Task"&&
              (a.Status==="Queued"||a.Status==="In Progress")&&
              actDate(a)&&actDate(a).slice(0,10)===yds&&
              a.Source==="Daily"
            );
            for(const s of stale){
              try{await gPatch(tk,iUrl("VA_Activity",s.id),{Status:"Incomplete",Notes:"Auto-closed: not completed"});}catch(e){}
            }
            if(stale.length)console.log(`[VT] Auto-closed ${stale.length} stale tasks from ${yds}`);
          }catch(e){console.warn("[VT] Auto-close error:",e);}
        })();
      }

      if(toSave.length>0){
        (async()=>{
          if(_taskGenLock){console.log("[VT] Task gen locked — skipping");return;}
          _taskGenLock=true;
          try{
            const tk=await gT();
            // Double-check SP one more time to guard against race on fast reloads
            const freshToday=await gAll(tk,`${lUrl("VA_Activity")}?expand=fields&$top=200&$filter=fields/ActivityDate ge '${td}'`).catch(()=>[]);
            const freshTitles=new Set(freshToday.map(a=>`${a.fields?.VAEmail?.toLowerCase()}|${a.fields?.Title}|${a.fields?.PropertyId||""}`));
            const dedupedSave=toSave.filter(t=>!freshTitles.has(`${t.VAEmail?.toLowerCase()}|${t.Title}|${t.PropertyId||""}`));
            if(!dedupedSave.length){console.log("[VT] All tasks already exist, skipping");return;}
            for(const task of dedupedSave){
              const res=await gPostActivity(tk,actFields(task));
              const saved={...task,_localId:res.id,_spId:res.id,id:res.id};
              if(task.Source==="Coverage"){setCovQ(p=>[...p,saved]);}
              else{setQueue(p=>[...p,saved]);}
            }
            console.log(`[VT] Generated ${dedupedSave.length} daily tasks`);
          }catch(e){console.error("[VT] Daily task generation error:",e);}
          finally{_taskGenLock=false;}
        })();
      }
    }else{
      setQueue(q);setCovQ(cv);
    }
  }

  // ── Backdate complete ──
  async function backdateFinish(id,estHours,status,notes){
    const t=timers.find(x=>x._localId===id);if(!t)return;
    const durMin=Math.max(1,Math.round(parseFloat(estHours)*60));
    // Use StartTime's date as ActivityDate so it lands on the right day
    const actDate=t.StartTime?t.StartTime.slice(0,10):new Date().toISOString().slice(0,10);
    const endDt=t.StartTime?new Date(new Date(t.StartTime).getTime()+durMin*60000):new Date();
    const fields={Status:status,EndTime:endDt.toISOString(),ActivityDate:actDate,DurationMin:durMin,PausedMin:0,Notes:notes||""};
    try{
      const tk=await gT();
      if(t._spId){await gPatch(tk,iUrl("VA_Activity",t._spId),fields);}
      else{await saveTask({...t,...fields});}
      setTimers(p=>p.filter(x=>x._localId!==id));fl("Task completed — "+durMin+"m logged!");await reload();
    }catch(e){fl("Error: "+e.message);}
  }

  // ── Timer actions ──
  async function startTimer(task){
    const now=new Date().toISOString();
    const timer={...task,Status:"In Progress",StartTime:now,_pMs:0,_pS:null};
    const tk=await gT();
    if(task._spId){try{await gPatch(tk,iUrl("VA_Activity",task._spId),{Status:"In Progress",StartTime:now});}catch(e){console.warn("[VT] Timer start patch failed:",e);}}
    // If grouped, remove ALL siblings from queue (they're represented by the single group timer)
    if(task.GroupId){
      setQueue(p=>p.filter(t=>t.GroupId!==task.GroupId));
      // Store sibling IDs in timer so we can restore on cancel
      const siblings=queue.filter(t=>t.GroupId===task.GroupId&&t._localId!==task._localId);
      timer._groupSiblings=siblings;
      timer._groupSize=siblings.length+1;
    }else{
      setQueue(p=>p.filter(t=>t._localId!==task._localId));
    }
    setTimers(p=>[...p,timer]);fl(task.GroupId?`Group timer started — ${(timer._groupSize||1)} properties`:"Timer started!");
  }
  function pauseTimer(id){
    setTimers(p=>p.map(t=>{
      if(t._localId!==id)return t;
      const updated={...t,_pS:Date.now()};
      try{
        const paused=JSON.parse(localStorage.getItem("va_paused_timers")||"{}");
        paused[id]={pausedAt:Date.now(),pMs:t._pMs||0};
        localStorage.setItem("va_paused_timers",JSON.stringify(paused));
      }catch(e){}
      return updated;
    }));
  }
  function resumeTimer(id){
    setTimers(p=>p.map(t=>{
      if(t._localId!==id||!t._pS)return t;
      try{const paused=JSON.parse(localStorage.getItem("va_paused_timers")||"{}");delete paused[id];localStorage.setItem("va_paused_timers",JSON.stringify(paused));}catch(e){}
      return{...t,_pMs:(t._pMs||0)+(Date.now()-t._pS),_pS:null};
    }));
  }
  async function finishTimer(id,status,notes){
    const t=timers.find(x=>x._localId===id);if(!t)return;
    const now=Date.now();let pMs=t._pMs||0;if(t._pS)pMs+=(now-t._pS);
    const rawMs=now-new Date(t.StartTime).getTime();
    const dur=Math.max(1,Math.round((rawMs-pMs)/6e4));
    const fields={Status:status,EndTime:status==="Completed"?new Date(now).toISOString():null,DurationMin:dur,PausedMin:Math.round(pMs/6e4),Notes:notes||""};
    try{
      const tk=await gT();
      if(t._spId){await gPatch(tk,iUrl("VA_Activity",t._spId),fields);}
      else{await saveTask({...t,...fields});}
      setTimers(p=>p.filter(x=>x._localId!==id));
      try{const paused=JSON.parse(localStorage.getItem("va_paused_timers")||"{}");delete paused[id];localStorage.setItem("va_paused_timers",JSON.stringify(paused));}catch(e){}
      // If this was a group timer, also finish all remaining queued sub-tasks
      if(t.GroupId){await finishGroupTimer(t.GroupId,status,notes,rawMs,pMs);}
      else{fl(status==="Completed"?"Task completed!":"Task: "+status);await reload();}
    }catch(e){fl("Error: "+e.message);}
  }
  async function cancelTimer(id){
    const t=timers.find(x=>x._localId===id);if(!t)return;
    const tk=await gT();
    if(t._spId){try{await gPatch(tk,iUrl("VA_Activity",t._spId),{Status:"Queued",StartTime:null});}catch(e){console.warn("[VT] Cancel patch failed:",e);}}
    setTimers(p=>p.filter(x=>x._localId!==id));
    if(t.GroupId){
      // Restore sibling sub-tasks from SP back to local queue
      try{
        let siblings=[];
        try{
          siblings=await gAll(tk,`${lUrl("VA_Activity")}?$filter=fields/GroupId eq '${t.GroupId}' and fields/Status eq 'Queued'&expand=fields&$top=100`);
        }catch(e){
          // GroupId column may not exist yet — fall back to local queue state
          console.warn("[VT] GroupId filter failed, using local state:",e.message);
          siblings=queue.filter(x=>x.GroupId===t.GroupId&&x.Status==="Queued").map(x=>({id:x._spId,fields:x}));
        }
        const restored=siblings.map(s=>({...s.fields,id:s.id,_localId:s.id,_spId:s.id}));
        setQueue(p=>[{...t,Status:"Queued",StartTime:null,_pMs:0,_pS:null},...restored,...p]);
      }catch{setQueue(p=>[{...t,Status:"Queued",StartTime:null,_pMs:0,_pS:null},...p]);}
    }else{setQueue(p=>[{...t,Status:"Queued",StartTime:null,_pMs:0,_pS:null},...p]);}
  }

  async function clockOut(){
    if(!shift)return;const now=new Date();const bks=[...shift.Breaks];
    if(shift._ob&&shift._bs)bks.push({s:shift._bs,e:now.toISOString()});
    const bMs=bks.reduce((s,b)=>s+(new Date(b.e)-new Date(b.s)),0);
    const bMin=Math.round(bMs/6e4);const wMin=Math.round((now-new Date(shift.ClockIn)-bMs)/6e4);
    if(wMin>600&&!window.confirm(`You've been clocked in for ${fM(wMin)}. Clock out?`))return;
    try{

      const fields={Title:`${myEmp?.Name||myEmail}-${today()}`,EndTime:now.toISOString(),BreakMinutes:bMin,WorkMinutes:wMin,BreaksJSON:JSON.stringify(bks)};
      if(shift._spId){

        // Fallback: no SP record exists yet (old session), create one
        await gPost(tk,lUrl("VA_Activity"),{...fields,ActivityType:"Shift",VAEmail:myEmail,VAName:myEmp?.Name||myEmail,ActivityDate:shift.ClockIn,StartTime:shift.ClockIn});

  async function unclaimTask(task){

    const origForName=task.CoverageForName||task.VAName;
    if(task._spId){
      try{
        const tk=await gT();
        await gPatch(tk,iUrl("VA_Activity",task._spId),{
          Source:"Coverage",
          VAEmail:origForEmail,VAName:origForName,
          CoverageForEmail:origForEmail,CoverageForName:origForName
        });
      }catch(e){console.warn("[VT] Unclaim patch failed:",e);}
    }
    setQueue(p=>p.filter(t=>t._localId!==task._localId));
    setCovQ(p=>[{...task,Source:"Coverage",VAEmail:origForEmail,VAName:origForName,CoverageForEmail:origForEmail,CoverageForName:origForName},...p]);
    fl("Task returned to coverage pool");

  // ── Add grouped tasks (multi-property assign) ──
  async function addGroupedTasks(baseTask, propList){
    // propList = array of {PropertyId, PropertyName, PMName} or [] for general
    if(!propList||propList.length<=1){
      // Single task — use regular addTask (no group)
      const single=propList.length===1?{...baseTask,...propList[0]}:baseTask;
      await addTask(single);return;
    }
    const groupId=uid();
    const tk=await gT();
    const targetVa=data?.vas.find(v=>v.Email?.toLowerCase()===baseTask.VAEmail?.toLowerCase());
    const isOut=targetVa&&targetVa.VATrackerStatus==="Out";
    const saved=[];
    for(const p of propList){
      const t={...baseTask,...p,Status:"Queued",ActivityDate:today(),ActivityType:"Task",GroupId:groupId,
        Source:isOut?"Coverage":baseTask.Source,
        CoverageForEmail:isOut?targetVa.Email:"",
        CoverageForName:isOut?targetVa.Name:""};
      const res=await gPostActivity(tk,actFields(t,{GroupId:groupId}));
      saved.push({...t,_localId:res.id,_spId:res.id,id:res.id});
    }
    if(isOut){setCovQ(p=>[...saved,...p]);fl(`${targetVa.Name} is OUT — ${saved.length} tasks to coverage`);}
    else{setQueue(p=>[...saved,...p]);fl(`Group created: ${saved.length} properties`);}
  }

  // ── Complete all tasks in a group (used by group timer finish) ──
  async function finishGroupTimer(groupId, status, notes, durationMs, pauseMs){
    const tk=await gT();
    // Find all tasks in this group across queue and timers
    const groupTasks=queue.filter(t=>t.GroupId===groupId);
    const total=groupTasks.length+1; // +1 for the timer task itself
    const perDur=Math.max(1,Math.round((durationMs-pauseMs)/(total*6e4)));
    const perPause=Math.round(pauseMs/(total*6e4));
    const endTime=status==="Completed"?new Date().toISOString():null;
    // Patch all queued sub-tasks
    for(const t of groupTasks){
      if(t._spId){
        try{await gPatch(tk,iUrl("VA_Activity",t._spId),{Status:status,EndTime:endTime,DurationMin:perDur,PausedMin:perPause,Notes:notes||""});}
        catch(e){console.warn("[VT] Group patch failed:",e);}
      }
    }
    setQueue(p=>p.filter(t=>t.GroupId!==groupId));
    await reload();
  }

  // ── Cleanup Duplicates ──
  async function cleanupDuplicates(){
    if(!window.confirm("This will delete duplicate tasks created today, keeping one of each. Continue?"))return;
    const tk=await gT();
    const td=today();
    const d=await loadAll(tk);
    const todayTasks=d.activities.filter(a=>a.ActivityType==="Task"&&a.ActivityDate&&a.ActivityDate.slice(0,10)===td);
    const seen=new Map();const toDelete=[];
    todayTasks.forEach(t=>{
      const key=`${t.VAEmail?.toLowerCase()}|${t.Title}|${t.PropertyId||""}`;
      if(seen.has(key)){toDelete.push(t);}
      else{seen.set(key,t);}
    });
    if(!toDelete.length){fl("No duplicates found!");return;}
    fl(`Removing ${toDelete.length} duplicates...`);
    let removed=0;
    for(const t of toDelete){
      try{await gPatch(tk,iUrl("VA_Activity",t.id),{Status:"Incomplete",Notes:"Duplicate — auto-removed"});removed++;}catch(e){console.warn("[VT] Cleanup failed:",t.id,e.message);}
    }
    await reload();fl(`Cleaned up ${removed} duplicate tasks`);
  }

  // ── Backdate tasks ──
  async function backdateTasks(taskIds, completedDate, status){
    const tk=await gT();
    const endTs=new Date(completedDate+"T23:59:00").toISOString();
    let count=0;
    for(const id of taskIds){
      try{
        await gPatch(tk,iUrl("VA_Activity",id),{
          Status:status||"Completed",
          ActivityDate:completedDate,
          EndTime:status==="Completed"?endTs:null,
          Notes:status==="Incomplete"?"Not completed (backdated)":"Backdated completion"
        });
        count++;
      }catch(e){console.warn("[VT] Backdate failed:",id,e.message);}
    }
    // Also remove from timers state if they were In Progress
    setTimers(p=>p.filter(t=>!taskIds.includes(t._spId)));
    await reload();
    fl(`Updated ${count} tasks to ${completedDate}`);
  }

  // ── Weekly Report ──
  function generateWeeklyReport(){
    if(!data)return null;
    const now=new Date();const mon=new Date(now);mon.setDate(mon.getDate()-(mon.getDay()+6)%7-7);mon.setHours(0,0,0,0);
    const sun=new Date(mon);sun.setDate(sun.getDate()+6);sun.setHours(23,59,59,999);
    const from=mon.toISOString().slice(0,10),to=sun.toISOString().slice(0,10);
    const tasks=data.activities.filter(a=>a.ActivityType==="Task"&&inRange(actDate(a),from,to));
    const shifts=data.activities.filter(a=>a.ActivityType==="Shift"&&inRange(actDate(a),from,to));
    const done=tasks.filter(t=>t.Status==="Completed");
    const blocked=tasks.filter(t=>t.Status==="Blocked");
    const inc=tasks.filter(t=>t.Status==="Incomplete");

    let report=`VA PRODUCTIVITY TRACKER — WEEKLY REPORT\nNewShire Property Management\nWeek: ${fD(from)} – ${fD(to)}\nGenerated: ${new Date().toLocaleString()}\nPrepared by: Brandy Turner\n${"=".repeat(60)}\n\n`;
    report+=`SUMMARY\n${"-".repeat(40)}\nTotal Tasks: ${tasks.length}\nCompleted: ${done.length} (${tasks.length?Math.round(done.length/tasks.length*100):0}%)\nBlocked: ${blocked.length}\nIncomplete: ${inc.length}\n\n`;

    data.vas.forEach(va=>{
      const vT=tasks.filter(t=>t.VAEmail===va.Email);const vD=vT.filter(t=>t.Status==="Completed");const vB=vT.filter(t=>t.Status==="Blocked");const vI=vT.filter(t=>t.Status==="Incomplete");
      const vS=shifts.filter(s=>s.VAEmail===va.Email);const vSm=vS.reduce((s,a)=>s+(a.WorkMinutes||0),0);const vTm=vD.reduce((s,t)=>s+(t.DurationMin||0),0);
      const vU=vSm>0?Math.round(vTm/vSm*100):0;const vR=vT.length?Math.round(vD.length/vT.length*100):0;
      report+=`\n${"=".repeat(60)}\n${va.Name.toUpperCase()}${getVAStatus(va)==="Out"?" [OUT]":""}\n${"=".repeat(60)}\n`;
      report+=`Tasks: ${vD.length}/${vT.length} completed (${vR}%)\nShift Time: ${fM(vSm)} | Task Time: ${fM(vTm)} | Utilization: ${vU}%\n`;
      if(vB.length)report+=`\nBLOCKED (${vB.length}):\n${vB.map(t=>`  • ${t.Title} — ${t.PropertyName}${t.Notes?" — "+t.Notes:""}`).join("\n")}\n`;
      if(vI.length)report+=`\nINCOMPLETE (${vI.length}):\n${vI.map(t=>`  • ${t.Title} — ${t.PropertyName}${t.Notes?" — "+t.Notes:""}`).join("\n")}\n`;

      // Category breakdown
      const catM={};vD.forEach(t=>{if(!catM[t.Category])catM[t.Category]={c:0,m:0};catM[t.Category].c++;catM[t.Category].m+=(t.DurationMin||0);});
      const catL=Object.entries(catM).sort((a,b)=>b[1].m-a[1].m);
      if(catL.length){report+=`\nTIME BY CATEGORY:\n${catL.map(([cat,d])=>`  ${cat}: ${d.c} tasks, ${fM(d.m)}`).join("\n")}\n`;}

      // Property breakdown
      const propM={};vT.forEach(t=>{const pn=t.PropertyName||"General";if(!propM[pn])propM[pn]={done:0,total:0};propM[pn].total++;if(t.Status==="Completed")propM[pn].done++;});
      report+=`\nPROPERTY BREAKDOWN:\n${Object.entries(propM).map(([pn,d])=>`  ${pn}: ${d.done}/${d.total}`).join("\n")}\n`;
    });

    // Coverage summary
    const covTasks=tasks.filter(t=>t.CoverageForEmail);
    if(covTasks.length)report+=`\n${"=".repeat(60)}\nCOVERAGE TASKS: ${covTasks.length}\n${covTasks.map(t=>`  ${t.VAName} covered for ${t.CoverageForName}: ${t.Title}`).join("\n")}\n`;

    return{report,from,to};
  }

      await reload();fl(`${prop.PropertyName} → ${vaName}`);
    }catch(e){fl("Error: "+e.message);}
  }
  async function unassignProp(portId,propName,vaName){
    try{const t=await gT();await gPatch(t,iUrl("VA_Portfolios",portId),{IsActive:false});await reload();fl(`${propName} removed from ${vaName}`);}catch(e){fl("Error: "+e.message);}
  }

  // ── Guest management ──
  async function addGuest({name,email,company,vaEmails}){
    try{
      const t=await gT();
      // Send Azure B2B invite
      try{
        await gRawPost(t,"https://graph.microsoft.com/v1.0/invitations",{
          invitedUserEmailAddress:email,
          inviteRedirectUrl:"https://newshirepm.github.io/va-tracker/",
          sendInvitationMessage:true,
          invitedUserDisplayName:name
        });
        console.log("[VT] B2B invite sent to",email);
      }catch(invErr){
        console.warn("[VT] B2B invite failed (may need User.Invite.All permission):",invErr.message);
        // Continue to create the record even if invite fails
      }
      await gPost(t,lUrl("VA_Guests"),{Title:`Guest-${Date.now()}`,GuestName:name,GuestEmail:email.toLowerCase(),Company:company||"",VAEmails:vaEmails.join(","),IsActive:true,InvitedDate:new Date().toISOString(),InvitedBy:acct?.name||myEmail});

  // ── Property CRUD ──
  async function addProperty(p){
    try{const t=await gT();await gPost(t,lUrl("VA_Properties"),{Title:`PROP-${String(data.properties.length+1).padStart(3,"0")}`,PropertyName:p.name,PropertyGroup:p.group,Units:p.units,PMEmail:p.pmEmail,PMName:p.pmName,AppFolioId:p.appFolioId||"",IsActive:true});
      await reload();fl(`${p.name} added!`);
    }catch(e){fl("Error: "+e.message);}

  async function editProperty(id,fields){
    try{const t=await gT();await gPatch(t,iUrl("VA_Properties",id),fields);await reload();fl("Property updated!");}catch(e){fl("Error: "+e.message);}
  }

  // ── Helpers for manager view ──
  function getVAForProperty(propId){
    const port=data?.portfolios.find(p=>p.PropertyId===propId);
    if(!port)return null;
    return data?.vas.find(v=>v.Email?.toLowerCase()===port.VAEmail?.toLowerCase())||null;
  }
  function myManagedProps(){
    if(!data||!myEmail)return[];
    return data.properties.filter(p=>p.PMEmail?.toLowerCase()===myEmail);
  }

  // ============================================================
  // COMPUTED
  // ============================================================
  const isAdmin=role==="admin";
  const isMgr=role==="admin"||role==="manager";
  const isVA=role==="va";
  const isGuest=role==="guest";

  // viewAs: admin previews as another user
  const effectiveRole=viewAs?viewAs.role:role;
  const effectiveEmail=viewAs?viewAs.email:myEmail;
  const effectiveIsAdmin=effectiveRole==="admin";
  const effectiveIsMgr=effectiveRole==="admin"||effectiveRole==="manager";
  const effectiveIsVA=effectiveRole==="va";

  const myVa=data?.vas.find(v=>v.Email&&v.Email.toLowerCase()===effectiveEmail);
  const myPort=data?data.portfolios.filter(p=>p.VAEmail&&p.VAEmail.toLowerCase()===effectiveEmail):[];
  const myProps=data?myPort.map(p=>data.properties.find(pr=>pr.Title===p.PropertyId)).filter(Boolean):[];
  const mgrProps=(()=>{if(!data||!effectiveEmail)return[];return data.properties.filter(p=>p.PMEmail?.toLowerCase()===effectiveEmail);})();
  const myQ=queue.filter(t=>effectiveIsVA?(t.VAEmail&&t.VAEmail.toLowerCase()===effectiveEmail):true);
  const myTm=timers.filter(t=>effectiveIsVA?t.VAEmail.toLowerCase()===effectiveEmail:true);
  const outVAs=data?data.vas.filter(v=>getVAStatus(v)==="Out"):[];
  // Guest computed
  const guestVAEmails=isGuest&&myGuest?.VAEmails?myGuest.VAEmails.split(",").map(e=>e.trim().toLowerCase()).filter(Boolean):[];
  const guestVAs=isGuest?data?.vas.filter(v=>guestVAEmails.includes(v.Email?.toLowerCase()))||[]:null;

  // ============================================================
  // RENDER: Auth screens
  // ============================================================
  if(!acct)return(<div style={S.page}><div style={S.header}><div><div style={S.headerTitle}>{CONFIG.appName}</div><div style={S.headerSub}>NewShire Property Management</div></div></div><div style={{...S.content,textAlign:"center",paddingTop:80}}><div style={S.card}><div style={{fontSize:40,marginBottom:16}}>{"\u23F1"}</div><div style={{fontSize:20,fontWeight:700,color:C.teal700,marginBottom:8}}>VA Productivity Tracker</div><div style={{color:C.gray400,marginBottom:24}}>Sign in with your NewShire account.</div><button style={S.btn(C.headerBg)} onClick={login}>Sign In with Microsoft</button>{authErr&&<div style={{color:C.error,marginTop:12,fontSize:13}}>{authErr}</div>}</div></div></div>);
  if(loading)return(<div style={S.page}><div style={S.header}><div><div style={S.headerTitle}>{CONFIG.appName}</div><div style={S.headerSub}>NewShire Property Management</div></div></div><div style={{...S.content,textAlign:"center",paddingTop:80}}><div style={{fontSize:18,color:C.gray400}}>Loading...</div></div></div>);
  if(error||!role){
    const matchedEmp=data?data.employees.find(e=>(e.Email&&e.Email.toLowerCase()===myEmail)||(e.M365UserId&&e.M365UserId.toLowerCase()===myEmail)):null;
    const allEmails=data?data.employees.map(e=>e.Email||"(blank)").join(", "):"loading...";
    return(<div style={S.page}><div style={S.header}><div><div style={S.headerTitle}>{CONFIG.appName}</div><div style={S.headerSub}>NewShire Property Management</div></div></div><div style={{...S.content,textAlign:"center",paddingTop:80}}><div style={{...S.card,borderLeft:`3px solid ${C.error}`}}><div style={{fontSize:40,marginBottom:16}}>{"\u{1F6AB}"}</div><div style={{fontSize:18,fontWeight:600,color:C.error,marginBottom:8}}>{error==="access_denied"?"Access Denied":"Error"}</div><div style={{color:C.gray400,marginBottom:16}}>{error==="access_denied"?"Your account is not authorized.":error}</div><div style={{background:C.teal50,border:`1px solid ${C.teal100}`,borderRadius:6,padding:12,textAlign:"left",fontSize:12,fontFamily:mono}}><div style={{fontWeight:700,color:C.teal700,marginBottom:8}}>{"\u{1F4CB}"} Please send this info to Brandy:</div><div style={{color:C.gray600,marginBottom:4}}>Signed in as: <strong>{myEmail}</strong></div><div style={{color:C.gray600,marginBottom:4}}>Records loaded: <strong>{data?data.employees.length:"..."}</strong></div><div style={{color:C.gray600,marginBottom:4}}>Match: <strong>{matchedEmp?`FOUND — ${matchedEmp.JobTitle} (role: ${matchedEmp.VATrackerRole||"auto"})`:"NOT FOUND"}</strong></div><div style={{color:C.gray600,wordBreak:"break-all"}}>Emails on file: <strong>{allEmails}</strong></div></div></div></div></div>);
  }

  // ============================================================
  // TABS
  // ============================================================
  const TABS=[];
  const mrPendingCount=data?data.activities.filter(a=>a.ActivityType==="ManagerReview"&&a.Status==="Pending"&&(effectiveIsAdmin||a.PMEmail?.toLowerCase()===effectiveEmail||a.PMEmail?.toLowerCase()===CONFIG.brandyEmail)).length:0;
  const myMrCount=data?data.activities.filter(a=>a.ActivityType==="ManagerReview"&&a.Status==="Pending"&&a.VAEmail?.toLowerCase()===effectiveEmail).length:0;
  if(isGuest){
    TABS.push({n:"Dashboard",k:"gdash"});
    TABS.push({n:`Active${timers.filter(t=>guestVAEmails.includes(t.VAEmail?.toLowerCase())).length?` (${timers.filter(t=>guestVAEmails.includes(t.VAEmail?.toLowerCase())).length})`:""}`,k:"gactive"});
    TABS.push({n:"History",k:"history"});
    TABS.push({n:"Scorecard",k:"score"});
  } else {
    if(effectiveIsMgr)TABS.push({n:"Dashboard",k:effectiveIsAdmin?"dash":"mdash"});
    if(effectiveIsVA)TABS.push({n:`My Tasks${myQ.length?` (${myQ.length})`:""}`  ,k:"tasks"});
    if(effectiveIsAdmin)TABS.push({n:`All Tasks${queue.length?` (${queue.length})`:""}`  ,k:"alltasks"});
    if(effectiveIsAdmin)TABS.push({n:`Active${timers.length?` (${timers.length})`:""}`  ,k:"active"});
    if(effectiveIsMgr||effectiveIsAdmin)TABS.push({n:`Mgr Review${mrPendingCount?` (${mrPendingCount})`:""}`  ,k:"mgrreview"});
    if(effectiveIsVA)TABS.push({n:myMrCount>0?`My Requests (${myMrCount})`:"My Requests",k:"myreview"});
    if(effectiveRole==="manager"||effectiveIsAdmin)TABS.push({n:`My Properties${mgrProps.length?` (${mgrProps.length})`:effectiveIsAdmin?" (All)":""}`,k:"mprops"});
    if(effectiveIsVA)TABS.push({n:"Scorecard",k:"score"});
    if(effectiveIsAdmin)TABS.push({n:"History",k:"history"});
    if(effectiveIsAdmin)TABS.push({n:"Scorecard",k:"score"});
    if(isAdmin)TABS.push({n:"Admin",k:"admin"});
  }
  const ck=TABS[tab]?.k||TABS[0]?.k;

  // ============================================================
  // RENDER
  // ============================================================
  return(
    <div style={S.page}>
      <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Code+Pro:wght@500;700&display=swap" rel="stylesheet"/>
      <div style={S.header}>
        <div><div style={S.headerTitle}>{CONFIG.appName}</div><div style={S.headerSub}>NewShire Property Management</div></div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{textAlign:"right"}}>
            {lastSync&&<div style={{fontSize:10,color:C.gray400,display:"flex",alignItems:"center",gap:4,justifyContent:"flex-end"}}>
              <span style={{display:"inline-block",width:6,height:6,borderRadius:"50%",background:syncing?C.warning:C.success,animation:syncing?"pulse 1s infinite":"none"}}/>
              {syncing?"Syncing…":`Updated ${Math.round((Date.now()-lastSync)/1000)}s ago`}
            </div>}
          </div>
          <button title="Refresh now" style={{background:"none",border:`1px solid ${C.teal600}`,borderRadius:4,color:C.teal100,fontSize:13,cursor:"pointer",padding:"4px 8px",display:"flex",alignItems:"center",gap:4}} onClick={async()=>{setSyncing(true);try{const tk=await refresh();if(tk){const d=await loadAll(tk);setData(d);buildQueue(d,myEmail);setLastSync(Date.now());}}finally{setSyncing(false);}}}>
            <span style={{display:"inline-block",transition:"transform 0.4s",transform:syncing?"rotate(360deg)":"rotate(0deg)"}}>↻</span>
          </button>
        </div>
        <div style={S.headerUser}>
          <div style={{fontWeight:600}}>{isGuest?myGuest?.GuestName:acct.name||myEmail}</div>
          <div style={{fontSize:11,color:isGuest?C.purple:viewAs?C.warning:C.gold500,textTransform:"uppercase"}}>{isGuest?`Guest${myGuest?.Company?` · ${myGuest.Company}`:""}${guestVAs?` · ${guestVAs.length} VAs`:""}`:viewAs?`👁 ${viewAs.name} (${viewAs.role})`:role+(role==="manager"?` · ${mgrProps.length} properties`:"")}</div>
          <div style={{display:"flex",gap:4,justifyContent:"flex-end",marginTop:2}}>
            {isGuest?<Badge type="purple">Read-Only</Badge>:<>{timers.length>0&&<Badge type="success">{timers.length} timing</Badge>}{covQ.length>0&&<Badge type="warning">{covQ.length} coverage</Badge>}{outVAs.length>0&&<Badge type="error">{outVAs.length} out</Badge>}</>}
          </div>
          {isAdmin&&data&&<div style={{marginTop:5}}>
            <select style={{fontSize:11,background:viewAs?"rgba(212,150,10,0.15)":C.headerHover,color:viewAs?C.warning:C.teal100,border:`1px solid ${viewAs?C.warning:C.teal600}`,borderRadius:4,padding:"3px 8px",cursor:"pointer",fontFamily:font,maxWidth:180}} value={viewAs?viewAs.email:""} onChange={e=>{
              const v=e.target.value;
              if(!v){setViewAs(null);setTab(0);return;}
              const emp=data.employees.find(x=>x.Email?.toLowerCase()===v);
              if(!emp)return;
              const r=detectRole(emp);
              setViewAs({email:emp.Email.toLowerCase(),name:emp.Name,role:r});
              setTab(0);
            }}>
              <option value="">View as...</option>
              <optgroup label="Virtual Assistants">{data.vas.map(v=><option key={v.Email} value={v.Email.toLowerCase()}>{v.Name}</option>)}</optgroup>
              <optgroup label="Managers">{data.pms.map(p=><option key={p.Email} value={p.Email.toLowerCase()}>{p.Name}</option>)}</optgroup>
            </select>
          </div>}
        </div>
      </div>
      <div style={S.tabBar}>{TABS.map((t,i)=><button key={t.k} style={S.tab(tab===i)} onClick={()=>setTab(i)}>{t.n}</button>)}</div>
      {viewAs&&<div style={{background:"rgba(212,150,10,0.12)",borderBottom:`2px solid ${C.warning}`,padding:"6px 20px",fontSize:12,fontWeight:600,color:C.warning,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
        <span>{"\u{1F441}\uFE0F"} Preview mode: viewing as <strong>{viewAs.name}</strong> ({viewAs.role}). Changes you make are real — they will affect actual data.</span>
        <button style={{...S.btnO(C.warning,C.warning),padding:"3px 10px",fontSize:11,minHeight:24}} onClick={()=>{setViewAs(null);setTab(0);}}>Exit Preview</button>
      </div>}
      {flash&&<div style={{background:C.gold50,borderBottom:`1px solid ${C.gold500}`,padding:"8px 20px",fontSize:13,fontWeight:600,color:C.gold700,textAlign:"center"}}>{flash}</div>}
      <div style={S.content}>
        {ck==="gdash"&&<DashboardView data={data} queue={queue} timers={timers} covQ={covQ} shift={shift} dfFrom={dfFrom} dfTo={dfTo} setDfFrom={setDfFrom} setDfTo={setDfTo} filterProps={null} filterVAs={guestVAs} isGuest={true}/>}
        {ck==="gactive"&&<ActiveView timers={timers.filter(t=>guestVAEmails.includes(t.VAEmail?.toLowerCase()))} tick={tick} isMgr={true} readOnly={true} onPause={pauseTimer} onResume={resumeTimer} onFinish={finishTimer} onCancel={cancelTimer}/>}
        {ck==="dash"&&<DashboardView data={data} queue={queue} timers={timers} covQ={covQ} shift={shift} myEmail={myEmail} tick={tick} dfFrom={dfFrom} dfTo={dfTo} setDfFrom={setDfFrom} setDfTo={setDfTo} filterProps={null}/>}
        {ck==="mdash"&&<DashboardView data={data} queue={queue} timers={timers} covQ={covQ} shift={shift} myEmail={effectiveEmail} tick={tick} dfFrom={dfFrom} dfTo={dfTo} setDfFrom={setDfFrom} setDfTo={setDfTo} filterProps={mgrProps}/>}
        {ck==="tasks"&&<MyTasksView data={data} role={effectiveRole} myEmail={effectiveEmail} myVa={myVa} myProps={myProps} queue={queue} covQ={covQ} shift={shift} timers={timers} tick={tick} onClockIn={clockIn} onBreakStart={startBreak} onBreakEnd={endBreak} onClockOut={clockOut} onStartTimer={startTimer} onPause={pauseTimer} onResume={resumeTimer} onFinish={finishTimer} onCancel={cancelTimer} onClaimCov={claimCov} onUnclaimTask={unclaimTask} onRequestHelp={requestHelp} onUnblockTask={unblockTask} onAddTask={addTask} onDeleteTask={deleteTask} onCompleteSubTask={completeSubTask} config={data?.config}/>}
        {ck==="alltasks"&&<AllTasksView data={data} queue={queue} covQ={covQ} timers={timers} onStartTimer={startTimer} onDeleteTask={deleteTask} onAddTask={addTask} config={data?.config}/>}
        {ck==="mgrreview"&&<ManagerReviewTab data={data} myEmail={effectiveEmail} isAdmin={effectiveIsAdmin} onComplete={completeManagerReview}/>}
        {ck==="myreview"&&<MyReviewTab data={data} myEmail={effectiveEmail} onComplete={completeManagerReview} onAdd={addManagerReview} myProps={myProps}/>}
        {ck==="active"&&<ActiveView timers={isVA?timers.filter(t=>t.VAEmail.toLowerCase()===myEmail):timers} tick={tick} isMgr={isMgr} onPause={pauseTimer} onResume={resumeTimer} onFinish={finishTimer} onCancel={cancelTimer} onBackdate={backdateFinish}/>}
        {ck==="mprops"&&<ManagerPropsView data={data} myEmail={effectiveEmail} myEmp={myEmp} mgrProps={effectiveIsAdmin?data.properties:mgrProps} queue={queue} timers={timers} covQ={covQ} onAddTask={addTask} getVA={getVAForProperty} isAdmin={effectiveIsAdmin} onCompleteManagerReview={completeManagerReview}/>}
        {ck==="history"&&<HistoryView data={data} role={effectiveRole} myEmail={effectiveEmail} isMgr={effectiveIsMgr} mgrProps={mgrProps} onUpdateDuration={updateDuration} guestVAEmails={guestVAEmails}/>}
        {ck==="score"&&<ScorecardView data={data} role={effectiveRole} myEmail={effectiveEmail} isMgr={effectiveIsMgr} myVa={myVa} myProps={myProps} mgrProps={mgrProps} guestVAs={guestVAs} shift={shift} tick={tick}/>}
        {ck==="admin"&&<AdminView data={data} myEmail={myEmail} acct={acct} config={data?.config} queue={queue} covQ={covQ} onToggleAbsence={toggleAbsence} onRecoverTasks={recoverTasks} onAssignTask={addTask} onAddGroupedTasks={addGroupedTasks} onCloseDay={closeDay} onUpdateConfig={updateConfig} onAssignProp={assignProp} onUnassignProp={unassignProp} onAddProperty={addProperty} onEditProperty={editProperty} onDeactivateProperty={deactivateProperty} onDeleteTask={deleteTask} onCompleteSubTask={completeSubTask} generateReport={generateWeeklyReport} onAddGuest={addGuest} onUpdateGuest={updateGuest} onDeactivateGuest={deactivateGuest} onCleanup={cleanupDuplicates} onBackdate={backdateTasks} onAdminClockIn={adminClockIn} onAddBackdatedShift={addBackdatedShift} onClosePastDays={closePastDays} onConfirmClosePastDays={confirmClosePastDays} onResolveBlocked={resolveBlocked}/>}
      <div style={{background:"#0f2229",borderTop:"2px solid #CDA04B",padding:"10px 20px",textAlign:"center",marginTop:20}}>
        <div style={{fontSize:11,color:"#8aabb5",letterSpacing:"0.04em"}}>
          2025 · This application is the intellectual property of NewShire Property Management. Reproduction or use without written permission is prohibited.
        </div>
      </div>
      </div>
    </div>
  );
}

// ============================================================
// DASHBOARD — shared by Admin (all) and Manager (filtered)
// ============================================================
function DashboardView({data,queue,timers,covQ,shift,myEmail,tick,dfFrom,dfTo,setDfFrom,setDfTo,filterProps,filterVAs,isGuest}){
  if(!data)return null;
  // Filter activities by date range and optionally by properties
  const propIds=filterProps?new Set(filterProps.map(p=>p.Title)):null;
  const vaEmailSet=filterVAs?new Set(filterVAs.map(v=>v.Email?.toLowerCase())):null;
  const tasks=data.activities.filter(a=>a.ActivityType==="Task"&&inRange(actDate(a),dfFrom,dfTo)&&(!propIds||propIds.has(a.PropertyId))&&(!vaEmailSet||vaEmailSet.has(a.VAEmail?.toLowerCase())));
  const done=tasks.filter(a=>a.Status==="Completed");
  const blocked=tasks.filter(a=>a.Status==="Blocked");
  const inc=tasks.filter(a=>a.Status==="Incomplete");
  const shifts=data.activities.filter(a=>a.ActivityType==="Shift"&&inRange(actDate(a),dfFrom,dfTo)&&(!vaEmailSet||vaEmailSet.has(a.VAEmail?.toLowerCase())));
  // Add live time from any open shifts (clocked in but not yet clocked out)
  const now=Date.now();
  const openShifts=data.activities.filter(a=>a.ActivityType==="Shift"&&a.StartTime&&!a.EndTime&&(!vaEmailSet||vaEmailSet.has(a.VAEmail?.toLowerCase())));
  const liveMin=openShifts.reduce((s,a)=>{
    const start=new Date(a.StartTime).getTime();
    return s+Math.round((now-start)/60000);
  },0);
  // Also add the current user's local shift if it exists and isn't in SP yet
  const localLiveMin=shift&&!openShifts.some(o=>o.VAEmail?.toLowerCase()===myEmail)
    ?Math.round((now-new Date(shift.ClockIn).getTime())/60000):0;
  const shiftMin=shifts.reduce((s,a)=>s+(a.WorkMinutes||0),0)+liveMin+localLiveMin;
  const taskMin=done.reduce((s,a)=>s+(a.DurationMin||0),0);
  const rate=tasks.length?Math.round(done.length/tasks.length*100):0;
  const util=shiftMin>0?Math.round(taskMin/shiftMin*100):0;
  const filteredVAs=filterVAs||( propIds?data.vas.filter(v=>data.portfolios.some(p=>propIds.has(p.PropertyId)&&p.VAEmail?.toLowerCase()===v.Email.toLowerCase())):data.vas);

  const pendingMR=data.activities.filter(a=>a.ActivityType==="ManagerReview"&&a.Status==="Pending"&&(!propIds||propIds.has(a.PropertyId)));

  return(
    <div>
      {/* Date filter */}
      <div style={{...S.card,display:"flex",gap:12,alignItems:"flex-end",flexWrap:"wrap",padding:12}}>
        <div><label style={S.label}>From</label><input type="date" style={{...S.input,width:150}} value={dfFrom} onChange={e=>setDfFrom(e.target.value)}/></div>
        <div><label style={S.label}>To</label><input type="date" style={{...S.input,width:150}} value={dfTo} onChange={e=>setDfTo(e.target.value)}/></div>
        <div style={{display:"flex",gap:6}}>
          {[{l:"7d",d:7},{l:"14d",d:14},{l:"30d",d:30},{l:"90d",d:90}].map(p=><button key={p.l} style={{...S.btnO(C.teal600,C.teal100),...S.btnSm}} onClick={()=>{const f=new Date();f.setDate(f.getDate()-p.d);setDfFrom(f.toISOString().slice(0,10));setDfTo(today());}}>{p.l}</button>)}
        </div>
        {filterProps&&<div style={{fontSize:12,color:C.gold700,fontWeight:600,marginLeft:"auto"}}>Showing {filterProps.length} managed properties</div>}
      </div>

      {/* KPIs */}
      {isGuest&&<div style={{background:C.purpleBg,border:`1px solid ${C.purple}`,borderRadius:6,padding:"8px 14px",marginBottom:12,fontSize:12,color:C.purple,display:"flex",alignItems:"center",gap:8}}><span>👁️</span><span>Read-only view — showing data for: <strong>{filteredVAs.map(v=>v.Name).join(", ")}</strong></span></div>}
      <div style={{...S.row,marginBottom:16}}>
        <KPI label="Tasks" value={tasks.length}/>
        <KPI label="Done" value={done.length} color={C.success}/>
        <KPI label="Rate" value={`${rate}%`} color={rate>=85?C.success:rate>=60?C.warning:tasks.length?C.error:C.teal700}/>
        {!filterProps&&!isGuest&&<KPI label="Shift Hrs" value={fM(shiftMin)}/>}
        {!filterProps&&!isGuest&&<KPI label="Utilization" value={`${util}%`} color={util>=75?C.success:util>=50?C.warning:shiftMin>0?C.error:C.teal700}/>}
        <KPI label="Blocked" value={blocked.length} color={blocked.length>0?C.error:C.success}/>
        {!isGuest&&<KPI label="Coverage" value={covQ.length} color={covQ.length>0?C.warning:C.success}/>}
        {(()=>{const pendingReviews=data.activities.filter(a=>a.ActivityType==="ManagerReview"&&a.Status==="Pending"&&(!propIds||propIds.has(a.PropertyId)));return<KPI label="Mgr Review" value={pendingReviews.length} color={pendingReviews.length>0?C.gold700:C.success} sub="pending"/>;})()}
        {!filterProps&&!isGuest&&<KPI label="VAs Out" value={data.vas.filter(v=>getVAStatus(v)==="Out").length} color={data.vas.filter(v=>getVAStatus(v)==="Out").length>0?C.warning:C.teal700}/>}
      </div>

      {/* Needs Attention */}
      {pendingMR.length>0&&<div style={{...S.card,borderLeft:`3px solid ${C.gold500}`,background:C.gold50,marginBottom:14}}>
        <div style={{fontSize:15,fontWeight:600,color:C.gold700,marginBottom:8}}>📋 Pending Manager Review ({pendingMR.length})</div>
        {pendingMR.slice(0,5).map((t,i)=><div key={i} style={{fontSize:13,color:C.gray600,padding:"3px 0"}}>{t.VAName}: {t.Title}{t.PropertyName&&t.PropertyName!=="General"?` — ${t.PropertyName}`:""}</div>)}
        {pendingMR.length>5&&<div style={{fontSize:11,color:C.gray400,marginTop:4}}>+{pendingMR.length-5} more</div>}
      </div>}
      {(blocked.length>0||inc.length>0||covQ.length>0)&&(
        <div style={{...S.card,borderLeft:`3px solid ${C.error}`,background:C.errorBg}}>
          <div style={{fontSize:16,fontWeight:600,color:C.error,marginBottom:10}}>{"\u{1F6A8}"} Needs Attention</div>
          {blocked.length>0&&<div style={{marginBottom:8}}><div style={{fontSize:12,fontWeight:600,color:C.error,marginBottom:4}}>Blocked Tasks ({blocked.length})</div>{blocked.slice(0,5).map((t,i)=><div key={i} style={{fontSize:13,color:C.gray600,padding:"3px 0"}}>{t.VAName}: {t.Title} — {t.PropertyName}{t.Notes?` · ${t.Notes}`:""}</div>)}{blocked.length>5&&<div style={{fontSize:11,color:C.gray400}}>+{blocked.length-5} more</div>}</div>}
          {covQ.length>0&&<div style={{marginBottom:8}}><div style={{fontSize:12,fontWeight:600,color:C.warning,marginBottom:4}}>Unclaimed Coverage ({covQ.length})</div>{covQ.slice(0,5).map((t,i)=><div key={i} style={{fontSize:13,color:C.gray600,padding:"3px 0"}}>{t.Title} — covering {t.CoverageForName}</div>)}</div>}
          {inc.length>3&&<div><div style={{fontSize:12,fontWeight:600,color:C.gray400,marginBottom:4}}>High Incomplete Rate</div><div style={{fontSize:13,color:C.gray600}}>{inc.length} tasks marked incomplete in this period</div></div>}
        </div>
      )}

      {/* Kanban */}
      <div style={S.card}>
        <div style={S.cardTitle}>{"\u{1F4CB}"} Task Board</div>
        <div style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:8}}>
          {filteredVAs.map(va=>{
            const isOut=getVAStatus(va)==="Out";
            const vQ=queue.filter(t=>t.VAEmail&&t.VAEmail.toLowerCase()===va.Email.toLowerCase());
            const vT=timers.filter(t=>t.VAEmail.toLowerCase()===va.Email.toLowerCase());
            const port=data.portfolios.filter(p=>p.VAEmail?.toLowerCase()===va.Email.toLowerCase());
            const td=today();
            const vaEmail=va.Email.toLowerCase();
            const vaShiftToday=data.activities.filter(a=>a.ActivityType==="Shift"&&a.VAEmail?.toLowerCase()===vaEmail&&a.ActivityDate?.slice(0,10)===td);
            const openShift=vaShiftToday.find(s=>s.StartTime&&!s.EndTime);
            const isClockedIn=!!openShift||(shift&&myEmail===vaEmail&&!!shift.ClockIn);
            const isOnBreak=isClockedIn&&((openShift&&openShift.Title?.endsWith("-Break"))||(shift&&myEmail===vaEmail&&shift._ob));
            return(
              <div key={va.Email} style={{flex:"1 0 200px",minWidth:200,background:isOut?C.errorBg:C.pageBg,borderRadius:6,padding:10,border:`1px solid ${isOut?"rgba(196,75,59,0.2)":C.gray100}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,paddingBottom:6,borderBottom:`2px solid ${C.teal100}`}}>
                  <div><div style={{fontSize:13,fontWeight:700,color:isOut?C.error:C.teal700}}>{va.Name}{isOut?" \u{1F6D1}":""}</div><div style={{fontSize:10,color:C.gray400}}>{port.length} props</div></div>
                  {isOut?<Badge type="error">OUT</Badge>:
                    vT.length>0?<Badge type="success">⏱ Timing</Badge>:
                    isOnBreak?<Badge type="warning">☕ Break</Badge>:
                    isClockedIn?<Badge type="info">✓ Clocked In</Badge>:
                    <span style={{fontSize:10,color:C.gray300}}>Not Clocked In</span>}
                </div>
                {vT.map(t=><div key={t._localId} style={{background:C.white,border:`1px solid ${C.success}`,borderLeft:`3px solid ${C.success}`,borderRadius:4,padding:8,marginBottom:5}}><div style={{fontSize:10,fontWeight:600,color:C.success,textTransform:"uppercase"}}>{"\u25CF"} In Progress</div><div style={{fontSize:12,fontWeight:500,color:C.teal700}}>{t.Title}</div><div style={{fontSize:10,color:C.gray400}}>{t.PropertyName}</div></div>)}
                {(()=>{
                  const seen=new Set();
                  return vQ.map(t=>{
                    if(t.GroupId){
                      if(seen.has(t.GroupId))return null;
                      seen.add(t.GroupId);
                      const grp=vQ.filter(x=>x.GroupId===t.GroupId);
                      const done=grp.filter(x=>x.Status==="Completed").length;
                      const pct=Math.round(done/grp.length*100);
                      return<div key={t.GroupId} style={{background:C.white,border:`1px solid ${C.gray200}`,borderLeft:`3px solid ${t.Priority==="Urgent"?C.error:t.Priority==="High"?C.warning:C.teal400}`,borderRadius:4,padding:8,marginBottom:5}}>
                        <div style={{fontSize:12,fontWeight:500,color:C.teal700}}>{t.Title}</div>
                        <div style={{fontSize:10,color:C.gray400,marginBottom:4}}>{grp.length} properties</div>
                        <div style={{height:4,background:C.gray100,borderRadius:2}}><div style={{width:`${pct}%`,height:"100%",background:pct===100?C.success:C.gold500,borderRadius:2}}/></div>
                        <div style={{fontSize:9,color:C.gray400,marginTop:2}}>{done}/{grp.length} done</div>
                      </div>;
                    }
                    return<div key={t._localId} style={{background:C.white,border:`1px solid ${C.gray200}`,borderLeft:`3px solid ${t.Priority==="Urgent"?C.error:t.Priority==="High"?C.warning:C.gray200}`,borderRadius:4,padding:8,marginBottom:5}}><div style={{fontSize:12,fontWeight:500,color:C.teal700}}>{t.Title}</div><div style={{fontSize:10,color:C.gray400}}>{t.PropertyName}</div></div>;
                  });
                })()}
                {!vT.length&&!vQ.length&&<div style={{textAlign:"center",padding:"16px 0",color:C.gray300,fontSize:11,fontStyle:"italic"}}>{isOut?"Tasks in coverage":"No pending"}</div>}
                <div style={{marginTop:6,paddingTop:6,borderTop:`1px solid ${C.gray100}`,fontSize:10,color:C.gray400,display:"flex",justifyContent:"space-between"}}><span>{vQ.length+vT.length} pending</span><span>{vT.length} active</span></div>
              </div>
            );
          })}
        </div>
      </div>

      {/* VA Performance Table */}
      <div style={S.card}>
        <div style={S.cardTitle}>VA Performance</div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>{["VA","Status","Portfolio","Done","Rate","Shift","Tasks","Util","Blocked","Incomplete"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
            <tbody>
              {filteredVAs.map(va=>{
                const vT=tasks.filter(a=>a.VAEmail===va.Email);const vD=vT.filter(a=>a.Status==="Completed");const vI=vT.filter(a=>a.Status==="Incomplete");const vB=vT.filter(a=>a.Status==="Blocked");
                const vS=shifts.filter(a=>a.VAEmail===va.Email);
                const vOpenShift=openShifts.find(o=>o.VAEmail?.toLowerCase()===va.Email.toLowerCase());
                const vLiveMin=vOpenShift?Math.round((now-new Date(vOpenShift.StartTime).getTime())/60000):
                  (shift&&myEmail===va.Email.toLowerCase()?Math.round((now-new Date(shift.ClockIn).getTime())/60000):0);
                const vSm=vS.reduce((s,a)=>s+(a.WorkMinutes||0),0)+vLiveMin;
                const vTm=vD.reduce((s,a)=>s+(a.DurationMin||0),0);
                const vR=vT.length?Math.round(vD.length/vT.length*100):0;const vU=vSm>0?Math.round(vTm/vSm*100):0;
                const port=data.portfolios.filter(p=>p.VAEmail?.toLowerCase()===va.Email.toLowerCase());
                const td2=today();const vaE2=va.Email.toLowerCase();
                const vs2=data.activities.filter(a=>a.ActivityType==="Shift"&&a.VAEmail?.toLowerCase()===vaE2&&a.ActivityDate?.slice(0,10)===td2);
                const os2=vs2.find(s=>s.StartTime&&!s.EndTime);
                const ci2=!!os2||(shift&&myEmail===vaE2&&!!shift.ClockIn);
                const ob2=ci2&&((os2&&os2.Title?.endsWith("-Break"))||(shift&&myEmail===vaE2&&shift._ob));
                const tTiming=timers.some(t=>t.VAEmail.toLowerCase()===vaE2);
                return(<tr key={va.Email} style={{opacity:getVAStatus(va)==="Out"?0.6:1}}>
                  <td style={{...S.td,fontWeight:600,color:getVAStatus(va)==="Out"?C.error:C.teal700}}>{va.Name}</td>
                  <td style={S.td}>{getVAStatus(va)==="Out"?<Badge type="error">OUT</Badge>:tTiming?<Badge type="success">⏱ Timing</Badge>:ob2?<Badge type="warning">☕ Break</Badge>:ci2?<Badge type="info">✓ In</Badge>:<span style={{fontSize:11,color:C.gray400}}>—</span>}</td>
                  <td style={{...S.td,fontSize:12}}>{port.length} props</td>
                  <td style={S.td}>{vD.length}/{vT.length}</td>
                  <td style={S.td}><Badge type={vR>=85?"success":vR>=60?"warning":"error"}>{vR}%</Badge></td>
                  <td style={{...S.td,fontFamily:mono,fontSize:12}}>{fM(vSm)}</td>
                  <td style={{...S.td,fontFamily:mono,fontSize:12}}>{fM(vTm)}</td>
                  <td style={S.td}><div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:40,height:6,background:C.gray100,borderRadius:4,overflow:"hidden"}}><div style={{width:`${Math.min(vU,100)}%`,height:"100%",background:vU>=75?C.success:vU>=50?C.warning:C.error,borderRadius:4}}/></div><span style={{fontFamily:mono,fontSize:10,fontWeight:600,color:vU>=75?C.success:vU>=50?C.warning:C.error}}>{vU}%</span></div></td>
                  <td style={S.td}>{vB.length>0?<Badge type="error">{vB.length}</Badge>:"0"}</td>
                  <td style={S.td}>{vI.length>0?<Badge type="error">{vI.length}</Badge>:"0"}</td>
                </tr>);
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// MANAGER REVIEW FORM
// ============================================================
const MR_CATS=["Application Review","Property Question","Resident Communication","Other"];

function ManagerReviewForm({data,myEmail,myVa,myProps,onSubmit,pendingReviews,onComplete}){
  const[open,setOpen]=useState(false);
  const[mrCat,setMrCat]=useState("");const[mrProp,setMrProp]=useState("");
  const[mrResident,setMrResident]=useState("");const[mrDesc,setMrDesc]=useState("");
  const[mrAddress,setMrAddress]=useState("");

  // Derive PM for selected property
  const selProp=mrProp?data?.properties.find(p=>p.Title===mrProp):null;
  const targetPm=selProp?data?.pms.find(pm=>pm.Email?.toLowerCase()===selProp.PMEmail?.toLowerCase()):null;
  const isSFR=selProp?.PropertyGroup==="Single Family"||selProp?.PropertyName?.toLowerCase().includes("single family")||selProp?.PropertyGroup?.toLowerCase().includes("single");

  function handleSubmit(){
    if(!mrCat||!mrDesc)return;
    const prop=mrProp?data?.properties.find(p=>p.Title===mrProp):null;
    const pm=targetPm||data?.pms[0];
    if(!pm){alert("No Property Manager found. Select a property.");return;}
    // Append address to resident field if SFR
    const residentFull=isSFR&&mrAddress?`${mrResident?mrResident+" — ":""}${mrAddress}`:mrResident;
    onSubmit({
      category:mrCat,propertyId:mrProp||"",propertyName:prop?.PropertyName||"General",
      pmEmail:pm.Email,pmName:pm.Name,residentName:residentFull,description:mrDesc
    });
    setMrCat("");setMrProp("");setMrResident("");setMrDesc("");setMrAddress("");setOpen(false);
  }

  return(
    <div style={{...S.card,borderLeft:`3px solid ${C.gold500}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:14,fontWeight:600,color:C.teal700}}>📋 Manager Review</div>
          {pendingReviews.length>0&&<div style={{fontSize:11,color:C.gold700,marginTop:1}}>{pendingReviews.length} item{pendingReviews.length!==1?"s":""} pending</div>}
        </div>
        <button style={{...S.btnO(C.gold700,C.gold500),...S.btnSm}} onClick={()=>setOpen(!open)}>{open?"Cancel":"+ Request"}</button>
      </div>

      {/* Pending items this VA submitted */}
      {pendingReviews.length>0&&<div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.gray100}`}}>
        {pendingReviews.map((t,i)=>(
          <div key={t.id||i} style={{display:"flex",gap:8,padding:"7px 0",borderBottom:`1px solid ${C.gray100}`,alignItems:"flex-start",opacity:t.Status==="Completed"?0.6:1}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:3}}>
                <Badge type={t.Status==="Completed"?"success":"warning"}>{t.Category}</Badge>
                {t.PropertyName&&t.PropertyName!=="General"&&<span style={{fontSize:11,color:C.gray400}}>{t.PropertyName}</span>}
                <span style={{fontSize:11,color:C.gray400}}>→ {t.PMName}</span>
                {t.Status==="Completed"&&<Badge type="success">✓ Resolved</Badge>}
              </div>
              <div style={{fontSize:12,fontWeight:500,color:t.Status==="Completed"?C.gray400:C.teal700,textDecoration:t.Status==="Completed"?"line-through":"none"}}>{t.Title}</div>
              {t.Notes&&<div style={{fontSize:11,color:C.gray400}}>👤 {t.Notes}</div>}
            </div>
            {t.Status!=="Completed"&&<button style={{...S.btnO(C.success,C.success),padding:"4px 10px",fontSize:11,minHeight:28}}
              onClick={()=>{const n=prompt("Completion notes (optional):");if(n!==null)onComplete(t.id,n);}}>
              ✓ Done
            </button>}
          </div>
        ))}
      </div>}

      {open&&<div style={{marginTop:14}}>
        <div style={S.row}>
          <div style={{flex:1,minWidth:150}}><label style={S.label}>Category *</label>
            <select style={S.select} value={mrCat} onChange={e=>setMrCat(e.target.value)}>
              <option value="">Select...</option>
              {MR_CATS.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div style={{flex:1,minWidth:150}}><label style={S.label}>Property</label>
            <select style={S.select} value={mrProp} onChange={e=>setMrProp(e.target.value)}>
              <option value="">General (Brandy only)</option>
              {(myProps||[]).map(p=><option key={p.Title} value={p.Title}>{p.PropertyName}</option>)}
            </select>
            {!mrProp&&<div style={{fontSize:11,color:C.gold700,marginTop:3}}>⚠ General routes directly to Brandy — only use for tasks that are not property-specific</div>}
          </div>
        </div>
        {targetPm&&<div style={{fontSize:11,color:C.success,marginTop:4}}>→ Will notify: {targetPm.Name} ({targetPm.Email})</div>}
        {isSFR&&<div style={{marginTop:8}}><label style={S.label}>Property Address *</label>
          <input style={S.input} value={mrAddress} onChange={e=>setMrAddress(e.target.value)} placeholder="e.g., 123 Main St, Greenville SC"/>
          <div style={{fontSize:11,color:C.gold700,marginTop:3}}>Single Family portfolio — enter the specific home address</div>
        </div>}
        <div style={{marginTop:8}}><label style={S.label}>Resident / Applicant / Prospect</label>
          <input style={S.input} value={mrResident} onChange={e=>setMrResident(e.target.value)} placeholder="Name (optional)"/>
        </div>
        <div style={{marginTop:8}}><label style={S.label}>Description — what action is needed? *</label>
          <textarea style={{...S.input,minHeight:72,resize:"vertical"}} value={mrDesc} onChange={e=>setMrDesc(e.target.value)} placeholder="e.g., Application ready for approval — please review and advise..."/>
        </div>
        <button style={{...S.btn(C.gold500,C.dark),width:"100%",marginTop:10,opacity:(!mrCat||!mrDesc)?0.5:1}} onClick={handleSubmit}>
          📋 Send to Manager
        </button>
      </div>}
    </div>
  );
}

// ============================================================
// BLOCK MODAL — required reason + optional manager task
// ============================================================
function BlockModal({task,onConfirm,onCancel,data,myEmail,myEmp}){
  const[reason,setReason]=useState("");
  const[createMgr,setCreateMgr]=useState(false);
  const[mgrCat,setMgrCat]=useState("Other");
  const inputRef=useRef(null);
  useEffect(()=>{if(inputRef.current)inputRef.current.focus();},[]);

  function handleConfirm(){
    if(!reason.trim())return;
    onConfirm(reason.trim(),createMgr?mgrCat:null);
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:C.white,borderRadius:8,padding:24,maxWidth:440,width:"100%",boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}}>
        <div style={{fontSize:16,fontWeight:700,color:C.error,marginBottom:4}}>⚠ Block Task</div>
        <div style={{fontSize:13,color:C.teal700,fontWeight:500,marginBottom:14}}>{task?.Title}</div>
        <div style={{marginBottom:14}}>
          <label style={{...S.label,color:C.error}}>Reason for blocking * <span style={{fontWeight:400,color:C.gray400}}>(required)</span></label>
          <textarea ref={inputRef} style={{...S.input,minHeight:72,resize:"vertical",borderColor:reason.trim()?C.gray200:C.error}}
            value={reason} onChange={e=>setReason(e.target.value)}
            placeholder="Describe what is blocking this task..."/>
          {!reason.trim()&&<div style={{fontSize:11,color:C.error,marginTop:3}}>A reason is required to block a task.</div>}
        </div>
        <label style={{display:"flex",alignItems:"flex-start",gap:8,padding:"10px 12px",background:C.gold50,border:`1px solid ${C.gold100}`,borderRadius:6,cursor:"pointer",marginBottom:14}}>
          <input type="checkbox" checked={createMgr} onChange={e=>setCreateMgr(e.target.checked)} style={{marginTop:2,accentColor:C.gold700}}/>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:C.gold700}}>Create a Manager Review task to clear this block</div>
            <div style={{fontSize:11,color:C.gray400,marginTop:1}}>Sends a notification to the PM so they can take action</div>
          </div>
        </label>
        {createMgr&&<div style={{marginBottom:14}}>
          <label style={S.label}>Review Category</label>
          <select style={S.select} value={mgrCat} onChange={e=>setMgrCat(e.target.value)}>
            {["Application Review","Property Question","Resident Communication","Other"].map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </div>}
        <div style={{display:"flex",gap:8}}>
          <button style={{...S.btn(C.error),flex:1,opacity:reason.trim()?1:0.4}} onClick={handleConfirm} disabled={!reason.trim()}>⚠ Block Task</button>
          <button style={{...S.btnO(C.gray400,C.gray200),flex:1}} onClick={onCancel}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// PROPERTY SECTION — collapsible group of tasks by property
// ============================================================
function PropertySection({propName,tasks,timers,defaultOpen,onStartTimer,onPause,onResume,onFinish,onCancel,onBlock,onUnblock,onDelete,onRequestHelp,onUnclaim,onCompleteSubTask,showVA,isMgr,tick,isAdm}){
  const[open,setOpen]=useState(defaultOpen||false);
  const pendingCount=tasks.filter(t=>t.Status!=="Completed"&&t.Status!=="Blocked").length;
  const activeCount=timers?timers.filter(tm=>tasks.some(q=>q._localId===tm._localId||q._spId===tm._spId)).length:0;
  const blockedCount=tasks.filter(t=>t.Status==="Blocked").length;
  const totalDisplay=pendingCount+activeCount+blockedCount;
  return(
    <div style={{...S.card,padding:0,overflow:"hidden",marginBottom:10}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:C.teal50,cursor:"pointer",borderBottom:open?`1px solid ${C.teal100}`:"none"}} onClick={()=>setOpen(x=>!x)}>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span style={{fontSize:13,fontWeight:700,color:C.teal700}}>{propName==="General"?"\u{1F4C1} General":"\u{1F3E0} "+propName}</span>
          <span style={{fontSize:11,color:C.gray400}}>{pendingCount} pending{blockedCount>0?` · ${blockedCount} blocked`:""}</span>
          {activeCount>0&&<Badge type="success">{"\u23F1"} {activeCount} timing</Badge>}
          {blockedCount>0&&<Badge type="error">{blockedCount} blocked</Badge>}
        </div>
        <span style={{fontSize:13,color:C.gray400}}>{open?"\u25B2":"\u25BC"}</span>
      </div>
      {open&&<div style={{padding:"4px 14px 10px"}}>
        {tasks.map(t=>{
          const liveTimer=timers?timers.find(x=>x._localId===t._localId||x._spId===t._spId):null;
          if(liveTimer){
            return(<InlineTimer key={t._localId} timer={liveTimer} tick={tick} isMgr={isMgr}
              onPause={onPause} onResume={onResume} onFinish={onFinish} onCancel={onCancel} onBlock={onBlock}/>);
          }
          const isCovClaimed=t.CoverageForName&&!t.CoverageForEmail;
          const isAssisted=t._assistedFor||t.Notes?.startsWith("Assisted by");
          return(<div key={t._localId}>
            {isAssisted&&<div style={{fontSize:11,color:C.info,fontWeight:600,marginBottom:2,paddingLeft:8}}>{"\u{1F91D}"} Assisting {t._assistedFor||""}</div>}
            <TaskRow task={t} onStart={t.Status==="Blocked"?null:onStartTimer?()=>onStartTimer(t):null}
              onDelete={isAdm?()=>onDelete(t):null} showVA={showVA} onComplete={onCompleteSubTask}
              onUnclaim={(isCovClaimed||isAssisted)&&onUnclaim?()=>onUnclaim(t):null}
              onRequestHelp={!isCovClaimed&&!isAssisted&&t.Status!=="Blocked"&&onRequestHelp?()=>onRequestHelp(t):null}
              onUnblock={t.Status==="Blocked"&&onUnblock?()=>onUnblock(t):null}/>
          </div>);
        })}
      </div>}
    </div>
  );
}

// ============================================================
// INLINE TIMER — shows active timer controls within the task list
// ============================================================
function InlineTimer({timer:t,tick,isMgr,onPause,onResume,onFinish,onCancel,onBlock}){
  const now=Date.now(),st=new Date(t.StartTime).getTime();
  let pMs=t._pMs||0;const ip=!!t._pS;
  if(ip)pMs+=(now-t._pS);
  const el=ip?Math.floor((t._pS-st-(t._pMs||0))/1000):Math.floor((now-st-pMs)/1000);
  return(
    <div style={{background:ip?C.warningBg:C.successBg,border:`1px solid ${ip?C.warning:C.success}`,borderLeft:`3px solid ${ip?C.warning:C.success}`,borderRadius:4,padding:"8px 10px",margin:"4px 0"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <span style={{fontSize:14}}>{getIcon(t.icon,t.Category)}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:600,color:C.teal700}}>{t.Title}</div>
          <div style={{fontSize:11,color:C.gray400}}>{isMgr?t.VAName+" \u00B7 ":""}{t.PropertyName||"General"}</div>
        </div>
        <div style={{fontFamily:mono,fontSize:18,fontWeight:700,color:ip?C.warning:C.success,minWidth:60,textAlign:"right"}}>{fTm(el)}</div>
      </div>
      <div style={{display:"flex",gap:5,marginTop:8,flexWrap:"wrap"}}>
        {ip?<button style={{...S.btn(C.success),...S.btnSm,flex:1}} onClick={()=>onResume(t._localId)}>{"\u25B6"} Resume</button>
           :<button style={{...S.btnO(C.warning,C.warning),...S.btnSm,flex:1}} onClick={()=>onPause(t._localId)}>{"\u23F8"} Pause</button>}
        <button style={{...S.btn(C.success),...S.btnSm,flex:1}} onClick={()=>{const n=prompt("Notes (optional):");const d=prompt("Date (YYYY-MM-DD, blank=today):",t.StartTime?.slice(0,10)||today());if(d===null)return;onFinish(t._localId,"Completed",n||"",(d.trim()&&d.trim()!==today())?d.trim():null);}}>{"\\u2713"} Done</button>
        <button style={{...S.btnO(C.error,C.error),...S.btnSm,padding:"5px 10px"}} title="Block task" onClick={()=>onBlock?onBlock(t._localId,t):(()=>{const n=prompt("Block reason (required):");if(n&&n.trim())onFinish(t._localId,"Blocked",n.trim());})()}>{"\\\\u26A0"}</button>
        <button style={{...S.btnO(C.gray400,C.gray200),...S.btnSm,padding:"5px 10px"}} onClick={()=>onCancel(t._localId)}>{"\u21A9"}</button>
      </div>
    </div>
  );
}
